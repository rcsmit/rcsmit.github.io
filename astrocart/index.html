<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Astrocartography Calculator</title>
 <link rel="icon" type="image/x-icon" href="favicon.ico">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Josefin+Sans:wght@100;300;400&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
  :root {
    --gold: #c9a84c;
    --gold-light: #e8d5a3;
    --silver: #b0b8c8;
    --deep-blue: #0a1628;
    --parchment: #f5f0e8;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: var(--deep-blue);
    color: var(--parchment);
    font-family: 'Josefin Sans', sans-serif;
    height: 100vh; display:flex; flex-direction:column; overflow:hidden;
  }
  header {
    text-align:center; padding:0.55rem 2rem 0.4rem;
    border-bottom:1px solid rgba(201,168,76,0.2);
    flex-shrink:0; background:rgba(6,17,31,0.97); z-index:1000;
  }
  header h1 {
    font-family:'Cormorant Garamond',serif;
    font-size:clamp(1.1rem,2.2vw,1.7rem);

  .sidebar {

  .sidebar-scroll::-webkit-scrollbar { width:3px; }
  .sidebar-scroll::-webkit-scrollbar-thumb { background:rgba(201,168,76,0.2); }

  .section-label {
    font-size:0.53rem; letter-spacing:0.48em; color:var(--gold);
    text-transform:uppercase; margin-bottom:0.55rem; padding-bottom:0.28rem;
    border-bottom:1px solid rgba(201,168,76,0.15);
  }
  .form-group { margin-bottom:0.65rem; }
  label { display:block; font-size:0.55rem; letter-spacing:0.22em; color:var(--silver); text-transform:uppercase; margin-bottom:0.22rem; }

  .btn-calculate {
    width:100%; margin-top:0.55rem; padding:0.62rem;

  .style-btn {
    flex:1; padding:0.27rem 0.18rem;
    background:rgba(255,255,255,0.04); border:1px solid rgba(176,184,200,0.14);

  }
  .style-btn.active { border-color:var(--gold); color:var(--gold-light); background:rgba(201,168,76,0.1); }

  /* Zone toggle */
  .zone-toggle { display:flex; align-items:center; gap:0.45rem; margin-top:0.45rem; cursor:pointer; user-select:none; }
  .toggle-track {

    border:1px solid rgba(176,184,200,0.2); border-radius:8px;

  }

<body>
<div id="loadingBar"></div>

          <span><a href="astro_angles.html" target="_blank">View angle definitions</a></span>

<script>
// ── MAP ───────────────────────────────────────────────────────
const map = L.map('map', {
  center:[20,10], zoom:2,
  worldCopyJump:false,
  maxBounds:[[-90,-260],[90,260]],
  maxBoundsViscosity:0.6
});
const STYLES = {
  dark:      {url:'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',      attr:'© CARTO', sub:'abcd'},
  satellite: {url:'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', attr:'© Esri', sub:'abc'},
  topo:      {url:'https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png',                   attr:'© OpenTopoMap', sub:'abc'},
  light:     {url:'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',     attr:'© CARTO', sub:'abcd'},
};
let tileLayer = L.tileLayer(STYLES.dark.url,{attribution:STYLES.dark.attr,subdomains:STYLES.dark.sub,maxZoom:18}).addTo(map);
function setStyle(key,btn){
  document.querySelectorAll('.style-btn').forEach(b=>b.classList.remove('active')); btn.classList.add('active');
  map.removeLayer(tileLayer);
  const s=STYLES[key];
  tileLayer=L.tileLayer(s.url,{attribution:s.attr,subdomains:s.sub,maxZoom:18}).addTo(map);
  if(lineGroup) lineGroup.addTo(map);
  if(zoneGroup&&zonesVisible) zoneGroup.addTo(map);
  if(bMarker) bMarker.addTo(map);
}

// ── MATH ──────────────────────────────────────────────────────
const DEG=Math.PI/180, RAD=180/Math.PI;
const mod360=x=>((x%360)+360)%360;
const sind=x=>Math.sin(x*DEG), cosd=x=>Math.cos(x*DEG), tand=x=>Math.tan(x*DEG);
const atan2d=(y,x)=>Math.atan2(y,x)*RAD;
const asind=x=>Math.asin(Math.max(-1,Math.min(1,x)))*RAD;
function toJD(yr,mo,dy,hr){if(mo<=2){yr--;mo+=12;}const A=Math.floor(yr/100),B=2-A+Math.floor(A/4);return Math.floor(365.25*(yr+4716))+Math.floor(30.6001*(mo+1))+dy+hr/24+B-1524.5;}
function obliquity(T){return 23.439291111-0.013004167*T;}
function GMST(jd){const T=(jd-2451545)/36525;return mod360(280.46061837+360.98564736629*(jd-2451545)+0.000387933*T*T);}
function eclToEq(lon,lat,eps){return {ra:mod360(atan2d(sind(lon)*cosd(eps)-tand(lat)*sind(eps),cosd(lon))),dec:asind(sind(lat)*cosd(eps)+cosd(lat)*sind(eps)*sind(lon))};}

const PLANET_DEFS=[
  {id:'sun',     name:'Sun',     sym:'☉', color:'#ffd700', fn:T=>{const L=mod360(280.46646+36000.76983*T),M=mod360(357.52911+35999.05029*T),C=(1.9146-0.004817*T)*sind(M)+(0.01999-0.0001*T)*sind(2*M);return {lon:mod360(L+C),lat:0};}},
  {id:'moon',    name:'Moon',    sym:'☽', color:'#c8d8e8', fn:T=>{const D=mod360(297.85+445267.11*T),M=mod360(357.53+35999.05*T),M1=mod360(134.96+477198.87*T),F=mod360(93.27+483202.02*T),L1=mod360(218.32+481267.88*T);return {lon:mod360(L1+6.289*sind(M1)+1.274*sind(2*D-M1)+0.658*sind(2*D)+0.214*sind(2*M1)-0.186*sind(M)-0.114*sind(2*F)),lat:5.128*sind(F)+0.281*sind(M1+F)+0.278*sind(M1-F)+0.173*sind(2*D-F)};}},
  {id:'mercury', name:'Mercury', sym:'☿', color:'#80c8e0', fn:T=>{const L=mod360(252.25+149474.07*T),M=mod360(168.66+149472.52*T);return {lon:mod360(L+23.44*sind(M)+2.98*sind(2*M)),lat:0};}},
  {id:'venus',   name:'Venus',   sym:'♀', color:'#f4a460', fn:T=>{const L=mod360(181.98+58519.21*T),M=mod360(212.26+58517.80*T);return {lon:mod360(L+0.776*sind(M)),lat:0};}},
  {id:'mars',    name:'Mars',    sym:'♂', color:'#e05050', fn:T=>{const L=mod360(355.43+19141.70*T),M=mod360(319.53+19139.86*T);return {lon:mod360(L+10.691*sind(M)+0.623*sind(2*M)),lat:0};}},
  {id:'jupiter', name:'Jupiter', sym:'♃', color:'#daa520', fn:T=>{const L=mod360(34.35+3036.30*T),M=mod360(20.9+3034.91*T);return {lon:mod360(L+5.555*sind(M)+0.168*sind(2*M)),lat:0};}},
  {id:'saturn',  name:'Saturn',  sym:'♄', color:'#c8b090', fn:T=>{const L=mod360(50.08+1223.51*T),M=mod360(317.91+1221.55*T);return {lon:mod360(L+6.359*sind(M)+0.220*sind(2*M)),lat:0};}},
  {id:'uranus',  name:'Uranus',  sym:'♅', color:'#5fffcf', fn:T=>{const L=mod360(314.06+429.86*T),M=mod360(142.59+428.32*T);return {lon:mod360(L+5.304*sind(M)),lat:0};}},
  {id:'neptune', name:'Neptune', sym:'♆', color:'#5080ff', fn:T=>{const L=mod360(304.35+219.88*T),M=mod360(267.95+218.46*T);return {lon:mod360(L+1.030*sind(M)),lat:0};}},
  {id:'pluto',   name:'Pluto',   sym:'♇', color:'#b070e0', fn:T=>{const S=mod360(50.03+1222.11*T),P=mod360(238.95+144.96*T);return {lon:mod360(238.95+144.96*T-2.567*sind(S)+1.134*sind(P)),lat:0};}},
];

const MEANINGS={
  'sun-ac':'Vitality, radiance, identity — you feel fully alive here.',
  'sun-mc':'Career peak, fame, recognition.',
  'sun-dc':'You shine in relationships; significant partnerships likely.',
  'sun-ic':'Deep inner peace; feeling truly at home.',
  'moon-ac':'Emotional visibility; nurturing, intuitive energy.',
  'moon-mc':'Public life tied to emotion; caring roles.',
  'moon-dc':'Deep emotional intimacy with partners.',
  'moon-ic':'🏠 Strongest sense of home and belonging.',
  'venus-ac':'💕 Attraction, beauty, charm — love finds you here.',
  'venus-mc':'Creative success; artistic fulfillment.',
  'venus-dc':'💕 Romantic encounters; harmonious love.',
  'venus-ic':'Pleasure, comfort, beautiful home life.',
  'mars-ac':'High energy and drive; dynamic assertive life.',
  'mars-mc':'Ambition, competition; career demands action.',
  'mars-dc':'Passionate but sometimes combative relationships.',
  'mars-ic':'Restless home energy; family drive.',
  'jupiter-ac':'😊 Luck, expansion, abundance — places feel blessed.',
  'jupiter-mc':'😊 Great success and recognition; fortunate career.',
  'jupiter-dc':'Generous, fortunate partnerships.',
  'jupiter-ic':'Philosophical abundance; wisdom at home.',
  'saturn-ac':'Discipline and hard lessons; growth through effort.',
  'saturn-mc':'Long-term career success through responsibility.',
  'saturn-dc':'Serious, karmic partnerships; commitment.',
  'saturn-ic':'Structural home life; ancestral karma.',
  'mercury-ac':'Sharp intellect, communication, quick connections.',
  'mercury-mc':'Writing, speaking, teaching career.',
  'mercury-dc':'Intellectual bonds and mental partnerships.',
  'mercury-ic':'Study and curious family dynamic.',
  'uranus-ac':'Liberation, originality, sudden life changes.',
  'uranus-mc':'Revolutionary or unconventional career.',
  'uranus-dc':'Unusual, electric partnerships.',
  'uranus-ic':'Restless home; sudden relocations.',
  'neptune-ac':'Spirituality, artistry, mystical sensitivity.',
  'neptune-mc':'Artistic vocation; idealism; spiritual calling.',
  'neptune-dc':'Romantic idealism; karmic soul connections.',
  'neptune-ic':'Spiritual home; ancestral dreams.',
  'pluto-ac':'Profound transformation; intense personal power.',
  'pluto-mc':'Power in career; deep ambition.',
  'pluto-dc':'Transformative relationships; power dynamics.',
  'pluto-ic':'Ancestral depths; hidden family forces.',
};

// ── ZONE GEOMETRY ─────────────────────────────────────────────
const ZONE_KM=700, KM_PER_DEG=111.32;
function buildCorridor(pts,km){
  if(pts.length<2)return null;
  const off=km/KM_PER_DEG;
  const left=[],right=[];
  pts.forEach(([lat,lon])=>{const dLon=off/Math.max(cosd(lat),0.05);left.push([lat,lon-dLon]);right.push([lat,lon+dLon]);});
  return [...left,...[...right].reverse(),left[0]];
}
function buildVerticalCorridor(lon_deg,km){
  const off=km/KM_PER_DEG;
  const lats=[];for(let lat=-85;lat<=85;lat+=5)lats.push(lat);
  const left=lats.map(lat=>[lat,normLon(lon_deg-off)]);
  const right=lats.map(lat=>[lat,normLon(lon_deg+off)]);
  return [...left,...[...right].reverse(),left[0]];
}

// ── STATE ─────────────────────────────────────────────────────
let lineGroup=null, zoneGroup=null, bMarker=null;
let zonesVisible=true;
// hiddenPlanets: set of planet ids
const hiddenPlanets=new Set();
// hiddenTypes: set of 'MC','IC','AC','DC'
const hiddenTypes=new Set();
// soloedPlanet: id or null
let soloedPlanet=null;

// layerStore[planetId][type] = {line:[layers], zone:[layers], label:[layers]}
const layerStore={};

function normLon(lon){return lon>180?lon-360:lon<-180?lon+360:lon;}
function splitSegs(pts){
  if(!pts.length)return [];
  const segs=[[]];let prev=null;
  pts.forEach(([lat,lon])=>{const ln=normLon(lon);if(prev!==null&&Math.abs(ln-prev)>180)segs.push([]);segs[segs.length-1].push([lat,ln]);prev=ln;});
  return segs.filter(s=>s.length>1);
}
function computeLines(ra,dec,gmst){
  const mc_lon=mod360(ra-gmst),ic_lon=mod360(mc_lon+180);
  const ac=[],dc=[];
  for(let lat=-82;lat<=82;lat+=0.8){
    const cosH=-tand(lat)*tand(dec);
    if(Math.abs(cosH)>1)continue;
    const H=Math.acos(cosH)*RAD;
    ac.push([lat,mod360(ra-gmst-H)]);
    dc.push([lat,mod360(ra-gmst+H)]);
  }
  return {mc_lon,ic_lon,ac,dc};
}

const tt=document.getElementById('tooltip');
function makeLine(latlngs,color,dash,planet,type){
  const p=L.polyline(latlngs,{color,weight:1.8,opacity:0.88,dashArray:dash||null,smoothFactor:1.2});
  p.on('mouseover',e=>{tt.innerHTML=`<strong>${planet.sym} ${planet.name} · ${type}</strong>${MEANINGS[planet.id+'-'+type.toLowerCase()]||''}`;tt.style.display='block';});
  p.on('mousemove',e=>{tt.style.left=(e.originalEvent.clientX+14)+'px';tt.style.top=(e.originalEvent.clientY-8)+'px';});
  p.on('mouseout',()=>tt.style.display='none');
  return p;
}
function makeZone(poly,color,planet,type){
  const z=L.polygon(poly,{color,fillColor:color,fillOpacity:0.08,weight:0.5,opacity:0.2,smoothFactor:2});
  z.on('mouseover',e=>{tt.innerHTML=`<strong>${planet.sym} ${planet.name} · ${type} zone (700 km)</strong>${MEANINGS[planet.id+'-'+type.toLowerCase()]||''}`;tt.style.display='block';});
  z.on('mousemove',e=>{tt.style.left=(e.originalEvent.clientX+14)+'px';tt.style.top=(e.originalEvent.clientY-8)+'px';});
  z.on('mouseout',()=>tt.style.display='none');
  return z;
}
function makeLabel(lat,lon,text,color){
  return L.marker([lat,lon],{icon:L.divIcon({className:'',html:`<span style="color:${color};font-family:'Josefin Sans',sans-serif;font-size:8px;letter-spacing:1px;text-shadow:0 0 4px #000,0 0 8px #000;pointer-events:none;white-space:nowrap">${text}</span>`,iconAnchor:[0,8]}),interactive:false});
}

// ── VISIBILITY ENGINE ─────────────────────────────────────────
// A layer is visible if: planet not hidden, type not hidden, and not soloed out
function shouldShow(planetId, type){
  if(hiddenPlanets.has(planetId)) return false;
  if(hiddenTypes.has(type)) return false;
  if(soloedPlanet && soloedPlanet!==planetId) return false;
  return true;
}

function applyVisibility(){
  if(!lineGroup||!zoneGroup) return;
  PLANET_DEFS.forEach(planet=>{
    const store=layerStore[planet.id];
    if(!store) return;
    ['MC','IC','AC','DC'].forEach(type=>{
      const show=shouldShow(planet.id,type);
      const entry=store[type];
      if(!entry) return;
      [...entry.line,...entry.label].forEach(l=>{
        try{if(show)lineGroup.addLayer(l);else lineGroup.removeLayer(l);}catch(e){}
      });
      entry.zone.forEach(l=>{
        try{if(show&&zonesVisible)zoneGroup.addLayer(l);else zoneGroup.removeLayer(l);}catch(e){}
      });
    });
  });
}

// ── PLANET TOGGLE (single click) ─────────────────────────────
let clickTimer=null;
function handlePlanetClick(id){
  // Delay to distinguish from double-click
  if(clickTimer){clearTimeout(clickTimer);clickTimer=null;return;}
  clickTimer=setTimeout(()=>{
    clickTimer=null;
    // If this planet is currently soloed, un-solo and show all
    if(soloedPlanet===id){
      soloedPlanet=null;
      hiddenPlanets.delete(id);
    } else {
      if(hiddenPlanets.has(id)) hiddenPlanets.delete(id);
      else hiddenPlanets.add(id);
    }
    rebuildLegendState();
    applyVisibility();
  },220);
}

// ── PLANET SOLO (double click) ────────────────────────────────
function handlePlanetDblClick(id){
  if(clickTimer){clearTimeout(clickTimer);clickTimer=null;}
  if(soloedPlanet===id){
    // Un-solo: show all
    soloedPlanet=null;
    hiddenPlanets.clear();
  } else {
    soloedPlanet=id;
    hiddenPlanets.clear(); // solo overrides individual hides
  }
  rebuildLegendState();
  applyVisibility();
}

function rebuildLegendState(){
  document.querySelectorAll('.legend-item').forEach(item=>{
    const id=item.dataset.pid;
    item.classList.remove('off','solo');
    if(soloedPlanet){
      if(soloedPlanet===id) item.classList.add('solo');
      else item.classList.add('off');
    } else {
      if(hiddenPlanets.has(id)) item.classList.add('off');
    }
  });
}

// ── LINE TYPE TOGGLE ──────────────────────────────────────────
function toggleLineType(type,btn){
  btn.classList.toggle('active');
  if(hiddenTypes.has(type)) hiddenTypes.delete(type);
  else hiddenTypes.add(type);
  applyVisibility();
}

// ── ZONE TOGGLE ───────────────────────────────────────────────
function toggleZones(){
  zonesVisible=!zonesVisible;
  document.getElementById('zoneTrack').classList.toggle('on',zonesVisible);
  document.getElementById('zoneLabel').textContent=zonesVisible?'700 km zones visible':'700 km zones hidden';
  applyVisibility();
}

// ── CALCULATE ────────────────────────────────────────────────
function calculate(){
  const dateStr=document.getElementById('birthDate').value;
  const timeStr=document.getElementById('birthTime').value;
  const bLat=parseFloat(document.getElementById('birthLat').value);
  const bLon=parseFloat(document.getElementById('birthLon').value);
  const utcOff=parseFloat(document.getElementById('utcOffset').value);
  const city=document.getElementById('birthCity').value||'Birth Place';
  if(!dateStr||!timeStr||isNaN(bLat)||isNaN(bLon)){alert('Please fill all birth data fields.');return;}

  const bar=document.getElementById('loadingBar');
  bar.style.width='30%';
  setTimeout(()=>bar.style.width='65%',150);

  setTimeout(()=>{
    try{
      const [y,m,d]=dateStr.split('-').map(Number);
      const [h,mi]=timeStr.split(':').map(Number);
      const jd=toJD(y,m,d,h+mi/60-utcOff);
      const T=(jd-2451545)/36525;
      const eps=obliquity(T), gmst=GMST(jd);

      if(lineGroup)map.removeLayer(lineGroup);
      if(zoneGroup)map.removeLayer(zoneGroup);
      if(bMarker)map.removeLayer(bMarker);
      lineGroup=L.layerGroup();
      zoneGroup=L.layerGroup();

      // Reset state
      soloedPlanet=null;
      hiddenPlanets.clear();
      PLANET_DEFS.forEach(p=>delete layerStore[p.id]);

      const legendDiv=document.getElementById('legendItems');
      legendDiv.innerHTML='';
      document.getElementById('legendSection').style.display='';

      PLANET_DEFS.forEach(planet=>{
        const ecl=planet.fn(T);
        const eq=eclToEq(ecl.lon,ecl.lat,eps);
        const lines=computeLines(eq.ra,eq.dec,gmst);
        layerStore[planet.id]={};

        const storeEntry=(type,lineLayers,zoneLayers,labelLayers)=>{
          layerStore[planet.id][type]={line:lineLayers,zone:zoneLayers,label:labelLayers};
          // Add all (will be shown by default)
          lineLayers.forEach(l=>lineGroup.addLayer(l));
          zoneLayers.forEach(l=>zoneGroup.addLayer(l));
          labelLayers.forEach(l=>lineGroup.addLayer(l));
        };

        // MC
        const mc_ln=normLon(lines.mc_lon);
        storeEntry('MC',
          [makeLine([[-85,mc_ln],[85,mc_ln]],planet.color,'',planet,'MC')],
          [makeZone(buildVerticalCorridor(mc_ln,ZONE_KM),planet.color,planet,'MC')],
          [makeLabel(70,mc_ln+0.5,planet.sym+'MC',planet.color)]
        );

        // IC
        const ic_ln=normLon(lines.ic_lon);
        storeEntry('IC',
          [makeLine([[-85,ic_ln],[85,ic_ln]],planet.color,'8 5',planet,'IC')],
          [makeZone(buildVerticalCorridor(ic_ln,ZONE_KM),planet.color,planet,'IC')],
          [makeLabel(70,ic_ln+0.5,planet.sym+'IC',planet.color)]
        );

        // AC
        const acSegs=splitSegs(lines.ac);
        const acLines=acSegs.map(seg=>makeLine(seg,planet.color,'3 5',planet,'AC'));
        const acZones=acSegs.map(seg=>{ const c=buildCorridor(seg,ZONE_KM);return c?makeZone(c,planet.color,planet,'AC'):null;}).filter(Boolean);
        const acMid=lines.ac[Math.floor(lines.ac.length/2)];
        const acLabels=acMid?[makeLabel(acMid[0],normLon(acMid[1])+0.5,planet.sym+'AC',planet.color)]:[];
        storeEntry('AC',acLines,acZones,acLabels);

        // DC
        const dcSegs=splitSegs(lines.dc);
        const dcLines=dcSegs.map(seg=>makeLine(seg,planet.color,'10 5',planet,'DC'));
        const dcZones=dcSegs.map(seg=>{ const c=buildCorridor(seg,ZONE_KM);return c?makeZone(c,planet.color,planet,'DC'):null;}).filter(Boolean);
        const dcMid=lines.dc[Math.floor(lines.dc.length/2)];
        const dcLabels=dcMid?[makeLabel(dcMid[0],normLon(dcMid[1])+0.5,planet.sym+'DC',planet.color)]:[];
        storeEntry('DC',dcLines,dcZones,dcLabels);

        // Legend item
        const item=document.createElement('div');
        item.className='legend-item';
        item.dataset.pid=planet.id;
        item.title=`Click: toggle · Double-click: solo`;
        item.innerHTML=`<div class="legend-dot" style="background:${planet.color};box-shadow:0 0 5px ${planet.color}"></div><span class="planet-sym" style="color:${planet.color}">${planet.sym}</span><span>${planet.name}</span>`;
        item.addEventListener('click',()=>handlePlanetClick(planet.id));
        item.addEventListener('dblclick',e=>{e.preventDefault();handlePlanetDblClick(planet.id);});
        legendDiv.appendChild(item);
      });

      // Apply current line type visibility (in case some were hidden before recalc)
      if(zonesVisible) zoneGroup.addTo(map);
      lineGroup.addTo(map);
      applyVisibility();

      bMarker=L.circleMarker([bLat,bLon],{
        radius:7,color:'#c9a84c',fillColor:'#ffd700',fillOpacity:0.4,weight:2
      }).bindTooltip(`✦ ${city}`,{permanent:true,direction:'right',className:'birth-label',offset:[10,0]}).addTo(map);

      map.flyTo([bLat,bLon],2,{duration:1.2});

    }catch(e){console.error(e);alert('Error: '+e.message);}
    bar.style.width='100%';
    setTimeout(()=>bar.style.width='0',350);
  },60);
}

window.addEventListener('load',()=>setTimeout(calculate,400));
</script>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AcroFest SaaS — Documentation</title>
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-base:       #F5F0E8;
      --bg-surface:    #FFFFFF;
      --bg-elevated:   #FAF7F2;
      --bg-overlay:    #EDE8DF;
      --border-default: #D4CCB8;
      --border-muted:   #E8E2D6;
      --border-active:  #2A5C8F;
      --text-primary:   #1A1A1A;
      --text-secondary: #5A5550;
      --text-disabled:  #9E9890;
      --text-inverse:   #FFFFFF;
      --brand-primary:  #2A5C8F;
      --brand-accent:   #E8A020;
      --badge-class:    #2A5C8F;
      --badge-workshop: #3D7A4A;
      --badge-jam:      #B85C1A;
      --badge-social:   #7B4A9E;
      --critical:       #C94040;
      --warning:        #C47B1A;
      --success:        #3D7A4A;
      --sidebar-width:  220px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }
    body {
      background: var(--bg-base);
      color: var(--text-primary);
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      display: flex;
      flex-direction: column;
    }

    /* ── TOP HEADER ── */
    header {
      height: 52px;
      background: var(--brand-primary);
      display: flex;
      align-items: center;
      padding: 0 20px;
      gap: 12px;
      flex-shrink: 0;
      border-bottom: 3px solid var(--brand-accent);
    }
    .header-logo {
      font-size: 1.2rem;
      font-weight: 700;
      color: #fff;
      letter-spacing: -0.02em;
    }
    .header-logo span {
      color: var(--brand-accent);
    }
    .header-tagline {
      font-size: 0.75rem;
      color: rgba(255,255,255,0.6);
      font-weight: 500;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      margin-left: 4px;
    }
    .header-badge {
      margin-left: auto;
      background: rgba(255,255,255,0.15);
      color: rgba(255,255,255,0.9);
      font-size: 0.65rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      padding: 3px 8px;
      border-radius: 3px;
      border: 1px solid rgba(255,255,255,0.2);
      font-family: 'Geist Mono', monospace;
    }

    /* ── MAIN LAYOUT ── */
    .layout {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── SIDEBAR ── */
    nav {
      width: var(--sidebar-width);
      background: var(--bg-elevated);
      border-right: 1px solid var(--border-default);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      overflow-y: auto;
    }
    .nav-section {
      padding: 12px 0 4px 0;
    }
    .nav-section-label {
      font-size: 0.62rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-disabled);
      padding: 0 16px 6px 16px;
    }
    .nav-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 16px;
      cursor: pointer;
      color: var(--text-secondary);
      font-size: 0.875rem;
      font-weight: 500;
      border-left: 3px solid transparent;
      transition: all 0.15s ease;
      text-decoration: none;
      user-select: none;
    }
    .nav-item:hover {
      background: var(--bg-overlay);
      color: var(--text-primary);
    }
    .nav-item.active {
      background: rgba(42, 92, 143, 0.08);
      color: var(--brand-primary);
      border-left-color: var(--brand-primary);
      font-weight: 600;
    }
    .nav-icon {
      font-size: 1rem;
      width: 20px;
      text-align: center;
      flex-shrink: 0;
    }
    .nav-divider {
      height: 1px;
      background: var(--border-muted);
      margin: 8px 16px;
    }

    /* ── IFRAME CONTENT AREA ── */
    .content-area {
      flex: 1;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    iframe {
      flex: 1;
      width: 100%;
      height: 100%;
      border: none;
      background: var(--bg-base);
    }

    /* ── FOOTER ── */
    footer {
      height: 28px;
      background: var(--bg-overlay);
      border-top: 1px solid var(--border-default);
      display: flex;
      align-items: center;
      padding: 0 16px;
      gap: 16px;
      flex-shrink: 0;
    }
    .footer-item {
      font-size: 0.68rem;
      color: var(--text-disabled);
      font-family: 'Geist Mono', monospace;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .footer-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--success);
      flex-shrink: 0;
    }
  </style>
</head>
<body>

  <header>
    <div class="header-logo">Acro<span>Fest</span> SaaS</div>
    <div class="header-tagline">Documentation Hub</div>
    <div class="header-badge">v3.0 — Master Build</div>
  </header>

  <div class="layout">

    <nav>
      <div class="nav-section">
        <div class="nav-section-label">Overview</div>
        <a class="nav-item active" data-src="welcome.html" onclick="loadPage(this)">
          <span class="nav-icon">🏠</span> Welcome
        </a>
      </div>

      <div class="nav-divider"></div>

      <div class="nav-section">
        <div class="nav-section-label">Documents</div>
        <a class="nav-item" data-src="master-prompt.html" onclick="loadPage(this)">
          <span class="nav-icon">⚒️</span> Build specs (prompt)
        </a>
        
        <div class="nav-section-label">Features</div>
        <a class="nav-item" data-src="features.html" onclick="loadPage(this)">
          <span class="nav-icon">🏗️</span> Features
        </a>
        
       
        <div class="nav-divider"></div>

      <div class="nav-section">
      <a class="nav-item" data-src="saas_prompt_evaluation.html" onclick="loadPage(this)">
          <span class="nav-icon">⚖️</span> Evaluation
        </a>
      </div>
        <div class="nav-divider"></div>

      <div class="nav-section">
      <a class="nav-item" data-src="calculation.html" onclick="loadPage(this)">
          <span class="nav-icon">💰</span> Calculation
        </a>
      </div>
    </nav>

    <div class="content-area">
      <iframe id="main-frame" src="welcome.html" title="Content"></iframe>
    </div>

  </div>

  <footer>
    <div class="footer-item"><div class="footer-dot"></div> AcroFest SaaS v3.0</div>
    <div class="footer-item">Multi-tenant · Event Management · Acroyoga</div>
    <div class="footer-item" style="margin-left:auto;">Documentation generated 2025</div>
  </footer>

  <script>
    function loadPage(el) {
      // Remove active from all nav items
      document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
      el.classList.add('active');

      const src = el.getAttribute('data-src');
      // Split anchor from filename
      const [file, anchor] = src.split('#');
      const frame = document.getElementById('main-frame');

      if (anchor) {
        // If anchor, load page then scroll inside iframe
        frame.src = file;
        frame.onload = function() {
          try {
            const targetEl = frame.contentDocument.getElementById(anchor);
            if (targetEl) targetEl.scrollIntoView({ behavior: 'smooth' });
          } catch(e) {}
        };
      } else {
        frame.src = src;
        frame.onload = null;
      }
    }
  </script>

</body>
</html>

<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">

:root{--bg:#F5F0E8;--surface:#fff;--border:#D4CCB8;--brand:#2A5C8F;--text:#1A1A1A;--muted:#5A5550;--accent:#E8A020;}

<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FestFlow</title>
<link rel="icon" type="image/x-icon" href="favicon.ico">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--brand-superdark:#0b1e34;--brand-dark:#1E4470;--accent:#E8A020;--text:#1A1A1A;--bg:#F5F0E8}
*{box-sizing:border-box}html,body{margin:0;height:100%;background:var(--bg);font-family:'DM Sans',sans-serif}
.shell{display:flex;flex-direction:column;height:100%}
.topmenu{height:44px;background:var(--brand-superdark);display:flex;align-items:center;gap:2px;padding:0 16px;overflow-x:auto;flex-shrink:0}
.logo{font-family:'DM Serif Display',serif;color:#fff;font-size:15px;margin-right:16px;white-space:nowrap}.logo span{color:var(--accent)}
.logo a{text-decoration:none;color:inherit;}
.nav-btn{background:none;border:none;color:rgba(255,255,255,.68);font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;padding:6px 12px;border-radius:6px;cursor:pointer;white-space:nowrap}
.nav-btn:hover{background:rgba(255,255,255,.1);color:#fff}.nav-btn.active{background:var(--accent);color:#1A1A1A;font-weight:600}
.spacer{flex:1}.frame{border:0;width:100%;height:calc(100dvh - 44px);display:block;background:#fff}
@media (max-width:700px){.topmenu{padding:0 10px}.frame{height:calc(100dvh - 44px)}}
</style></head><body>
<div class="shell">
  <nav class="topmenu">
    <div class="logo"><a href="index.html">Fest<span>Flow</span></a></div>
    <button class="nav-btn" data-src="dashboard_mobile_menu.html">🎪 Organizer Dashboard</button>
    <button class="nav-btn" data-src="pitch-embedded.html?screen=schedule">📅 Schedule Builder</button>
  
    <button class="nav-btn" data-src="portal.html">🌿 Participant Portal</button>
    <button class="nav-btn" data-src="pitch-embedded.html?screen=profile">👤 My Profile</button>
    <button class="nav-btn" data-src="pitch-embedded.html?screen=website">🌍 Public Website</button>
    <button class="nav-btn" data-src="pitch-embedded.html?screen=platform">⚙️ Superadmin (SaaS)</button>
    <div class="spacer"></div>
    <button class="nav-btn" data-src="dev/index.html">🛠️ Developer info</button>
  </nav>
  <iframe id="appFrame" class="frame" src="welcome.html"></iframe>
</div>
<script>
  const frame = document.getElementById('appFrame');
  const buttons = Array.from(document.querySelectorAll('.nav-btn[data-src]'));
  function setActive(btn){buttons.forEach(b=>b.classList.remove('active')); btn.classList.add('active'); frame.src = btn.dataset.src;}
  buttons.forEach(btn => btn.addEventListener('click', () => setActive(btn)));
</script>
</body></html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta content="width=device-width, initial-scale=1, shrink-to-fit=no" name="viewport">
  <meta content="GitHub pages of René Smit — data, design, movement" name="description">
  <title>Github pages of René Smit</title>
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link crossorigin="anonymous"
        href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.1/css/bootstrap.min.css"
        integrity="sha384-VCmXjywReHh4PwowAiWNagnWcLhlEJLA5buUprzK8rxFgeH0kww/aWY76TfkUoSX"
        rel="stylesheet">
  <script src="https://use.fontawesome.com/ab4f6a4583.js"></script>
  <style>
    :root {
      --orange: #f47d1c;
      --dark-blue: #142F5e;
    }

    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }

    /* ── Header / Jumbotron ── */
    .jumbotron {
      background: var(--dark-blue);
      color: #fff;
      padding: 3rem 1rem 2rem;
      margin-bottom: 0;
      border-radius: 0;
    }
    .jumbotron h1 { font-size: 2.4rem; font-weight: 700; }
    .jumbotron .lead { color: #c9d4e8; }

    .social-icons a { color: #fff; margin-left: 10px; font-size: 1.2rem; }
    .social-icons a:hover { color: var(--orange); }

    .meta-links a {
      color: #f0c890;
      font-size: 0.85rem;
      margin-right: 1.2rem;
      text-decoration: none;
      border-bottom: 1px solid transparent;
      transition: border-color 0.2s;
    }
    .meta-links a:hover { border-color: #f0c890; }

    /* ── Section headers ── */
    .section-heading {
      font-size: 1rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--dark-blue);
      border-bottom: 3px solid var(--orange);
      display: inline-block;
      padding-bottom: 3px;
      margin-bottom: 1rem;
    }

    /* ── Project cards ── */
    .project-card {
      display: block;
      background: #fff;
      border: 1px solid #e8e8e8;
      border-radius: 6px;
      padding: 0.75rem 1rem;
      text-decoration: none;
      color: inherit;
      transition: box-shadow 0.18s, border-color 0.18s, transform 0.15s;
      height: 100%;
    }
    .project-card:hover {
      box-shadow: 0 4px 16px rgba(20,47,94,0.13);
      border-color: var(--orange);
      transform: translateY(-2px);
      text-decoration: none;
      color: inherit;
    }
    .project-card .proj-name {
      font-weight: 600;
      font-size: 0.92rem;
      color: var(--orange);
      display: block;
      margin-bottom: 0.2rem;
    }
    .project-card .proj-desc {
      font-size: 0.82rem;
      color: #555;
      line-height: 1.45;
    }

    /* ── Screenshot cards ── */
    .screenshot {
      height: 200px;
      object-fit: cover;
      width: 100%;
      border-radius: 6px 6px 0 0;
    }
    .screenshot-card {
      border-radius: 6px;
      overflow: hidden;
      border: 1px solid #e0e0e0;
      transition: box-shadow 0.18s, transform 0.15s;
    }
    .screenshot-card:hover {
      box-shadow: 0 4px 16px rgba(20,47,94,0.15);
      transform: translateY(-2px);
    }
    .screenshot-card .card-body {
      padding: 0.6rem 0.9rem;
      background: #fff;
    }
    .screenshot-card .card-title {
      font-size: 0.88rem;
      font-weight: 600;
      color: var(--dark-blue);
      margin-bottom: 0.1rem;
    }
    .screenshot-card .card-text {
      font-size: 0.78rem;
      color: #666;
    }
    .screenshot-placeholder {
      height: 200px;
      width: 100%;
      background: #e9eef5;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #9aadcc;
      font-size: 2rem;
    }

    /* ── Sections bg ── */
    .section-light { background: #f8f9fa; padding: 2.5rem 0; }
    .section-white { background: #fff;    padding: 2.5rem 0; }

    /* ── Footer / Contact ── */
    .contact-band { background-color: var(--orange); padding: 2.5rem 0; }
    .contact { background-color: #fccf90; padding: 1.5rem; border-radius: 6px; }
    .btn-primary { background-color: var(--orange); border-color: var(--orange); }
    .btn-primary:hover { background-color: var(--dark-blue); border-color: var(--dark-blue); }

    .footer-bottom { background: var(--dark-blue); color: #aaa; font-size: 0.82rem; padding: 1rem 0; }
    .footer-bottom a { color: #f0c890; }
  </style>
</head>
<body>

<!-- ══════════════════════════════════════════
     HEADER
══════════════════════════════════════════ -->
<header class="jumbotron text-center">
  <div class="container">
    <div class="row mb-3">
      <div class="col text-right social-icons">
        <a href="https://www.facebook.com/rcsmit" target="_blank" title="Facebook"><i class="fa fa-facebook"></i></a>
        <a href="https://www.instagram.com/rcsmit" target="_blank" title="Instagram"><i class="fa fa-instagram"></i></a>
        <a href="https://www.linkedin.com/in/rcsmit" target="_blank" title="LinkedIn"><i class="fa fa-linkedin"></i></a>
        <a href="#contact" title="Contact"><i class="fa fa-envelope"></i></a>
      </div>
    </div>
    <h1>GitHub pages of René Smit</h1>
    <p class="lead">Multidisciplinary freelancer — Data · Design · Movement</p>
    <p class="meta-links mt-3">
      <a href="https://rene-smit.com" target="_blank">rene-smit.com</a>
      <a href="https://rcsmit.streamlit.app" target="_blank">rcsmit.streamlit.app</a>
      <a href="https://github.com/rcsmit" target="_blank">github.com/rcsmit</a>
    </p>
  </div>
</header>

<!-- ══════════════════════════════════════════
     CONTENT — rendered from items.json
══════════════════════════════════════════ -->
<div id="page-content"></div>

<!-- ══════════════════════════════════════════
     CONTACT
══════════════════════════════════════════ -->
<div class="contact-band" id="contact">
  <div class="container">
    <div class="row">
      <div class="col-sm-8 col-md-7 py-2">
        <div class="contact">
          <form action="https://formspree.io/f/meqvvoee" method="post">
            <h3>Drop a Message</h3>
            <div class="row mt-3">
              <div class="col-md-6">
                <div class="form-group">
                  <input class="form-control" name="txtName" placeholder="Your Name *" type="text">
                </div>
                <div class="form-group">
                  <input class="form-control" name="txtEmail" placeholder="Your Email *" type="text">
                </div>
                <div class="form-group">
                  <input class="form-control" name="txtPhone" placeholder="Your Phone Number" type="text">
                </div>
                <div class="form-group">
                  <button class="btn btn-primary" type="submit">Send Message</button>
                </div>
              </div>
              <div class="col-md-6">
                <div class="form-group">
                  <textarea class="form-control" name="txtMsg" placeholder="Your Message *" style="height:150px;"></textarea>
                </div>
              </div>
            </div>
          </form>
        </div>
      </div>
      <div class="col-sm-4 offset-md-1 py-4">
        <h4 class="text-white">Connect</h4>
        <ul class="list-unstyled">
          <li><a class="text-white" href="https://rene-smit.com" target="_blank"><i class="fa fa-globe mr-2"></i>rene-smit.com</a></li>
          <li><a class="text-white" href="https://www.linkedin.com/in/rcsmit" target="_blank"><i class="fa fa-linkedin mr-2"></i>LinkedIn</a></li>
          <li><a class="text-white" href="https://www.instagram.com/rcsmit" target="_blank"><i class="fa fa-instagram mr-2"></i>Instagram</a></li>
          <li><a class="text-white" href="https://www.facebook.com/renesmitcoaching" target="_blank"><i class="fa fa-facebook mr-2"></i>Facebook</a></li>
          <li class="mt-3"><a class="text-white" href="https://rcsmit.streamlit.app" target="_blank"><i class="fa fa-bar-chart mr-2"></i>Streamlit apps</a></li>
        </ul>
      </div>
    </div>
  </div>
</div>

<div class="footer-bottom">
  <div class="container d-flex justify-content-between flex-wrap">
    <span>© René Smit &nbsp;·&nbsp;</span>
    <a href="#">Back to top ↑</a>
  </div>
</div>

<script crossorigin="anonymous"
        integrity="sha384-DfXdz2htPH0lsSSs5nCTpuj/zy4C+OGpamoFVy38MVBnE+IbbVYUew+OrCXaRkfj"
        src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
<script crossorigin="anonymous"
        integrity="sha384-XEerZL0cuoUbHE4nZReLT7nx9gQrQreJekYhJD9WNWhH8nEW+0c5qq7aIo2Wl30J"
        src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.1/js/bootstrap.min.js"></script>

<script>
const BASE = "https://rcsmit.github.io/";

const CATEGORY_ICONS = {
  "Personal & Featured":  "⭐ ",
  "Movement & Body":      "🤸 ",
  "Geo & Maps":           "🌍 ",
  "Music & Visuals":      "🎵 ",
  "People & Profiles":    "👥 ",
  "Tools & Apps":         "💡 ",
  "Coaching & Community": "🧘 ",
  "Uncategorized":        "📁 "
};

// Alternate section backgrounds for non-featured sections
const BG_CLASSES = ["section-white", "section-light"];

// Directories to never show
const EXCLUDE_DIRS = new Set(["beauty", "img"]);

async function getRepoDirs() {
  try {
    const res = await fetch("https://api.github.com/repos/rcsmit/rcsmit.github.io/contents/");
    const entries = await res.json();
    return entries
      .filter(e => e.type === "dir" && !EXCLUDE_DIRS.has(e.name))
      .map(e => e.name);
  } catch (e) {
    console.warn("Could not fetch repo contents:", e);
    return [];
  }
}

async function init() {
  const [itemsRes, repoDirs] = await Promise.all([
    fetch("items.json"),
    getRepoDirs()
  ]);
  const items = await itemsRes.json();

  // Collect all directories already listed in items.json
  const listedDirs = new Set(items.map(i => i.directory));

  // Add uncategorized entries for any repo dir not in items.json
  for (const dir of repoDirs) {
    if (!listedDirs.has(dir)) {
      items.push({ category: "Uncategorized", directory: dir, description: "", image: null });
    }
  }

  // Group by category, preserving order, deduplicating directory within each category
  const categoryMap = new Map();
  for (const item of items) {
    if (!categoryMap.has(item.category)) categoryMap.set(item.category, new Map());
    const dirMap = categoryMap.get(item.category);
    if (!dirMap.has(item.directory)) dirMap.set(item.directory, item);
  }

  const content = document.getElementById("page-content");
  let bgIndex = 0;

  for (const [cat, dirMap] of categoryMap.entries()) {
    const entries = [...dirMap.values()];
    const icon = CATEGORY_ICONS[cat] || "";
    const isFeatured = cat === "Personal & Featured";

    const section = document.createElement("section");

    if (isFeatured) {
      section.className = "section-light";
      section.innerHTML = `
        <div class="container">
          <h2 class="section-heading">${cat}</h2>
          <div class="row">
            ${entries.map(screenshotCardHTML).join("")}
          </div>
        </div>`;
    } else {
      section.className = BG_CLASSES[bgIndex % 2];
      bgIndex++;
      section.innerHTML = `
        <div class="container">
          <h2 class="section-heading">${icon}${cat}</h2>
          <div class="row mb-4">
            ${entries.map(projectCardHTML).join("")}
          </div>
        </div>`;
    }

    content.appendChild(section);
  }
}

function screenshotCardHTML(item) {
  const href = BASE + item.directory;
  return `
    <div class="col-md-4 mb-4">
      <a href="${href}" target="_blank" class="text-decoration-none">
        <div class="screenshot-card">
          <img class="screenshot" src="img/${item.directory}.png"
               onerror="this.outerHTML='<div class=\'screenshot-placeholder\'><i class=\'fa fa-picture-o\'></i></div>'"
               alt="${item.directory}">
          <div class="card-body">
            <p class="card-title">${item.directory}</p>
            <p class="card-text">${item.description}</p>
          </div>
        </div>
      </a>
    </div>`;
}

function projectCardHTML(item) {
  const href = BASE + item.directory;
  return `
    <div class="col-sm-6 col-md-4 mb-3">
      <a href="${href}" target="_blank" class="project-card">
        <span class="proj-name">${item.directory}</span>
        <span class="proj-desc">${item.description}</span>
      </a>
    </div>`;
}

init();
</script>
</body>
</html>

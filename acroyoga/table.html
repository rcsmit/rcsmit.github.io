        html {

        }

        body {

        }

        .hero {
            background: linear-gradient(155deg, #0b1e34 0%, #1a2744 52%, #2d6a4f 100%);

            padding: 4.25rem 1.5rem 3.25rem;
            position: relative;
            overflow: hidden;
            
        }

        .hero::before {
            content: '';
            position: absolute;
            right: -70px;
            top: -70px;
            width: 320px;
            height: 320px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(212,148,58,0.24), rgba(212,148,58,0));
        }

        .hero::after {
            content: '';
            position: absolute;
            left: 20%;
            bottom: -90px;
            width: 260px;
            height: 260px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(45,106,79,0.28), transparent);
        }

        .hero-inner,
        .content {
            
            max-width: 1000px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        .hero-bar {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 16px;
        }

        .hero-copy {
            min-width: 0;
            transition: max-height 0.22s ease, opacity 0.22s ease, transform 0.22s ease, margin 0.22s ease;
            max-height: 420px;
        }

        .brand-toggle {
            border: 1px solid rgba(255,255,255,0.18);
            background: rgba(255,255,255,0.1);
            color: #fff;
            width: 46px;
            height: 46px;
            border-radius: 14px;
            font-size: 1.15rem;
            font-weight: 700;
            cursor: pointer;
            flex: 0 0 auto;
            transition: transform 0.16s ease, filter 0.16s ease, background 0.16s ease;
        }

        .brand-toggle:hover {
            transform: translateY(-1px);
            filter: brightness(1.05);
        }

        body.brandbar-collapsed .hero-copy {
            max-height: 0;
            opacity: 0;
            transform: translateY(-10px);
            overflow: hidden;
            margin: 0;
        }

        .eyebrow {
            display: inline-block;
            padding: 6px 12px;
            border: 1px solid rgba(255,255,255,0.18);
            border-radius: 999px;
            font-size: 0.72rem;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--gold);
            margin-bottom: 1rem;
        }

        h1 {
            margin: 0 0 1rem;
            font-family: 'Playfair Display', serif;
            font-size: clamp(2.25rem, 4.5vw, 3.6rem);
            line-height: 1.05;
        }

        .hero p {
            margin: 0;
            color: rgba(255,255,255,0.78);
            max-width: 720px;
            line-height: 1.65;

        }

        .hero-links {

            flex-wrap: wrap;

            margin-top: 1.5rem;
        }

        .hero-link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 42px;
            padding: 0 18px;
            border-radius: 999px;
            text-decoration: none;
            font-size: 0.86rem;
            font-weight: 700;
            transition: transform 0.16s ease, filter 0.16s ease;

        .hero-link.primary {

        .content {
            padding: 2rem 1.5rem 3rem;
        }

        .controls {
            margin: -52px auto 1.75rem;

            gap: 15px;
            flex-wrap: wrap;
            align-items: center;
            background: rgba(255,255,255,0.94);

            border-radius: 20px;

            border-radius: 14px;
            font-size: 15px;

            font-weight: 700;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            color: var(--muted);
        }

        .results-count {
            margin-left: auto;
            color: var(--navy);
            background: rgba(26,39,68,0.06);
            padding: 12px 14px;
            border-radius: 14px;
            font-size: 0.86rem;
            font-weight: 600;
            white-space: nowrap;
        }

        table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 18px 18px;
            table-layout: fixed;
        }

        td {
            padding: 18px;
            text-align: center;
            vertical-align: top;
            width: 25%;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 18px;
            box-shadow: 0 10px 28px rgba(26,39,68,0.08);
        }

        td:empty {
            background: transparent;
            border: none;
            box-shadow: none;
        }

        .label {
            font-weight: 700;
            margin-bottom: 14px;
            color: var(--navy);
            min-height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1.35;
            text-transform: capitalize;
            font-size: 0.98rem;
        }

        .video-container {
            width: 100%;
            max-width: 280px;
            aspect-ratio: 16 / 9;
            min-height: 157px;
            margin: 0 auto;
            background: linear-gradient(180deg, #f4efe8, #ede4d7);
            border: 1px solid var(--border);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .video-container::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at center, rgba(212,148,58,0.20), transparent 56%);
            pointer-events: none;
        }

        .load-button {
            position: relative;
            z-index: 1;
            background: var(--navy);
            color: white;
            border: none;
            padding: 12px 20px;
            font-size: 0.85rem;
            font-weight: 700;
            letter-spacing: 0.04em;
            border-radius: 999px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: transform 0.16s ease, filter 0.16s ease;
        }

        .load-button svg {
            width: 18px;
            height: 18px;
        }

        iframe {
            border: none;
            border-radius: 16px;
            width: 100%;
            height: 100%;
        }

        .empty-state {
            text-align: center;
            padding: 48px 20px;
            color: var(--muted);
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 20px;

                display: block;

    <script>
        (function () {
            const body = document.body;
            const toggle = document.getElementById('brandbarToggle');
            const storageKey = 'acroGalleryBrandbarCollapsed';

            if (!toggle) return;

            function applyState(collapsed) {
                body.classList.toggle('brandbar-collapsed', collapsed);
                toggle.setAttribute('aria-expanded', String(!collapsed));
                toggle.setAttribute('aria-label', collapsed ? 'Expand brand bar' : 'Collapse brand bar');
                toggle.textContent = collapsed ? '+' : '−';
            }

            const saved = localStorage.getItem(storageKey) === 'true';
            applyState(saved);

            toggle.addEventListener('click', function () {
                const collapsed = !body.classList.contains('brandbar-collapsed');
                applyState(collapsed);
                localStorage.setItem(storageKey, String(collapsed));
            });
        })();
    </script>

        // Function to create iframe HTML
        function createIframe(videoId) {
            return `<iframe width="280" height="157" src="https://www.youtube.com/embed/${videoId}?si=EJNPiLa76TiQBHXK" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>`;
        }

        // Function to create load button with play icon
        function createLoadButton(videoId) {
            return `
                <div class="video-container" data-video-id="${videoId}">
                    <button class="load-button" onclick="loadVideo(this, '${videoId}')">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M8 5v14l11-7z"/>
                        </svg>
                        LOAD VIDEO
                    </button>
                </div>
            `;
        }

        // Function to load video when button is clicked
        window.loadVideo = function(button, videoId) {
            const container = button.parentElement;
            container.innerHTML = createIframe(videoId);
        };

        // Function to get unique categories
        function getCategories() {
            const categories = new Set();
            data.nodes.forEach(node => {
                if (node.video !== 'dQw4w9WgXcQ') {
                    categories.add(node.category);
                }
            });
            return Array.from(categories).sort();
        }

        // Function to populate category dropdown
        function populateCategoryFilter() {
            const categoryFilter = document.getElementById('categoryFilter');
            const categories = getCategories();
            
            categories.forEach(category => {
                const option = document.createElement('option');
                option.value = category;
                option.textContent = category.replace(/_/g, ' ');
                categoryFilter.appendChild(option);
            });
        }

        // Function to filter nodes based on search and category
        function filterNodes() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const selectedCategory = document.getElementById('categoryFilter').value;
            
            let filtered = data.nodes.filter(node => node.video !== 'dQw4w9WgXcQ');
            
            // Filter by search term
            if (searchTerm) {
                filtered = filtered.filter(node => 
                    node.label.toLowerCase().includes(searchTerm)
                );
            }
            
            // Filter by category
            if (selectedCategory !== 'all') {
                filtered = filtered.filter(node => node.category === selectedCategory);
            }
            
            return filtered;
        }

        // Function to update results count
        function updateResultsCount(count, total) {
            const resultsCount = document.getElementById('resultsCount');
            resultsCount.textContent = `Showing ${count} of ${total} poses`;
        }

        // Function to get number of columns based on screen width
        function getColumnsPerRow() {
            const width = window.innerWidth;
            if (width <= 640) return 1;
            if (width <= 1024) return 2;
            if (width <= 1400) return 3;
            return 4;
        }

        // Store current state to avoid unnecessary rebuilds
        let lastFilteredNodesJSON = '';
        let lastColumnsPerRow = getColumnsPerRow();

        // Function to generate the table
        function generateTable() {
            const table = document.getElementById('posesTable');
            
            // Get filtered nodes
            const filteredNodes = filterNodes();
            const totalNodes = data.nodes.filter(node => node.video !== 'dQw4w9WgXcQ').length;
            const columnsPerRow = getColumnsPerRow();
            
            // Check if we actually need to rebuild
            const currentFilteredNodesJSON = JSON.stringify(filteredNodes.map(n => n.id));
            if (lastFilteredNodesJSON === currentFilteredNodesJSON && lastColumnsPerRow === columnsPerRow) {
                return; // No changes, skip rebuild
            }
            
            lastFilteredNodesJSON = currentFilteredNodesJSON;
            lastColumnsPerRow = columnsPerRow;
            
            // Update results count
            updateResultsCount(filteredNodes.length, totalNodes);
            
            // Clear existing content
            table.innerHTML = '';
            
            // Calculate number of rows needed
            const totalRows = Math.ceil(filteredNodes.length / columnsPerRow);
            
            // Generate rows
            for (let i = 0; i < totalRows; i++) {
                const row = document.createElement('tr');
                
                // Generate columns for this row
                for (let j = 0; j < columnsPerRow; j++) {
                    const index = i * columnsPerRow + j;
                    
                    if (index < filteredNodes.length) {
                        const node = filteredNodes[index];
                        const cell = document.createElement('td');
                        
                        cell.innerHTML = `
                            <div class="label">${node.label}</div>
                            ${createLoadButton(node.video)}
                        `;
                        
                        row.appendChild(cell);
                    } else {
                        // Add empty cell if we've run out of data
                        const emptyCell = document.createElement('td');
                        row.appendChild(emptyCell);
                    }
                }
                
                table.appendChild(row);
            }
            
            // Show message if no results
            if (filteredNodes.length === 0) {
                const row = document.createElement('tr');
                const cell = document.createElement('td');
                cell.setAttribute('colspan', columnsPerRow);
                cell.className = 'empty-state';
                cell.innerHTML = '<h3>No poses found</h3><p>Try adjusting your search or filter.</p>';
                row.appendChild(cell);
                table.appendChild(row);
            }
        }

        // Debounce function for search
        let searchTimeout;
        function debounceSearch() {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(generateTable, 300);
        }

        // Initialize the page
        window.addEventListener('DOMContentLoaded', function() {
            populateCategoryFilter();
            generateTable();
            
            // Add event listeners for search and filter
            document.getElementById('searchInput').addEventListener('input', debounceSearch);
            document.getElementById('categoryFilter').addEventListener('change', generateTable);
        });
        
        // Regenerate table when window is resized (with debounce and state checking)
        let resizeTimer;
        window.addEventListener('resize', function() {
            clearTimeout(resizeTimer);
            resizeTimer = setTimeout(generateTable, 250);
        });
    </script>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/x-icon" href="favicon.ico">
<title>Conscious Communities World Map</title>

<!-- Leaflet CSS -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<!-- MarkerCluster CSS -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/MarkerCluster.css"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/MarkerCluster.Default.css"/>
<!-- Google Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">

<style>
/* ═══════════════════════════════════════════════════════════════
   DESIGN TOKENS — tinted-neutral green brand system
═══════════════════════════════════════════════════════════════ */
:root {
  --brand:          #2A7A5A;
  --brand-dark:     #1A5040;
  --brand-subtle:   #E6F4ED;

  --bg:             #F3F7F5;
  --surface:        #FAFCFB;
  --surface-2:      #EDF3EF;
  --border:         #D5E5DC;
  --border-strong:  #AECFBB;

  --text:           #0C1F17;
  --text-2:         #344D3E;
  --text-muted:     #7A9E8C;

  --shadow-sm:  0 1px 3px rgba(20,80,50,.08), 0 0 0 1px rgba(20,80,50,.04);
  --shadow-md:  0 4px 16px rgba(20,80,50,.10), 0 1px 4px rgba(20,80,50,.06);
  --shadow-lg:  0 12px 40px rgba(20,80,50,.14), 0 2px 8px rgba(20,80,50,.06);

  --font-display: 'DM Serif Display', Georgia, serif;
  --font-body:    'DM Sans', system-ui, sans-serif;
  --radius:       10px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: var(--font-body);
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  display: flex; flex-direction: column;
  overflow: hidden;
}

/* HEADER */
header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  box-shadow: var(--shadow-sm);
  padding: 0 20px;
  display: flex; align-items: center; gap: 16px;
  height: 54px; flex-shrink: 0;
  z-index: 1000; position: relative;
}
.logo { display: flex; align-items: center; gap: 10px; text-decoration: none; }
.logo-icon {
  width: 30px; height: 30px; background: var(--brand);
  border-radius: 8px; display: flex; align-items: center; justify-content: center;
  font-size: 15px; flex-shrink: 0;
}
.logo-text { font-family: var(--font-display); font-size: 1.05rem; color: var(--text); white-space: nowrap; }
.hdr-div { width: 1px; height: 24px; background: var(--border); flex-shrink: 0; }
.hdr-stat { font-size: .72rem; color: var(--text-muted); white-space: nowrap; }
.hdr-stat strong { color: var(--brand); font-weight: 600; }
.hdr-spacer { flex: 1; }
.search-wrap { position: relative; flex-shrink: 0; }
.search-wrap input {
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 6px 12px 6px 30px;
  font-family: var(--font-body); font-size: .8rem; color: var(--text);
  width: 190px; outline: none;
  transition: border-color .2s, box-shadow .2s;
}
.search-wrap input:focus { border-color: var(--brand); box-shadow: 0 0 0 3px rgba(42,122,90,.12); }
.search-wrap input::placeholder { color: var(--text-muted); }
.search-icon { position: absolute; left: 9px; top: 50%; transform: translateY(-50%); color: var(--text-muted); font-size: 12px; pointer-events: none; }

/* LAYOUT */
.main { display: flex; flex: 1; overflow: hidden; }

/* SIDEBAR */
.sidebar {
  width: 256px; background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column;
  flex-shrink: 0; overflow: hidden;
  transition: width .25s ease;
}
.sidebar.collapsed { width: 0; }
.sidebar-inner { width: 256px; height: 100%; display: flex; flex-direction: column; overflow: hidden; }

.sb-head { padding: 14px 16px 10px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
.sb-head h2 { font-family: var(--font-display); font-size: .9rem; color: var(--text); margin-bottom: 2px; }
.sb-head p { font-size: .68rem; color: var(--text-muted); }

.sb-actions { display: flex; gap: 6px; padding: 8px 16px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
.btn-xs {
  font-family: var(--font-body); font-size: .68rem; font-weight: 500;
  padding: 4px 9px; border-radius: 6px;
  border: 1px solid var(--border); background: var(--surface-2); color: var(--text-2);
  cursor: pointer; transition: all .15s; white-space: nowrap;
}
.btn-xs:hover { background: var(--brand-subtle); border-color: var(--brand); color: var(--brand-dark); }

.layers-list { flex: 1; overflow-y: auto; padding: 6px 0; }
.layers-list::-webkit-scrollbar { width: 3px; }
.layers-list::-webkit-scrollbar-track { background: transparent; }
.layers-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.layer-item { display: flex; align-items: center; gap: 9px; padding: 7px 16px; cursor: pointer; transition: background .12s; }
.layer-item:hover { background: var(--surface-2); }
.layer-check {
  width: 15px; height: 15px; border-radius: 4px;
  border: 2px solid var(--border-strong);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; transition: all .15s;
}
.layer-item.active .layer-check { border-color: transparent; }
.layer-check-mark { display: none; font-size: 9px; color: white; line-height: 1; }
.layer-item.active .layer-check-mark { display: block; }
.layer-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.layer-label { font-size: .75rem; color: var(--text-2); flex: 1; }
.layer-count { font-size: .65rem; color: var(--text-muted); background: var(--surface-2); padding: 1px 5px; border-radius: 10px; }

.continent-sec { padding: 10px 16px 10px; border-top: 1px solid var(--border); flex-shrink: 0; }
.continent-sec h3 { font-size: .63rem; font-weight: 600; letter-spacing: .08em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 7px; }
.continent-tags { display: flex; flex-wrap: wrap; gap: 4px; }
.ctag { font-size: .64rem; padding: 3px 8px; border-radius: 20px; border: 1px solid var(--border); background: var(--surface-2); color: var(--text-2); cursor: pointer; transition: all .15s; }
.ctag.active, .ctag:hover { background: var(--brand-subtle); border-color: var(--brand); color: var(--brand-dark); }

/* MAP */
.map-wrap { position: relative; flex: 1; overflow: hidden; }
#map { width: 100%; height: 100%; }

.sb-toggle {
  position: absolute; top: 50%; transform: translateY(-50%);
  left: 0; background: var(--surface);
  border: 1px solid var(--border); border-left: none;
  border-radius: 0 6px 6px 0;
  width: 18px; height: 36px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; z-index: 500;
  font-size: 9px; color: var(--text-muted);
  box-shadow: var(--shadow-sm); transition: color .15s;
}
.sb-toggle:hover { color: var(--brand); }

/* POPUP */
.leaflet-popup-content-wrapper {
  background: var(--surface) !important; border: 1px solid var(--border) !important;
  border-radius: 10px !important; box-shadow: var(--shadow-lg) !important;
  padding: 0 !important; overflow: hidden;
}
.leaflet-popup-content { margin: 0 !important; line-height: 1 !important; width: 230px !important; }
.leaflet-popup-tip { background: var(--surface) !important; }
.leaflet-popup-close-button { color: var(--text-muted) !important; top: 8px !important; right: 8px !important; }
.popup-body { padding: 14px 16px; font-family: var(--font-body); }
.popup-badge { display: inline-block; font-size: .59rem; font-weight: 600; letter-spacing: .06em; text-transform: uppercase; padding: 2px 7px; border-radius: 4px; margin-bottom: 8px; }
.popup-name { font-family: var(--font-display); font-size: 1rem; color: var(--text); margin-bottom: 4px; line-height: 1.25; }
.popup-loc { font-size: .7rem; color: var(--text-muted); }
.popup-shortlist { margin-top: 6px; font-size: .64rem; font-weight: 600; letter-spacing: .05em; color: #E91E63; text-transform: uppercase; }
.popup-remarks { font-size: .7rem; color: var(--text-2); line-height: 1.5; border-top: 1px solid var(--border); padding-top: 8px; margin-top: 8px; font-style: italic; }

/* MARKER LABELS */
.marker-label {
  background: none; border: none; box-shadow: none;
  font-family: var(--font-body); font-size: 10px; font-weight: 600; color: #1A2E24;
  white-space: nowrap;
  text-shadow: 0 1px 3px rgba(255,255,255,.98), 0 0 8px rgba(255,255,255,.9);
  pointer-events: none;
}

/* LOADING */
#loading {
  position: fixed; inset: 0; background: var(--bg);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  z-index: 9999; gap: 16px; transition: opacity .4s;
}
#loading.hidden { opacity: 0; pointer-events: none; }
.loading-title { font-family: var(--font-display); font-size: 1.9rem; color: var(--text); }
.loading-title span { color: var(--brand); }
.loading-bar-wrap { width: 200px; height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; }
.loading-bar { height: 100%; background: var(--brand); border-radius: 2px; animation: loadpulse 1.4s ease-in-out infinite; width: 40%; }
@keyframes loadpulse { 0% { transform: translateX(-100%); } 100% { transform: translateX(350%); } }
.loading-msg { font-size: .78rem; color: var(--text-muted); }

/* TOAST */
.toast {
  position: fixed; bottom: 20px; right: 20px;
  background: var(--text); color: #fff;
  font-size: .74rem; font-family: var(--font-body);
  padding: 8px 14px; border-radius: var(--radius);
  box-shadow: var(--shadow-lg); z-index: 9000;
  opacity: 0; transform: translateY(6px);
  transition: all .25s; pointer-events: none;
  max-width: 300px; line-height: 1.4;
}
.toast.show { opacity: 1; transform: translateY(0); }

/* CLUSTER color overrides */
.marker-cluster-small  { background-color: rgba(42,122,90,.15); }
.marker-cluster-small  div { background-color: rgba(42,122,90,.72); color:#fff; font-weight:600; font-size:12px; font-family:var(--font-body); }
.marker-cluster-medium { background-color: rgba(224,122,48,.15); }
.marker-cluster-medium div { background-color: rgba(224,122,48,.78); color:#fff; font-weight:600; font-size:13px; font-family:var(--font-body); }
.marker-cluster-large  { background-color: rgba(155,89,182,.15); }
.marker-cluster-large  div { background-color: rgba(155,89,182,.76); color:#fff; font-weight:600; font-size:14px; font-family:var(--font-body); }
</style>
</head>
<body>

<!-- Loading overlay -->
<div id="loading">
  <div class="loading-title">Conscious <span>Communities</span></div>
  <div class="loading-bar-wrap"><div class="loading-bar"></div></div>
  <div class="loading-msg" id="loading-msg">Connecting to spreadsheet…</div>
</div>

<!-- Header -->
<header>
  <div class="logo">
    <div class="logo-icon">🌍</div>
    <span class="logo-text">Conscious Communities</span>
  </div>
  <div class="hdr-div"></div>
  <div class="hdr-stat"><strong id="stat-total">–</strong> total</div>
  <div class="hdr-stat"><strong id="stat-visible">–</strong> visible</div>
  <div class="hdr-spacer"></div>
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input type="text" id="search-input" placeholder="Search name or location…" autocomplete="off">
  </div>
</header>

<!-- Main content -->
<div class="main">

  <div class="sidebar" id="sidebar">
    <div class="sidebar-inner">
      <div class="sb-head">
        <h2>Map Layers</h2>
        <p>Click to toggle visibility</p>
      </div>
      <div class="sb-actions">
        <button class="btn-xs" onclick="selectAll()">All on</button>
        <button class="btn-xs" onclick="selectNone()">All off</button>
        <button class="btn-xs" onclick="selectShortlist()">⭐ Shortlist</button>
      </div>
      <div class="layers-list" id="layers-list"></div>
      <div class="continent-sec">
        <h3>Filter by Continent</h3>
        <div class="continent-tags" id="continent-tags"></div>
      </div>
    </div>
  </div>

  <div class="map-wrap">
    <div id="map"></div>
    <div class="sb-toggle" id="sb-toggle" onclick="toggleSidebar()" title="Toggle sidebar">◀</div>
  </div>

</div>

<div class="toast" id="toast"></div>

<!-- Scripts -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/leaflet.markercluster.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

<script>
/* ╔═══════════════════════════════════════════════════════════════╗
   ║  ★  UNIVERSAL CONFIG — edit only this section  ★             ║
   ╚═══════════════════════════════════════════════════════════════╝ */

const CONFIG = {

  // ── Google Sheets ─────────────────────────────────────────────
  // Paste the spreadsheet ID from the URL here (the long alphanumeric string)
  SHEET_ID:  '1pOuO8Z3w61VOpdcXVyKwyZRoZMmQG9AFCNQrAd-I5P0',
  // Sheet tab GID — 0 = first sheet. Find it in the URL after ?gid=
  SHEET_GID: '0',

  // ── Column names (must match the spreadsheet header row exactly) ─
  COL_ID:        'id_rene',
  COL_LAYER:     'Layer',
  COL_LAT:       'LAT',
  COL_LON:       'LON',
  COL_NAME:      'Name',
  COL_REMARKS:   'remarks',
  COL_CONTINENT: 'continent',
  COL_COUNTRY:   'Land',
  COL_PROVINCE:  'provincie',
  COL_SHORTLIST: 'shortlist',

  // ── Map initial view ──────────────────────────────────────────
  MAP_CENTER:  [20, 10],     // [lat, lon]
  MAP_ZOOM:    2,
  MAP_MIN_ZOOM: 2,
  MAP_MAX_ZOOM: 18,

  // ── Tile layer (CartoDB Voyager = nice light style) ───────────
  TILE_URL:  'https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png',
  TILE_ATTR: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> &copy; <a href="https://carto.com/">CARTO</a>',
  TILE_SUBDOMAINS: 'abcd',
  TILE_MAX_ZOOM: 20,

  // ── Name labels on map ────────────────────────────────────────
  SHOW_LABELS:    true,   // show text labels next to markers
  LABEL_MIN_ZOOM: 6,      // labels only visible from this zoom level up

  // ── Clustering ───────────────────────────────────────────────
  CLUSTER_MAX_RADIUS:      60,    // pixels — lower = less clustering
  CLUSTER_SPIDER:          true,  // spread overlapping markers on max zoom
  CLUSTER_DISABLE_AT_ZOOM: 12,    // uncluster at this zoom level

  // ── Geocoding (fills in missing LAT/LON via Nominatim) ────────
  GEOCODE_ENABLED:  true,
  GEOCODE_BASE_URL: 'https://nominatim.openstreetmap.org/search',
  GEOCODE_DELAY_MS: 350,   // ms between requests (respect rate limit)

  // ── Layer colors (30 distinct colors — rotate if more layers) ─
  LAYER_COLORS: [
    '#2A7A5A','#E07A30','#9B59B6','#2980B9','#E74C3C',
    '#27AE60','#F1C40F','#16A085','#8E44AD','#2C3E50',
    '#D35400','#1ABC9C','#C0392B','#7F8C8D','#F39C12',
    '#6C3483','#1A5276','#117A65','#7D6608','#154360',
    '#922B21','#1E8449','#5B2C6F','#0E6655','#7E5109',
    '#4A235A','#0B5345','#784212','#212F3C','#616A6B',
  ],

  // ── Special shortlist marker color ────────────────────────────
  SHORTLIST_COLOR: '#E91E63',

};

/* ╔═══════════════════════════════════════════════════════════════╗
   ║  APP CODE — no need to edit below this line                  ║
   ╚═══════════════════════════════════════════════════════════════╝ */

// ── App state ──────────────────────────────────────────────────
let allRows      = [];
let activeLayers = new Set();
let activeCont   = new Set();
let layerColors  = {};
let searchQuery  = '';
let sidebarOpen  = true;
const geocodeCache = {};

// ── Initialise map ─────────────────────────────────────────────
const map = L.map('map', {
  center:  CONFIG.MAP_CENTER,
  zoom:    CONFIG.MAP_ZOOM,
  minZoom: CONFIG.MAP_MIN_ZOOM,
  maxZoom: CONFIG.MAP_MAX_ZOOM,
});

L.tileLayer(CONFIG.TILE_URL, {
  attribution: CONFIG.TILE_ATTR,
  subdomains:  CONFIG.TILE_SUBDOMAINS,
  maxZoom:     CONFIG.TILE_MAX_ZOOM,
}).addTo(map);

// Cluster group
const cluster = L.markerClusterGroup({
  maxClusterRadius:        CONFIG.CLUSTER_MAX_RADIUS,
  spiderfyOnMaxZoom:       CONFIG.CLUSTER_SPIDER,
  showCoverageOnHover:     false,
  zoomToBoundsOnClick:     true,
  disableClusteringAtZoom: CONFIG.CLUSTER_DISABLE_AT_ZOOM,
  chunkedLoading:          true,
});
map.addLayer(cluster);

// ── Utility: toast ─────────────────────────────────────────────
function showToast(msg, dur = 3500) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), dur);
}

// ── Utility: loading message ───────────────────────────────────
function setLoadMsg(msg) { document.getElementById('loading-msg').textContent = msg; }

function hideLoading() {
  const el = document.getElementById('loading');
  el.classList.add('hidden');
  setTimeout(() => el.remove(), 500);
}

// ── Sidebar toggle ─────────────────────────────────────────────
function toggleSidebar() {
  sidebarOpen = !sidebarOpen;
  document.getElementById('sidebar').classList.toggle('collapsed', !sidebarOpen);
  document.getElementById('sb-toggle').textContent = sidebarOpen ? '◀' : '▶';
  setTimeout(() => map.invalidateSize(), 280);
}

// ── Assign a color to each unique layer ───────────────────────
function assignLayerColors(layers) {
  layers.forEach((l, i) => { layerColors[l] = CONFIG.LAYER_COLORS[i % CONFIG.LAYER_COLORS.length]; });
}

// ── Build a colored SVG circle icon ───────────────────────────
function makeIcon(color, isShortlist) {
  const r  = isShortlist ? 7 : 5;
  const sw = isShortlist ? 2 : 1.5;
  const dim = (r + sw) * 2;
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${dim}" height="${dim}">
    <circle cx="${r+sw}" cy="${r+sw}" r="${r}" fill="${color}" stroke="rgba(255,255,255,.85)" stroke-width="${sw}"/>
  </svg>`;
  return L.divIcon({
    html:        `<div style="filter:drop-shadow(0 1px 3px rgba(0,0,0,.3))">${svg}</div>`,
    className:   '',
    iconSize:    [dim, dim],
    iconAnchor:  [r+sw, r+sw],
    popupAnchor: [0, -(r+sw+4)],
  });
}

// ── Build popup HTML for a row ─────────────────────────────────
function buildPopup(row) {
  const color   = layerColors[row._layer] || '#888';
  const name    = (row[CONFIG.COL_NAME]     || '').trim() || '(unnamed)';
  const remarks = (row[CONFIG.COL_REMARKS]  || '').trim();
  const country = (row[CONFIG.COL_COUNTRY]  || '').trim();
  const prov    = (row[CONFIG.COL_PROVINCE] || '').trim();
  const cont    = (row[CONFIG.COL_CONTINENT]|| '').trim();
  const sl      = String(row[CONFIG.COL_SHORTLIST] || '').toLowerCase();
  const isSL    = ['yes','1','true','x','✓'].includes(sl);

  const loc = [prov, country, cont].filter(Boolean).join(', ');

  return `<div class="popup-body">
    <div class="popup-badge" style="background:${color}22;color:${color}">${row._layer}</div>
    <div class="popup-name">${name}</div>
    ${loc     ? `<div class="popup-loc">📍 ${loc}</div>`                     : ''}
    ${isSL    ? `<div class="popup-shortlist">⭐ Shortlisted</div>`           : ''}
    ${remarks ? `<div class="popup-remarks">${remarks}</div>`                 : ''}
  </div>`;
}

// ── Add one row's marker (+ optional label) to cluster ─────────
function addMarker(row) {
  const lat = row._lat, lon = row._lon;
  if (!isFinite(lat) || !isFinite(lon)) return;

  const sl     = String(row[CONFIG.COL_SHORTLIST] || '').toLowerCase();
  const isSL   = ['yes','1','true','x','✓'].includes(sl);
  const color  = isSL ? CONFIG.SHORTLIST_COLOR : (layerColors[row._layer] || '#888');
  const icon   = makeIcon(color, isSL);

  const m = L.marker([lat, lon], { icon });
  m.bindPopup(buildPopup(row), { maxWidth: 260 });
  m._rowRef = row;
  cluster.addLayer(m);

  // Name label (only shown at higher zoom via CSS opacity trick via zoom handler)
  if (CONFIG.SHOW_LABELS) {
    const name = (row[CONFIG.COL_NAME] || '').trim();
    if (name) {
      const lbl = L.marker([lat, lon], {
        icon: L.divIcon({
          html:      `<div class="marker-label">${name}</div>`,
          className: '',
          iconSize:  [0, 0],
          iconAnchor:[0, -4],
        }),
        interactive:  false,
        zIndexOffset: -9999,
        pane:         'shadowPane',
      });
      lbl._isLabel = true;
      cluster.addLayer(lbl);
    }
  }
}

// ── Check if a row matches current filters ─────────────────────
function rowVisible(row) {
  if (!activeLayers.has(row._layer)) return false;
  if (activeCont.size > 0) {
    const c = (row[CONFIG.COL_CONTINENT] || '').trim();
    if (!activeCont.has(c)) return false;
  }
  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    const haystack = [
      row[CONFIG.COL_NAME], row[CONFIG.COL_COUNTRY],
      row[CONFIG.COL_PROVINCE], row[CONFIG.COL_CONTINENT],
    ].map(v => (v || '').toLowerCase()).join(' ');
    if (!haystack.includes(q)) return false;
  }
  return true;
}

// ── Refresh visible markers ────────────────────────────────────
function redrawMarkers() {
  cluster.clearLayers();
  let vis = 0;
  allRows.forEach(row => {
    if (rowVisible(row)) { addMarker(row); vis++; }
  });
  document.getElementById('stat-visible').textContent = vis;
  syncLabelZoom();
}

// ── Hide/show labels based on current zoom ─────────────────────
function syncLabelZoom() {
  if (!CONFIG.SHOW_LABELS) return;
  const show = map.getZoom() >= CONFIG.LABEL_MIN_ZOOM;
  document.querySelectorAll('.marker-label').forEach(el => {
    el.style.display = show ? '' : 'none';
  });
}
map.on('zoomend', syncLabelZoom);

// ── Build sidebar layer checkboxes ─────────────────────────────
function buildLayerList(layers) {
  const list = document.getElementById('layers-list');
  list.innerHTML = '';
  layers.forEach(layer => {
    const cnt   = allRows.filter(r => r._layer === layer).length;
    const color = layerColors[layer];
    const el    = document.createElement('div');
    el.className    = 'layer-item active';
    el.dataset.layer = layer;
    el.innerHTML = `
      <div class="layer-check" style="background:${color}">
        <span class="layer-check-mark">✓</span>
      </div>
      <div class="layer-dot" style="background:${color}"></div>
      <span class="layer-label">${layer}</span>
      <span class="layer-count">${cnt}</span>`;
    el.addEventListener('click', () => toggleLayer(layer, el));
    list.appendChild(el);
    activeLayers.add(layer);
  });
}

function toggleLayer(layer, el) {
  if (activeLayers.has(layer)) {
    activeLayers.delete(layer); el.classList.remove('active');
    el.querySelector('.layer-check').style.background = '';
  } else {
    activeLayers.add(layer); el.classList.add('active');
    el.querySelector('.layer-check').style.background = layerColors[layer];
  }
  redrawMarkers();
}

function selectAll() {
  document.querySelectorAll('.layer-item').forEach(el => {
    activeLayers.add(el.dataset.layer); el.classList.add('active');
    el.querySelector('.layer-check').style.background = layerColors[el.dataset.layer];
  });
  redrawMarkers();
}

function selectNone() {
  activeLayers.clear();
  document.querySelectorAll('.layer-item').forEach(el => {
    el.classList.remove('active');
    el.querySelector('.layer-check').style.background = '';
  });
  redrawMarkers();
}

function selectShortlist() {
  // Turn all layers on, but only render shortlist items
  document.querySelectorAll('.layer-item').forEach(el => {
    activeLayers.add(el.dataset.layer); el.classList.add('active');
    el.querySelector('.layer-check').style.background = layerColors[el.dataset.layer];
  });
  cluster.clearLayers();
  const slRows = allRows.filter(r => {
    const v = String(r[CONFIG.COL_SHORTLIST] || '').toLowerCase();
    return ['yes','1','true','x','✓'].includes(v);
  });
  slRows.forEach(addMarker);
  document.getElementById('stat-visible').textContent = slRows.length;
  showToast(`Showing ${slRows.length} shortlisted locations`);
}

// ── Build continent filter tags ────────────────────────────────
function buildContinentTags(continents) {
  const wrap = document.getElementById('continent-tags');
  wrap.innerHTML = '';

  const allTag = document.createElement('span');
  allTag.className = 'ctag active'; allTag.textContent = 'All';
  allTag.addEventListener('click', () => {
    activeCont.clear();
    wrap.querySelectorAll('.ctag').forEach(t => t.classList.remove('active'));
    allTag.classList.add('active');
    redrawMarkers();
  });
  wrap.appendChild(allTag);

  continents.sort().forEach(c => {
    const tag = document.createElement('span');
    tag.className = 'ctag'; tag.textContent = c;
    tag.addEventListener('click', () => {
      if (activeCont.has(c)) { activeCont.delete(c); tag.classList.remove('active'); }
      else { activeCont.add(c); tag.classList.add('active'); allTag.classList.remove('active'); }
      if (activeCont.size === 0) allTag.classList.add('active');
      redrawMarkers();
    });
    wrap.appendChild(tag);
  });
}

// ── Search handler ─────────────────────────────────────────────
document.getElementById('search-input').addEventListener('input', function () {
  searchQuery = this.value.trim();
  redrawMarkers();
});

// ── Nominatim geocode ──────────────────────────────────────────
async function geocode(query) {
  if (!CONFIG.GEOCODE_ENABLED || !query) return null;
  if (query in geocodeCache) return geocodeCache[query];
  await new Promise(r => setTimeout(r, CONFIG.GEOCODE_DELAY_MS));
  try {
    const url  = CONFIG.GEOCODE_BASE_URL + '?q=' + encodeURIComponent(query) + '&format=json&limit=1';
    const resp = await fetch(url, { headers: { 'Accept-Language': 'en' } });
    const data = await resp.json();
    if (data && data.length) {
      geocodeCache[query] = [parseFloat(data[0].lat), parseFloat(data[0].lon)];
      return geocodeCache[query];
    }
  } catch (_) { /* silent */ }
  geocodeCache[query] = null;
  return null;
}

// ══════════════════════════════════════════════════════════════
//  MAIN INIT
// ══════════════════════════════════════════════════════════════
async function init() {
  setLoadMsg('Connecting to Google Sheets…');

  // Build the public CSV export URL (no credentials needed for public sheets)
  const csvURL = 'https://docs.google.com/spreadsheets/d/'
    + CONFIG.SHEET_ID
    + '/export?format=csv&gid='
    + CONFIG.SHEET_GID;

  let rawCSV;
  try {
    const res = await fetch(csvURL);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    rawCSV = await res.text();
  } catch (err) {
    setLoadMsg('Could not load data: ' + err.message);
    console.error('Fetch error:', err);
    return;
  }

  setLoadMsg('Parsing CSV…');

  const parsed = Papa.parse(rawCSV, {
    header:         true,
    skipEmptyLines: true,
    dynamicTyping:  false,
    transformHeader: h => h.trim(),
  });

  if (!parsed.data || parsed.data.length === 0) {
    setLoadMsg('Spreadsheet appears empty or columns are mismatched.');
    return;
  }

  // Log detected headers for debugging
  console.log('Sheet headers:', Object.keys(parsed.data[0]));

  // ── Normalise all rows ─────────────────────────────────────
  const layerSet    = new Set();
  const contSet     = new Set();
  let missingCoords = 0;

  parsed.data.forEach(row => {
    // Trim all values
    Object.keys(row).forEach(k => { if (typeof row[k] === 'string') row[k] = row[k].trim(); });

    row._layer = (row[CONFIG.COL_LAYER] || 'Other').trim() || 'Other';
    row._lat   = parseFloat((row[CONFIG.COL_LAT] || '').replace(',','.'));
    row._lon   = parseFloat((row[CONFIG.COL_LON] || '').replace(',','.'));
    row._geo   = !isFinite(row._lat) || !isFinite(row._lon);

    layerSet.add(row._layer);
    const cont = (row[CONFIG.COL_CONTINENT] || '').trim();
    if (cont) contSet.add(cont);
    if (row._geo) missingCoords++;
  });

  allRows = parsed.data;

  const layers = Array.from(layerSet).sort();
  assignLayerColors(layers);
  buildLayerList(layers);
  buildContinentTags(Array.from(contSet));

  document.getElementById('stat-total').textContent   = allRows.length;
  document.getElementById('stat-visible').textContent = allRows.length;

  // ── Geocode rows missing coordinates ──────────────────────
  if (missingCoords > 0 && CONFIG.GEOCODE_ENABLED) {
    let done = 0;
    setLoadMsg(`Geocoding ${missingCoords} locations without coordinates…`);
    for (const row of allRows) {
      if (!row._geo) continue;
      // Build a query from the best available fields
      const parts = [row[CONFIG.COL_PROVINCE], row[CONFIG.COL_COUNTRY]].filter(Boolean);
      const q     = parts.join(', ') || row[CONFIG.COL_NAME];
      if (q) {
        const result = await geocode(q);
        if (result) { row._lat = result[0]; row._lon = result[1]; row._geo = false; }
      }
      done++;
      if (done % 5 === 0) setLoadMsg(`Geocoding ${done} / ${missingCoords}…`);
    }
  }

  // ── Render ─────────────────────────────────────────────────
  setLoadMsg('Rendering map…');
  redrawMarkers();
  hideLoading();

  const stillMissing = allRows.filter(r => r._geo).length;
  if (stillMissing > 0) {
    showToast(`⚠ ${stillMissing} items could not be placed (no coordinates found)`, 5000);
  }
}

init();
</script>

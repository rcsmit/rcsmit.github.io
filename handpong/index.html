<!DOCTYPE html>
<html>
<head>
<link rel="icon" type="image/x-icon" href="favicon.ico">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hand Pong</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a0f; font-family: 'Courier New', monospace; overflow: hidden; }
  
  #container { position: relative; width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; }
  
  #webcam { position: absolute; width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); opacity: 0.85; }
  
  #gameCanvas { position: absolute; width: 100%; height: 100%; }
  
  #ui { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); text-align: center; z-index: 10; }
  
  #score { font-size: 3rem; font-weight: bold; color: #fff; text-shadow: 0 0 20px #00ffcc, 0 0 40px #00ffcc; letter-spacing: 4px; }
  
  #status { font-size: 0.85rem; color: #00ffcc; margin-top: 4px; letter-spacing: 2px; opacity: 0.8; }

  #overlay { position: absolute; inset: 0; background: rgba(10,10,15,0.85); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 20; color: #fff; text-align: center; padding: 20px; }
  
  #overlay h1 { font-size: 2.5rem; color: #00ffcc; text-shadow: 0 0 30px #00ffcc; margin-bottom: 16px; letter-spacing: 3px; }
  #overlay p { color: #aaa; margin: 6px 0; font-size: 0.9rem; line-height: 1.6; }
  
  #startBtn { margin-top: 24px; padding: 14px 40px; background: transparent; border: 2px solid #00ffcc; color: #00ffcc; font-size: 1.1rem; font-family: 'Courier New', monospace; letter-spacing: 3px; cursor: pointer; transition: all 0.2s; }
  #startBtn:hover { background: #00ffcc; color: #0a0a0f; box-shadow: 0 0 30px #00ffcc; }

  #combo { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); font-size: 1.5rem; color: #ffcc00; text-shadow: 0 0 15px #ffcc00; letter-spacing: 2px; opacity: 0; transition: opacity 0.3s; z-index: 10; }
</style>
</head>
<body>
<div id="container">
  <video id="webcam" autoplay playsinline muted></video>
  <canvas id="gameCanvas"></canvas>
  
  <div id="ui">
    <div id="score">0</div>
    <div id="status">LOADING POSE DETECTION...</div>
  </div>
  
  <div id="combo"></div>

  <div id="overlay">
    <h1>HAND PONG</h1>
    <p>Move your <strong style="color:#00ffcc">LEFT hand</strong> under the ball → it flies right</p>
    <p>Move your <strong style="color:#ff6b6b">RIGHT hand</strong> under the ball → it flies left</p>
    <p>Keep the ball in the air. Don't let it fall!</p>
    <br>
    <p style="color:#555; font-size:0.75rem">Requires camera access · Uses MediaPipe Pose</p>
    <button id="startBtn" onclick="startGame()">START GAME</button>
  </div>
</div>

<!-- MediaPipe -->
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>

<script>
const video = document.getElementById('webcam');
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('score');
const statusEl = document.getElementById('status');
const overlay = document.getElementById('overlay');
const comboEl = document.getElementById('combo');

let W, H;
function resize() {
  W = canvas.width = canvas.offsetWidth;
  H = canvas.height = canvas.offsetHeight;
}
resize();
window.addEventListener('resize', resize);

// Game state
let ball = { x: 0, y: 0, vx: 0, vy: 0, r: 22, trail: [] };
let score = 0;
let gameActive = false;
let lastHand = null;
let comboCount = 0;
let comboTimeout = null;

let leftWrist = null;
let rightWrist = null;

function resetBall() {
  ball.x = W / 2;
  ball.y = H * 0.35;
  ball.vx = (Math.random() > 0.5 ? 1 : -1) * 4;
  ball.vy = 2;
  ball.trail = [];
  lastHand = null;
}

function showCombo(text, color = '#ffcc00') {
  comboEl.textContent = text;
  comboEl.style.color = color;
  comboEl.style.opacity = '1';
  if (comboTimeout) clearTimeout(comboTimeout);
  comboTimeout = setTimeout(() => comboEl.style.opacity = '0', 1200);
}

function drawBall() {
  for (let i = 0; i < ball.trail.length; i++) {
    const t = ball.trail[i];
    const alpha = (i / ball.trail.length) * 0.4;
    const r = ball.r * (i / ball.trail.length) * 0.8;
    ctx.beginPath();
    ctx.arc(t.x, t.y, r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(0,255,204,${alpha})`;
    ctx.fill();
  }

  const grad = ctx.createRadialGradient(ball.x, ball.y, 0, ball.x, ball.y, ball.r * 2.5);
  grad.addColorStop(0, 'rgba(0,255,204,0.5)');
  grad.addColorStop(1, 'rgba(0,255,204,0)');
  ctx.beginPath();
  ctx.arc(ball.x, ball.y, ball.r * 2.5, 0, Math.PI * 2);
  ctx.fillStyle = grad;
  ctx.fill();

  ctx.beginPath();
  ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI * 2);
  ctx.fillStyle = '#fff';
  ctx.shadowBlur = 20;
  ctx.shadowColor = '#00ffcc';
  ctx.fill();
  ctx.shadowBlur = 0;
}

function drawHand(pos, color, label) {
  if (!pos) return;
  const x = pos.x * W;
  const y = pos.y * H;

  ctx.beginPath();
  ctx.arc(x, y, 18, 0, Math.PI * 2);
  ctx.strokeStyle = color;
  ctx.lineWidth = 3;
  ctx.shadowBlur = 15;
  ctx.shadowColor = color;
  ctx.stroke();
  ctx.shadowBlur = 0;

  ctx.beginPath();
  ctx.arc(x, y, 6, 0, Math.PI * 2);
  ctx.fillStyle = color;
  ctx.fill();

  ctx.fillStyle = color;
  ctx.font = 'bold 11px Courier New';
  ctx.textAlign = 'center';
  ctx.fillText(label, x, y - 26);
}

function checkHit() {
  if (!gameActive) return;

  const checkOne = (wrist, hand) => {
    if (!wrist) return false;
    const hx = wrist.x * W;
    const hy = wrist.y * H;
    const dist = Math.hypot(ball.x - hx, ball.y - hy);

    if (dist < ball.r + 30 && ball.vy > 0) {
      if (lastHand === hand) return false;

      lastHand = hand;
      score++;
      comboCount++;
      scoreEl.textContent = score;

      ball.vx = (hand === 'left') ? Math.abs(ball.vx) + 1 : -(Math.abs(ball.vx) + 1);
      ball.vy = -(Math.abs(ball.vy) + 0.5);

      ball.vx = Math.max(-14, Math.min(14, ball.vx));
      ball.vy = Math.max(-14, Math.min(-3, ball.vy));

      if (comboCount % 5 === 0) showCombo(`🔥 COMBO x${comboCount}!`, '#ff6b6b');
      else if (comboCount > 1) showCombo(`+1 STREAK: ${comboCount}`, '#00ffcc');

      return true;
    }
    return false;
  };

  checkOne(leftWrist, 'left');
  checkOne(rightWrist, 'right');
}

function update() {
  if (!gameActive) return;

  ball.vy += 0.25;

  ball.trail.push({ x: ball.x, y: ball.y });
  if (ball.trail.length > 12) ball.trail.shift();

  ball.x += ball.vx;
  ball.y += ball.vy;

  if (ball.x < ball.r) { ball.x = ball.r; ball.vx = Math.abs(ball.vx); }
  if (ball.x > W - ball.r) { ball.x = W - ball.r; ball.vx = -Math.abs(ball.vx); }
  if (ball.y < ball.r) { ball.y = ball.r; ball.vy = Math.abs(ball.vy); }

  if (ball.y > H + 60) {
    gameOver();
  }

  checkHit();
}

function gameOver() {
  gameActive = false;
  overlay.innerHTML = `
    <h1>GAME OVER</h1>
    <p style="font-size:1.5rem; color:#fff; margin:12px 0">Score: <span style="color:#00ffcc">${score}</span></p>
    <p style="color:#aaa">Ball fell! Keep it airborne next time.</p>
    <button onclick="restart()" style="margin-top:24px; padding:14px 40px; background:transparent; border:2px solid #00ffcc; color:#00ffcc; font-size:1.1rem; font-family:'Courier New',monospace; letter-spacing:3px; cursor:pointer;">PLAY AGAIN</button>
  `;
  overlay.style.display = 'flex';
}

function restart() {
  score = 0;
  comboCount = 0;
  scoreEl.textContent = '0';
  overlay.style.display = 'none';
  resetBall();
  gameActive = true;
}

function gameLoop() {
  ctx.clearRect(0, 0, W, H);
  update();
  drawHand(leftWrist, '#00ffcc', 'L');
  drawHand(rightWrist, '#ff6b6b', 'R');
  drawBall();

  if (gameActive && ball.vy > 0 && ball.y > H * 0.5) {
    ctx.fillStyle = ball.vx > 0 ? '#ff6b6b' : '#00ffcc';
    ctx.font = 'bold 18px Courier New';
    ctx.textAlign = 'center';
    ctx.fillText(ball.vx > 0 ? '→ RIGHT HAND' : '← LEFT HAND', W/2, H - 20);
  }

  requestAnimationFrame(gameLoop);
}

let poseReady = false;

function startGame() {
  overlay.style.display = 'none';
  initCamera();
}

function initCamera() {
  statusEl.textContent = 'REQUESTING CAMERA...';

  const pose = new Pose({
    locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`
  });

  pose.setOptions({
    modelComplexity: 1,
    smoothLandmarks: true,
    enableSegmentation: false,
    minDetectionConfidence: 0.6,
    minTrackingConfidence: 0.6
  });

  pose.onResults((results) => {
    if (!poseReady) {
      poseReady = true;
      statusEl.textContent = 'POSE DETECTED ✓';
      resetBall();
      gameActive = true;
    }

    if (results.poseLandmarks) {
      const lm = results.poseLandmarks;
      leftWrist  = { x: 1 - lm[16].x, y: lm[16].y };
      rightWrist = { x: 1 - lm[15].x, y: lm[15].y };
    } else {
      leftWrist = null;
      rightWrist = null;
    }
  });

  const camera = new Camera(video, {
    onFrame: async () => { await pose.send({ image: video }); },
    width: 1280, height: 720
  });

  camera.start().then(() => {
    statusEl.textContent = 'DETECTING POSE...';
  }).catch(err => {
    statusEl.textContent = 'CAMERA ERROR';
    overlay.style.display = 'flex';
    overlay.innerHTML = `<h1 style="color:#ff6b6b">Camera Error</h1><p>${err.message}</p>`;
  });
}

gameLoop();
</script>
</body>
</html>

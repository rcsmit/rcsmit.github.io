<!-- version history

# version : 20260531-151000 - Neutral light sidebar background, divider line between columns
# version : 20260531-152000 - Print: all backgrounds white, no color printing
# version : 20260531-153000 - Larger font sizes throughout (~14px body online, 11pt on paper)
# version : 20260531-154000 - UITGEBREID flag: compact shows "Summer YYYY, YYYY" for summer-only jobs
# version : 20260531-155000 - Fix summer year overflow: split onto two lines, allow wrapping

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --font-body:    'DM Sans', system-ui, sans-serif;
  --font-display: 'Cormorant Garamond', Georgia, serif;

  --bg:           #f2ede6;
  --paper:        #ffffff;
  --sidebar-bg:   #f0ece4;
  --sidebar-text: #2a2a28;
  --sidebar-mid:  #6a6a64;
  --sidebar-rule: rgba(0,0,0,0.10);
  --sidebar-accent: #8a6020;

  --ink:          #1c1c1a;
  --ink-mid:      #4a4a46;
  --ink-light:    #8a8a84;
  --accent:       #b5823a;
  --accent-soft:  #f0e8d8;
  --rule:         rgba(0,0,0,0.09);
  --rule-strong:  rgba(0,0,0,0.18);

  --sidebar-w:    240px;
  --label-w:      130px;
  --max-w:        1020px;
}

html, body {
  background: var(--bg);
  font-family: var(--font-body);
  color: var(--ink);
  line-height: 1.6;
  min-height: 100vh;
}
body {
  padding: 2.5rem 1.5rem 5rem;
  display: flex;
  justify-content: center;
  align-items: flex-start;
}

/* ── OUTER SHELL ── */
.cv-shell {
  width: 100%;
  max-width: var(--max-w);
  display: flex;
  box-shadow: 0 4px 32px rgba(0,0,0,0.13);
  border-radius: 4px;
  overflow: hidden;
}

/* ══════════════════════════════
   SIDEBAR
══════════════════════════════ */
.cv-sidebar {
  width: var(--sidebar-w);
  flex-shrink: 0;
  background: var(--sidebar-bg);
  color: var(--sidebar-text);
  padding: 2.5rem 1.5rem 3rem;
  display: flex;
  flex-direction: column;
  gap: 2rem;
  border-right: 1px solid rgba(0,0,0,0.13);
}

/* Photo */
.photo-wrap {
  width: 100%;
  /* aspect-ratio: 1 / 1; */
  border-radius: 4px;
  overflow: hidden;
  background: #ddd8ce;
  border: 1px solid rgba(0,0,0,0.12);
  position: relative;
}
.photo-wrap img {
  width: 100%; height: 100%;
  object-fit: cover; display: block;
}
.photo-placeholder {
  width: 100%; height: 100%;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 8px;
  color: var(--sidebar-mid);
}
.photo-placeholder svg {
  width: 48px; height: 48px;
  opacity: 0.35;
}
.photo-placeholder span {
  font-size: 12px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  opacity: 0.4;
}

/* Sidebar section */
.sb-section { display: flex; flex-direction: column; gap: 0.6rem; }
.sb-title {
  font-size: 11px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--sidebar-accent);
  font-weight: 500;
  padding-bottom: 0.35rem;
  border-bottom: 1px solid var(--sidebar-rule);
  margin-bottom: 0.25rem;
}
.sb-name {
  font-family: var(--font-display);
  font-size: 30px; font-weight: 700;
  color: var(--ink);
  line-height: 1.15;
  margin-bottom: 0.15rem;
}
.sb-tagline {
  font-size: 13.5px; font-weight: 300;
  color: var(--sidebar-mid);
  line-height: 1.5;
  font-style: italic;
}

.sb-info-row {
  display: flex; flex-direction: column; gap: 1px;
}
.sb-info-label {
  font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase;
  color: var(--sidebar-accent); margin-top: 0.6rem; margin-bottom: 1px;
}
.sb-info-val {
  font-size: 14px; color: var(--sidebar-text); line-height: 1.5;
}

/* Language bars */
.lang-row { margin-bottom: 6px; }
.lang-name {
  display: flex; justify-content: space-between; align-items: baseline;
  font-size: 14px; color: var(--sidebar-text); margin-bottom: 3px;
}
.lang-fluency { font-size: 12px; color: var(--sidebar-mid); }
.lang-bar-bg {
  height: 3px; background: rgba(0,0,0,0.12); border-radius: 2px; overflow: hidden;
}
.lang-bar-fill {
  height: 100%; background: var(--sidebar-accent); border-radius: 2px;
  transition: width 0.6s ease;
}

/* Skills pills (sidebar) */
.sb-skills { display: flex; flex-wrap: wrap; gap: 5px; }
.sb-skill {
  font-size: 13px; color: var(--sidebar-mid);
  border: 1px solid rgba(0,0,0,0.15);
  border-radius: 2px; padding: 2px 8px; line-height: 1.6;
}

/* Certificates */
.sb-cert {
  font-size: 14px; color: var(--sidebar-mid); line-height: 1.6;
  padding-left: 10px; position: relative;
}
.sb-cert::before { content: '—'; position: absolute; left: 0; color: var(--sidebar-accent); font-size: 11px; top: 3px; }

/* ══════════════════════════════
   MAIN
══════════════════════════════ */
.cv-main {
  flex: 1;
  background: var(--paper);
  padding: 2.5rem 2.5rem 3rem;
  min-width: 0;
}

.main-name {
  font-family: var(--font-display);
  font-size: 42px; font-weight: 600;
  letter-spacing: -0.01em; color: var(--ink); line-height: 1.1;
}
.main-tagline {
  margin-top: 0.4rem; font-size: 15px;
  color: var(--ink-mid); font-weight: 300; letter-spacing: 0.02em;
}
.main-header {
  border-bottom: 2px solid var(--ink);
  padding-bottom: 1.25rem;
  margin-bottom: 2rem;
}

/* Section */
.section { margin-bottom: 2.5rem; }
.section-title {
  font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase;
  color: var(--accent); font-weight: 500;
  margin-bottom: 1.1rem; padding-bottom: 0.35rem;
  border-bottom: 1px solid var(--accent-soft);
}

/* Work entries */
.work-entries { display: flex; flex-direction: column; gap: 1.5rem; }
.work-entry {
  display: grid; grid-template-columns: var(--label-w) 1fr;
  gap: 0 1.25rem; align-items: start;
}
.work-meta { padding-top: 2px; text-align: right; }
.work-period { font-size: 13px; color: var(--ink-light); line-height: 1.5; white-space: normal; word-break: break-word; }
.work-seasons-badge { font-size: 12px; color: var(--ink-light); margin-top: 1px; }
.work-title { font-size: 16px; font-weight: 500; color: var(--ink); line-height: 1.3; }
.work-company { display: inline-flex; align-items: center; gap: 5px; margin-top: 2px; }
.work-dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.work-company-name { font-size: 14.5px; color: var(--ink-mid); font-weight: 400; }
.work-loc { font-size: 13.5px; color: var(--ink-light); margin-top: 1px; }
.work-sub-periods { font-size: 13px; color: var(--ink-light); margin-top: 3px; font-style: italic; }
.work-highlights { margin-top: 5px; list-style: none; display: flex; flex-direction: column; gap: 1px; }
.work-highlights li {
  font-size: 14px; color: var(--ink-mid);
  padding-left: 12px; position: relative; line-height: 1.5;
}
.work-highlights li::before {
  content: '—'; position: absolute; left: 0;
  color: var(--accent); font-size: 11px; top: 3px;
}

/* Education */
.edu-entry { display: grid; grid-template-columns: var(--label-w) 1fr; gap: 0 1.25rem; }
.edu-year { font-size: 13px; color: var(--ink-light); padding-top: 2px; text-align: right; }
.edu-title { font-size: 16px; font-weight: 500; color: var(--ink); }
.edu-inst  { font-size: 14px; color: var(--ink-mid); margin-top: 1px; }

/* ── GANTT ── */
.gantt-wrap { width: 100%; }
.gantt-axis-row {
  display: flex;
  margin-left: var(--label-w);
  border-bottom: 1px solid var(--rule-strong);
}
.gantt-axis-year {
  flex-shrink: 0; font-size: 12px; color: var(--ink-light);
  padding-bottom: 3px; padding-left: 3px;
  border-left: 1px solid var(--rule);
  font-family: var(--font-body);
}
.gantt-row {
  display: flex; align-items: center;
  min-height: 32px; border-bottom: 1px solid var(--rule);
}
.gantt-row:last-child { border-bottom: none; }
.gantt-row.group-camping     { background: #fffef5; }
.gantt-row.group-hospitality { background: #fff8f8; }
.gantt-label {
  flex-shrink: 0; width: var(--label-w);
  padding-right: 8px; font-size: 12.5px; color: var(--ink-mid);
  text-align: right; line-height: 1.3; font-family: var(--font-body);
}
.gantt-bars { flex: 1; position: relative; height: 32px; min-width: 0; }
.gantt-grid-line {
  position: absolute; top: 0; bottom: 0;
  width: 1px; background: var(--rule); pointer-events: none;
}
.gantt-bar {
  position: absolute; top: 50%; transform: translateY(-50%);
  height: 12px; border-radius: 6px;
  cursor: pointer; transition: height 0.15s, filter 0.15s;
  display: flex; align-items: center; overflow: hidden; min-width: 2px;
}
.gantt-bar:hover { height: 20px; filter: brightness(1.1); z-index: 10; }
.gantt-bar-label {
  font-size: 11px; font-weight: 500;
  white-space: nowrap; overflow: hidden; text-overflow: clip;
  padding: 0 6px; pointer-events: none; font-family: var(--font-body);
}
.gantt-bar.too-narrow .gantt-bar-label { visibility: hidden; }

/* Tooltip */
.cv-tooltip {
  position: fixed; background: var(--paper);
  border: 1px solid var(--rule-strong); border-radius: 8px;
  padding: 10px 14px; font-size: 13px; line-height: 1.6;
  z-index: 1000; min-width: 200px; max-width: 260px;
  pointer-events: none; opacity: 0; transition: opacity 0.12s;
  font-family: var(--font-body); box-shadow: 0 4px 16px rgba(0,0,0,0.10);
}
.cv-tooltip.visible { opacity: 1; }
.cv-tooltip-title  { font-weight: 500; font-size: 15px; color: var(--ink); margin-bottom: 1px; }
.cv-tooltip-sub    { color: var(--ink-mid); font-size: 14px; }
.cv-tooltip-loc    { color: var(--ink-light); font-size: 13px; }
.cv-tooltip-period { color: var(--ink-light); font-size: 13px; margin-top: 1px; }
.cv-tooltip-hi     { margin-top: 7px; border-top: 1px solid var(--rule); padding-top: 6px; list-style: none; }
.cv-tooltip-hi li  { color: var(--ink-mid); padding-left: 12px; position: relative; font-size: 13px; }
.cv-tooltip-hi li::before { content: '·'; position: absolute; left: 3px; color: var(--ink-light); }

@media (max-width: 768px) {
  .cv-tooltip {
    position: fixed; left: 50% !important; top: 50% !important;
    transform: translate(-50%,-50%); max-width: 85vw; min-width: 220px;
  }
}

/* Loading / error */
.loading { text-align: center; padding: 4rem 2rem; font-size: 15px; color: var(--ink-light); font-style: italic; }
.error { background: #fff0f0; border: 1px solid #f5c0c0; border-radius: 6px; padding: 1rem 1.25rem; font-size: 15px; color: #a03030; }

/* Photo + name row */
.photo-name-row {
  display: contents; /* desktop: items flow normally in sidebar column */
}

@media (max-width: 640px) {
  .photo-name-row {
    display: flex;
    flex-direction: row;
    align-items: center;
    gap: 1rem;
    background: white;
    padding: 1.25rem 1.5rem 1rem;
    border-bottom: 1px solid rgba(0,0,0,0.08);
    width: 100%;
  }
}
@media (max-width: 640px) {
  .sb-personal-lang-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0 1rem;
  }
}
/* On desktop sidebar they stay stacked (sidebar is narrow) */
@media (min-width: 641px) {
  .sb-personal-lang-grid {
    display: contents;
  
  }
  .sb-name {display:none;} 
    .sb-tagline{display:none;}
}
@media (max-width: 640px) {
  body { padding: 0; }
  .cv-shell { flex-direction: column; border-radius: 0; }
  .cv-sidebar {
    width: 100%;
    flex-direction: column;
    padding: 0;
    gap: 0;
    border-right: none;
    border-bottom: 1px solid rgba(0,0,0,0.13);
  }
  /* Photo inside the row: natural ratio, fixed width */
  .photo-wrap {
    width: 80px !important;
    height: auto !important;
    aspect-ratio: unset !important;
    background: #ddd8ce !important;
    border-radius: 4px !important;
    border: 1px solid rgba(0,0,0,0.10) !important;
    padding: 0 !important;
    flex-shrink: 0;
  }
  .photo-wrap img {
    width: 100%;
    height: auto;
    display: block;
    border-radius: 4px;
  }
  .photo-placeholder {
    width: 100%;
    height: 80px;
  }
  /* Name block: no extra background/padding — row handles it */
  .sb-section-nameblock {
    background: transparent;
    padding: 0;
    border-bottom: none;
    flex: 1;
    min-width: 0;
  }
  /* Rest of sidebar sections: normal padding */
  .sb-section:not(.sb-section-nameblock) {
    padding: 1rem 1.5rem;
  }
  .sb-personal-lang-grid {
    padding: 1rem 1.5rem;
  }
  .sb-name { font-size: 22px; }
  .cv-main { padding: 1.5rem; }
  .main-header { display: none; }
  :root { --label-w: 80px; }
}

@media print {
  body { background: white !important; padding: 0; }
  .cv-shell { box-shadow: none; border-radius: 0; }
  .cv-sidebar { background: white !important; -webkit-print-color-adjust: economy; print-color-adjust: economy; }
  .cv-main { background: white !important; }
  .gantt-row.group-camping, .gantt-row.group-hospitality { background: white !important; }
  .photo-wrap { background: #eee !important; }
  .cv-tooltip { display: none; }

  /* 11pt body → scale everything relative to that */
  .work-highlights li, .work-sub-periods, .work-loc      { font-size: 10pt !important; }
  .work-period, .work-seasons-badge, .edu-year           { font-size: 9pt  !important; }
  .work-title, .edu-title                                { font-size: 12pt !important; }
  .work-company-name                                     { font-size: 11pt !important; }
  .section-title                                         { font-size: 8pt  !important; }
  .main-name                                             { font-size: 26pt !important; }
  .main-tagline                                          { font-size: 10pt !important; }
  .sb-name                                               { font-size: 18pt !important; }
  .sb-tagline, .sb-info-val, .lang-name, .sb-skill       { font-size: 9pt  !important; }
  .sb-title, .sb-info-label                              { font-size: 7pt  !important; }
  .gantt-label, .gantt-axis-year, .gantt-bar-label       { font-size: 8pt  !important; }
}
</style>

<div class="cv-shell" id="cv-shell">
  <div class="loading" style="padding:4rem;width:100%;text-align:center;">Loading CV…</div>
</div>
<div id="cv-tooltip" class="cv-tooltip"></div>

<script>
const CV_URL = 'https://raw.githubusercontent.com/rcsmit/streamlit_scripts/refs/heads/main/input/cv_rene_smit_json_resume.json';

// ── DISPLAY MODE ─────────────────────────────────────────────
// false = compact: summer jobs shown as "Summer YYYY, YYYY, …"
// true  = uitgebreid: exact month–month dates for every entry
const UITGEBREID = false;
// true = show "Save as HTML" button at bottom of page
const SHOW_HTML =false;
// ─────────────────────────────────────────────────────────────

const KNOWN_COLORS = {
  'eurocamp':                 { color:'#FFAD00', textColor:'#042C53' },
  'vacansoleil':              { color:'#142F5E', textColor:'#ffffff' },
  'selectcamp':               { color:'#A8003B', textColor:'#ffffff' },
  'camping village fabulous': { color:'#95C225', textColor:'#412402' },
  'disneyland':               { color:'#D4537E', textColor:'#ffffff' },
  'jmw':                      { color:'#D85A30', textColor:'#ffffff' },
  'hotel papendal':           { color:'#EE7202', textColor:'#ffffff' },
  '68 degrees':               { color:'#ED174F', textColor:'#ffffff' },
  'peeze':                    { color:'#9FC648', textColor:'#2C2C2A' },
};
const FALLBACK_COLORS = [
  { color:'#639922', textColor:'#173404' },
  { color:'#BA7517', textColor:'#412402' },
  { color:'#993556', textColor:'#4B1528' },
  { color:'#185FA5', textColor:'#042C53' },
  { color:'#5F5E5A', textColor:'#2C2C2A' },
];
let fallbackIdx = 0;

function getColor(name) {
  const lower = name.toLowerCase();
  for (const key of Object.keys(KNOWN_COLORS)) {
    if (lower.includes(key)) return KNOWN_COLORS[key];
  }
  return FALLBACK_COLORS[fallbackIdx++ % FALLBACK_COLORS.length];
}

// Map CEFR/fluency to 0-1 fill fraction
const LANG_LEVEL_MAP = {
  'A1':1/6,'A1/A2':1.5/6,'A2':2/6,'A2/B1':2.5/6,
  'B1':3/6,'B1/B2':3.5/6,'B2':4/6,'B2/C1':4.5/6,
  'C1':5/6,'C1/C2':5.5/6,'C2':1
};
function langFill(fluency) {
  return (LANG_LEVEL_MAP[fluency] || 0.5) * 100;
}

const MO = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

function toDecYear(str) {
  const p = str.split('-').map(Number);
  const y=p[0], m=(p[1]||1)-1, d=p[2]||1;
  const date=new Date(y,m,d), s=new Date(y,0,1), e=new Date(y+1,0,1);
  return y+(date-s)/(e-s);
}
function fmtDate(str) {
  const p = str.split('-').map(Number);
  if (p.length===1) return ''+p[0];
  return MO[p[1]-1]+' '+p[0];
}
function fmtPeriod(s,e) { return fmtDate(s)+' – '+fmtDate(e); }

// Returns true when a job runs only within the Mar–Oct window of a single year
function isSummerJob(job) {
  const s = job.startDate.split('-').map(Number);
  const e = job.endDate.split('-').map(Number);
  if (!s[1] || !e[1]) return false;           // year-only dates → not summer
  if (s[0] !== e[0]) return false;             // spans two calendar years → not summer
  return s[1] >= 3 && e[1] <= 10;             // Mar–Oct within same year
}

// For a group of jobs: if compact mode AND all are summer jobs, return
// "Summer YYYY, YYYY, …" — otherwise fall back to the normal period string.
function fmtGroupPeriod(jobs) {
  if (UITGEBREID) return null; // signal: use normal rendering
  const sorted = [...jobs].sort((a,b) => a.startDate.localeCompare(b.startDate));
  if (sorted.every(isSummerJob)) {
    const years = sorted.map(j => j.startDate.split('-')[0]);
    return 'Summer ' + years.join(', ');
  }
  return null; // not all summer → use normal rendering
}

const ROW_ORDER = [
  'eurocamp','vacansoleil','selectcamp','camping village fabulous',
  'disneyland paris','hotel papendal','68 degrees','jmw','koffiebranderij peeze'
];
function sortKey(name) {
  const lower = name.toLowerCase();
  const i = ROW_ORDER.findIndex(k => lower.includes(k));
  return i===-1 ? 999 : i;
}

function el(tag, cls, text) {
  const e = document.createElement(tag);
  if (cls) e.className = cls;
  if (text !== undefined) e.textContent = text;
  return e;
}

/* ════════════════════════
   SIDEBAR
════════════════════════ */
function buildSidebar(data) {
  const sidebar = el('div', 'cv-sidebar');

  // Photo
  const photoWrap = el('div', 'photo-wrap');
  const img = document.createElement('img');
  img.src = 'photo.jpg';
  img.alt = data.basics.name;
  img.onerror = function() {
    this.remove();
    const ph = el('div', 'photo-placeholder');
    ph.innerHTML = `
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">
        <circle cx="12" cy="8" r="4"/>
        <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
      </svg>
      <span>photo.jpg</span>`;
    photoWrap.appendChild(ph);
  };
  photoWrap.appendChild(img);

  // Photo + name side by side on mobile
  const photoNameRow = el('div', 'photo-name-row');
  photoNameRow.appendChild(photoWrap);

  // Name + tagline block
  const nameBlock = el('div', 'sb-section sb-section-nameblock');
  nameBlock.appendChild(el('div', 'sb-name', data.basics.name));
  if (data.basics.summary) nameBlock.appendChild(el('div', 'sb-tagline', data.basics.summary));
  photoNameRow.appendChild(nameBlock);

  sidebar.appendChild(photoNameRow);

  // Personal + Languages: side-by-side on mobile, stacked on desktop
  const plGrid = el('div', 'sb-personal-lang-grid');

  // Personal info
  const infoBlock = el('div', 'sb-section');
  infoBlock.appendChild(el('div', 'sb-title', 'Personal'));

  const fields = [
    ['Nationality', data.basics.nationality],
    ['Born', data.basics.birthDate ? new Date(data.basics.birthDate).toLocaleDateString('en-GB', {day:'numeric',month:'long',year:'numeric'}) : null],
    ['Location', data.basics.location ? data.basics.location.countryCode : null],
  ];
  fields.forEach(([label, val]) => {
    if (!val) return;
    infoBlock.appendChild(el('div', 'sb-info-label', label));
    infoBlock.appendChild(el('div', 'sb-info-val', val));
  });
  plGrid.appendChild(infoBlock);

  // Languages
  if (data.languages && data.languages.length) {
    const langBlock = el('div', 'sb-section');
    langBlock.appendChild(el('div', 'sb-title', 'Languages'));
    data.languages.forEach(l => {
      const row = el('div', 'lang-row');
      const nameRow = el('div', 'lang-name');
      nameRow.appendChild(document.createTextNode(l.language));
      nameRow.appendChild(el('span', 'lang-fluency', l.fluency));
      row.appendChild(nameRow);
      const bg = el('div', 'lang-bar-bg');
      const fill = el('div', 'lang-bar-fill');
      fill.style.width = langFill(l.fluency) + '%';
      bg.appendChild(fill);
      row.appendChild(bg);
      langBlock.appendChild(row);
    });
    plGrid.appendChild(langBlock);
  }

  sidebar.appendChild(plGrid);

  // Skills
  const skillNames = (data.skills || []).map(s => s.name);
  if (skillNames.length) {
    const skillBlock = el('div', 'sb-section');
    skillBlock.appendChild(el('div', 'sb-title', 'Skills'));
    const pills = el('div', 'sb-skills');
    skillNames.forEach(s => pills.appendChild(el('span', 'sb-skill', s)));
    skillBlock.appendChild(pills);
    sidebar.appendChild(skillBlock);
  }

  // Certificates
  if (data.certificates && data.certificates.length) {
    const certBlock = el('div', 'sb-section');
    certBlock.appendChild(el('div', 'sb-title', 'Certificates'));
    data.certificates.forEach(c => certBlock.appendChild(el('div', 'sb-cert', c.name)));
    sidebar.appendChild(certBlock);
  }

  return sidebar;
}

/* ════════════════════════
   WORK SECTION
════════════════════════ */
// Employers that get merged into one "Winter hospitality" block in compact mode
const WINTER_KEYS  = ['hotel papendal', '68 degrees', 'jmw'];
const CAMPING_KEYS = ['eurocamp', 'vacansoleil', 'selectcamp'];

function isWinterEmp(name)  { return WINTER_KEYS.some(k  => name.toLowerCase().includes(k)); }
function isCampingEmp(name) { return CAMPING_KEYS.some(k => name.toLowerCase().includes(k)); }

/* Generic grouped block renderer (camping reps, winter hospitality, etc.)
   - label      : "Summer" | "Winter" | null (auto-detect from jobs)
   - blockTitle : e.g. "Camping representative / courier"
   - blockLoc   : e.g. "Italy · Netherlands"
   - emps       : array of { name, color, jobs[] }
*/
function renderGroupBlock(emps, blockTitle, blockLoc, entries) {
  const allJobs = emps.flatMap(emp =>
    emp.jobs.map(j => ({ ...j, empName: emp.name, empColor: emp.color }))
  ).sort((a,b) => a.startDate.localeCompare(b.startDate));

  // Determine if all jobs are summer jobs
  const allSummer = allJobs.every(isSummerJob);

  // Split into contiguous year-clusters
  const clusters = [];
  allJobs.forEach(job => {
    const startY = parseInt(job.startDate.split('-')[0]);
    const last   = clusters[clusters.length - 1];
    if (!last) { clusters.push([job]); return; }
    const lastEndY = parseInt(last[last.length - 1].endDate.split('-')[0]);
    if (startY - lastEndY > 1) clusters.push([job]);
    else last.push(job);
  });

  const highlights = (allJobs[0].highlights||[]).map(h=>h.trim()).filter(Boolean);

  const entry = el('div', 'work-entry');
  const meta  = el('div', 'work-meta');

  const periodLbl = el('div', 'work-period');
  let html = '';

  if (!UITGEBREID) {
    // Always use cluster-based lines so gaps show as separate ranges
    const labelWord = emps.every(e => isWinterEmp(e.name)) ? 'Winter' : 'Summer';
    html = '<span style="display:block;font-size:0.85em;letter-spacing:0.05em;text-transform:uppercase;opacity:0.7;">' + labelWord + '</span>';
    clusters.forEach(cluster => {
      const fy = cluster[0].startDate.split('-')[0];
      const ly = cluster[cluster.length - 1].endDate.split('-')[0];
      html += '<span style="display:block;">' + (fy === ly ? fy : fy + ' \u2013 ' + ly) + '</span>';
    });
  } else {
    // UITGEBREID: exact earliest–latest with seasons badge
    const earliest = allJobs[0];
    const latest   = allJobs[allJobs.length - 1];
    html = '<span style="display:block;">' + fmtPeriod(earliest.startDate, latest.endDate) + '</span>';
    html += '<span style="display:block;font-size:0.9em;opacity:0.7;">(' + allJobs.length + ' seasons)</span>';
  }

  periodLbl.innerHTML = html;
  meta.appendChild(periodLbl);
  entry.appendChild(meta);

  const body = el('div', 'work-body');
  body.appendChild(el('div', 'work-title', blockTitle));

  // Multi-dot company row
  const companyRow = el('div', 'work-company');
  companyRow.style.flexWrap = 'wrap';
  companyRow.style.gap = '6px';
  emps.forEach((emp, i) => {
    if (i > 0) companyRow.appendChild(document.createTextNode(' · '));
    const dot = el('span', 'work-dot');
    dot.style.background = emp.color.color;
    companyRow.appendChild(dot);
    companyRow.appendChild(el('span', 'work-company-name', emp.name));
  });
  body.appendChild(companyRow);

  if (blockLoc) body.appendChild(el('div', 'work-loc', blockLoc));

  // In UITGEBREID mode: show per-employer sub-periods
  if (UITGEBREID) {
    const subLine = allJobs.map(j => fmtPeriod(j.startDate, j.endDate)).join(' · ');
    body.appendChild(el('div', 'work-sub-periods', subLine));
  }

  if (highlights.length) {
    const ul = el('ul', 'work-highlights');
    highlights.forEach(h => ul.appendChild(el('li', null, h)));
    body.appendChild(ul);
  }

  entry.appendChild(body);
  entries.appendChild(entry);
}


function renderEntry(jobs, empName, empColor, entries) {
  const earliest   = jobs.reduce((a,b) => a.startDate < b.startDate ? a : b);
  const latest     = jobs.reduce((a,b) => a.endDate   > b.endDate   ? a : b);
  const isMulti    = jobs.length > 1;
  const locs       = [...new Set(jobs.map(j=>(j.location||'').trim()).filter(Boolean))];
  const highlights = (earliest.highlights||[]).map(h=>h.trim()).filter(Boolean);
  const title      = jobs[0].position.trim();

  const entry = el('div', 'work-entry');
  const meta  = el('div', 'work-meta');

  const summerStr = fmtGroupPeriod(jobs);
  if (summerStr) {
    const years = [...jobs].sort((a,b)=>a.startDate.localeCompare(b.startDate))
      .map(j=>j.startDate.split('-')[0]);
    const lbl = el('div', 'work-period');
    lbl.innerHTML =
      '<span style="display:block;font-size:0.85em;letter-spacing:0.05em;text-transform:uppercase;opacity:0.7;">Summer</span>'
      +'<span style="display:block;">'+years.join(', ')+'</span>';
    meta.appendChild(lbl);
  } else {
    meta.appendChild(el('div', 'work-period', fmtPeriod(earliest.startDate, latest.endDate)));
    if (isMulti) meta.appendChild(el('div', 'work-seasons-badge', `(${jobs.length} seasons)`));
  }
  entry.appendChild(meta);

  const body = el('div', 'work-body');
  body.appendChild(el('div', 'work-title', title));
  const companyRow = el('div', 'work-company');
  const dot = el('span', 'work-dot');
  dot.style.background = empColor.color;
  companyRow.appendChild(dot);
  companyRow.appendChild(el('span', 'work-company-name', empName));
  body.appendChild(companyRow);
  if (locs.length) body.appendChild(el('div', 'work-loc', locs.join(' · ')));
  if (isMulti && (UITGEBREID || !summerStr)) {
    const sorted = [...jobs].sort((a,b)=>a.startDate.localeCompare(b.startDate));
    body.appendChild(el('div', 'work-sub-periods',
      sorted.map(j=>fmtPeriod(j.startDate, j.endDate)).join(' · ')
    ));
  }
  if (highlights.length) {
    const ul = el('ul', 'work-highlights');
    highlights.forEach(h => ul.appendChild(el('li', null, h)));
    body.appendChild(ul);
  }
  entry.appendChild(body);
  entries.appendChild(entry);
}

/* Thin wrappers for known groups */
function renderWinterBlock(winterEmps, entries) {
  renderGroupBlock(winterEmps, 'Waiter / hospitality', 'Arnhem, Netherlands', entries);
}
function renderCampingBlock(campingEmps, entries) {
  const locs = [...new Set(
    campingEmps.flatMap(e => e.jobs.map(j => (j.location||'').trim()).filter(Boolean))
      .map(l => {
        // Simplify to country/region
        if (l.toLowerCase().includes('italy') || l.toLowerCase().includes('caorle') || l.toLowerCase().includes('rome')) return 'Italy';
        if (l.toLowerCase().includes('netherlands') || l.toLowerCase().includes('nederland') || l.toLowerCase().includes('sevenum') || l.toLowerCase().includes('nunspeet')) return 'Netherlands';
        return l;
      })
  )];
  renderGroupBlock(campingEmps, 'Camping representative / courier', locs.join(' · '), entries);
}

function buildWorkSection(workData) {
  const empMap = {};
  workData.forEach(job => {
    const name = job.name.trim();
    if (!empMap[name]) empMap[name] = { name, color: getColor(name), jobs: [] };
    empMap[name].jobs.push(job);
  });
  const employers = Object.values(empMap).sort((a,b) => sortKey(a.name) - sortKey(b.name));

  const section = el('section', 'section');
  section.appendChild(el('div', 'section-title', 'Work Experience'));
  const entries = el('div', 'work-entries');

  if (!UITGEBREID) {
    const winterEmps  = employers.filter(e => isWinterEmp(e.name));
    const campingEmps = employers.filter(e => isCampingEmp(e.name));
    const normalEmps  = employers.filter(e => !isWinterEmp(e.name) && !isCampingEmp(e.name));

    let winterInserted  = false;
    let campingInserted = false;

    const firstWinterIdx  = employers.findIndex(e => isWinterEmp(e.name));
    const firstCampingIdx = employers.findIndex(e => isCampingEmp(e.name));

    normalEmps.forEach(emp => {
      const currentIdx = employers.indexOf(emp);

      if (!campingInserted && campingEmps.length && currentIdx > firstCampingIdx) {
        renderCampingBlock(campingEmps, entries);
        campingInserted = true;
      }
      if (!winterInserted && winterEmps.length && currentIdx > firstWinterIdx) {
        renderWinterBlock(winterEmps, entries);
        winterInserted = true;
      }

      const titleGroups = [];
      emp.jobs.forEach(job => {
        const title = job.position.trim();
        let g = titleGroups.find(g => g.title === title);
        if (!g) { g = { title, jobs:[] }; titleGroups.push(g); }
        g.jobs.push(job);
      });
      titleGroups.forEach(group => renderEntry(group.jobs, emp.name, emp.color, entries));
    });

    if (!campingInserted && campingEmps.length) renderCampingBlock(campingEmps, entries);
    if (!winterInserted  && winterEmps.length)  renderWinterBlock(winterEmps, entries);

  } else {
    // UITGEBREID: render camping and winter as individual grouped blocks but with full dates
    const winterEmps  = employers.filter(e => isWinterEmp(e.name));
    const campingEmps = employers.filter(e => isCampingEmp(e.name));
    const normalEmps  = employers.filter(e => !isWinterEmp(e.name) && !isCampingEmp(e.name));

    let winterInserted = false, campingInserted = false;
    const firstWinterIdx  = employers.findIndex(e => isWinterEmp(e.name));
    const firstCampingIdx = employers.findIndex(e => isCampingEmp(e.name));

    normalEmps.forEach(emp => {
      const currentIdx = employers.indexOf(emp);
      if (!campingInserted && campingEmps.length && currentIdx > firstCampingIdx) { renderCampingBlock(campingEmps, entries); campingInserted = true; }
      if (!winterInserted  && winterEmps.length  && currentIdx > firstWinterIdx)  { renderWinterBlock(winterEmps, entries);  winterInserted  = true; }
      const titleGroups = [];
      emp.jobs.forEach(job => {
        const title = job.position.trim();
        let g = titleGroups.find(g => g.title === title);
        if (!g) { g = { title, jobs:[] }; titleGroups.push(g); }
        g.jobs.push(job);
      });
      titleGroups.forEach(group => renderEntry(group.jobs, emp.name, emp.color, entries));
    });
    if (!campingInserted && campingEmps.length) renderCampingBlock(campingEmps, entries);
    if (!winterInserted  && winterEmps.length)  renderWinterBlock(winterEmps, entries);
  }

  section.appendChild(entries);
  return section;
}

function buildEducationSection(eduData) {
  const section = el('section', 'section');
  section.appendChild(el('div', 'section-title', 'Education'));
  eduData.forEach(e => {
    const entry = el('div', 'edu-entry');

      e.institution + (e.courses&&e.courses.length ? ' · '+e.courses.join(', ') : '')
    ));
    entry.appendChild(body);
    section.appendChild(entry);
  });
  return section;
}

/* ════════════════════════
   GANTT SECTION
════════════════════════ */
const tooltip = document.getElementById('cv-tooltip');

function moveTooltip(e) {
  if (window.innerWidth <= 768) return;
  const tw = 270;
  const left = e.clientX+16+tw > window.innerWidth ? e.clientX-tw-16 : e.clientX+16;
  tooltip.style.left = left+'px';
  tooltip.style.top  = (e.clientY+14)+'px';
}

function buildGanttSection(workData) {
  const empMap = {};
  workData.forEach(job => {
    const name = job.name.trim();
    if (!empMap[name]) empMap[name] = { name, color: getColor(name), jobs: [] };
    empMap[name].jobs.push(job);
  });
  const rows = Object.values(empMap).sort((a,b) => sortKey(a.name) - sortKey(b.name));

  const allYears = rows.flatMap(r => r.jobs.flatMap(j => [toDecYear(j.startDate), toDecYear(j.endDate)]));
  const YEAR_START = Math.floor(Math.min(...allYears));
  const YEAR_END   = Math.ceil(Math.max(...allYears));
  const YEAR_COUNT = YEAR_END - YEAR_START;

  function pct(yr)   { return ((yr-YEAR_START)/YEAR_COUNT*100).toFixed(4)+'%'; }
  function pctW(s,e) { return ((e-s)/YEAR_COUNT*100).toFixed(4)+'%'; }

  const section = el('section', 'section');
  section.appendChild(el('div', 'section-title', 'Career Timeline'));
  const wrap = el('div', 'gantt-wrap');

  // Axis
  const axisRow = el('div', 'gantt-axis-row');
  for (let y = YEAR_START; y < YEAR_END; y++) {
    const tick = el('div', 'gantt-axis-year');
    tick.style.width = (1/YEAR_COUNT*100).toFixed(4)+'%';
    tick.dataset.year = y;
    axisRow.appendChild(tick);
  }
  wrap.appendChild(axisRow);

  function updateAxisLabels() {
    const labelW = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--label-w')) || 110;
    const barsWidth = wrap.offsetWidth - labelW;
    const pxPerYear = barsWidth / YEAR_COUNT;
    const useShort  = pxPerYear < 28;
    const skipOdd   = pxPerYear < 18;
    axisRow.querySelectorAll('.gantt-axis-year').forEach(el => {
      const y = +el.dataset.year;
      if (skipOdd && y%2!==0) el.textContent = '';
      else el.textContent = useShort ? String(y).slice(2) : String(y);
    });
  }
  setTimeout(updateAxisLabels, 0);
  window.addEventListener('resize', updateAxisLabels);

  const CAMPING_KEYS     = ['eurocamp','vacansoleil','selectcamp'];
  const HOSPITALITY_KEYS = ['hotel papendal','68 degrees','jmw'];

  rows.forEach(row => {
    const rowEl = el('div', 'gantt-row');
    const lower = row.name.toLowerCase();
    if (CAMPING_KEYS.some(k=>lower.includes(k)))     rowEl.classList.add('group-camping');
    if (HOSPITALITY_KEYS.some(k=>lower.includes(k))) rowEl.classList.add('group-hospitality');

    rowEl.appendChild(el('div', 'gantt-label', row.name));

    const barsArea = el('div', 'gantt-bars');
    for (let y = YEAR_START; y < YEAR_END; y++) {
      const gl = el('div', 'gantt-grid-line');
      gl.style.left = pct(y);
      barsArea.appendChild(gl);
    }

    row.jobs.forEach(job => {
      const s = toDecYear(job.startDate);
      const e = toDecYear(job.endDate);
      const bar = el('div', 'gantt-bar');
      bar.style.left       = pct(s);
      bar.style.width      = pctW(s,e);
      bar.style.background = row.color.color;

      const lbl = el('span', 'gantt-bar-label', job.position.trim().replace(/^waiter.*/i, ''));
      lbl.style.color = row.color.textColor;
      bar.appendChild(lbl);

      const ro = new ResizeObserver(() => {
        bar.classList.toggle('too-narrow', bar.offsetWidth < lbl.scrollWidth + 12);
      });
      ro.observe(bar);

      function showTip() {
        tooltip.innerHTML =
          `<div class="cv-tooltip-title">${job.position.trim()}</div>` +
          `<div class="cv-tooltip-sub">${row.name}</div>` +
          (job.location ? `<div class="cv-tooltip-loc">${job.location}</div>` : '') +
          `<div class="cv-tooltip-period">${fmtPeriod(job.startDate, job.endDate)}</div>` +
          ((job.highlights||[]).length
            ? `<ul class="cv-tooltip-hi">${job.highlights.map(h=>`<li>${h.trim()}</li>`).join('')}</ul>`
            : '');
        tooltip.classList.add('visible');
      }

      bar.addEventListener('mouseenter', ev => { showTip(); moveTooltip(ev); });
      bar.addEventListener('mousemove',  moveTooltip);
      bar.addEventListener('mouseleave', () => tooltip.classList.remove('visible'));
      bar.addEventListener('touchstart', ev => { ev.preventDefault(); showTip(); }, {passive:false});
      bar.addEventListener('touchend',   () => setTimeout(() => tooltip.classList.remove('visible'), 2500));

      barsArea.appendChild(bar);
    });

    rowEl.appendChild(barsArea);
    wrap.appendChild(rowEl);
  });

  section.appendChild(wrap);
  return section;
}

/* ════════════════════════
   PAGE BUILDER
════════════════════════ */
function buildPage(data) {
  const shell = document.getElementById('cv-shell');
  shell.innerHTML = '';

  // Sidebar
  shell.appendChild(buildSidebar(data));

  // Main column
  const main = el('div', 'cv-main');

  // Main header (name + tagline repeated large in main area)
  const header = el('div', 'main-header');
  header.appendChild(el('div', 'main-name', data.basics.name));
  const yearStart = data.work.reduce((min,j) => j.startDate<min ? j.startDate : min, '9999').split('-')[0];
  const yearEnd   = data.work.reduce((max,j) => j.endDate  >max ? j.endDate   : max, '0000').split('-')[0];
  const tagline = el('div', 'main-tagline');
  tagline.textContent = (data.basics.summary||'') + '  ·  ' + yearStart + ' – ' + yearEnd;
  header.appendChild(tagline);
  main.appendChild(header);

  main.appendChild(buildWorkSection(data.work));
  if (data.education && data.education.length) main.appendChild(buildEducationSection(data.education));
  main.appendChild(buildGanttSection(data.work));

  shell.appendChild(main);

  // Save as HTML button
  if (SHOW_HTML) {
    const bar = document.createElement('div');
    bar.id = 'html-export-bar';
    bar.style.cssText = [
      'position:fixed', 'bottom:0', 'left:0', 'right:0',
      'background:rgba(250,248,245,0.96)',
      'backdrop-filter:blur(8px)',
      'border-top:1px solid rgba(0,0,0,0.10)',
      'padding:0.65rem 2rem',
      'display:flex', 'justify-content:center',
      'z-index:500',
      "font-family:'DM Sans',system-ui,sans-serif",
    ].join(';');

    const btn = document.createElement('button');
    btn.textContent = '⬇ Save as HTML';
    btn.style.cssText = [
      'background:#1c1c1a', 'color:#fff',
      'border:none', 'border-radius:4px',
      'padding:9px 22px', 'font-size:13px', 'font-weight:500',
      'cursor:pointer', "font-family:'DM Sans',system-ui,sans-serif",
      'letter-spacing:0.02em',
    ].join(';');
    btn.onmouseover = () => btn.style.background = '#3a3a38';
    btn.onmouseout  = () => btn.style.background = '#1c1c1a';
    btn.onclick = saveAsHTML;
    bar.appendChild(btn);

    document.body.appendChild(bar);
    // push page content so it isn't hidden behind bar
    document.body.style.paddingBottom = '52px';
  }
}

function saveAsHTML() {
  // Collect all <style> blocks from the document
  const styles = Array.from(document.querySelectorAll('style'))
    .map(s => s.outerHTML).join('\n');

  // Get current rendered HTML of the CV shell
  const shellHTML = document.getElementById('cv-shell').outerHTML;

  // Build a fully self-contained file — no external fetches, no JS
  const html = `<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CV — René Smit</title>
<link rel="icon" type="image/x-icon" href="favicon.ico">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
${styles}
</head>
<body>
${shellHTML}
</body>
</html>`;

  const blob = new Blob([html], { type: 'text/html;charset=utf-8' });
  const a    = document.createElement('a');
  a.href     = URL.createObjectURL(blob);
  a.download = 'cv_rene_smit_export.html';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(a.href);
}

/* ════════════════════════
   FETCH
════════════════════════ */
fetch(CV_URL)
  .then(r => { if (!r.ok) throw new Error('HTTP '+r.status); return r.json(); })
  .then(data => buildPage(data))
  .catch(err => {
    document.getElementById('cv-shell').innerHTML =
      `<div class="error" style="padding:2rem;">Could not load CV data: ${err.message}</div>`;
  });
</script>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RSS Reader</title>
<link rel="icon" type="image/x-icon" href="favicon.ico">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

/* ── LIGHT THEME (default) ── */
:root {
  --chrome-top:    #2d6bcd;
  --bg:            #ffffff;
  --content-bg:    #ffffff;
  --sidebar-bg:    #f1f1f1;
  --sidebar-hover: #e3e3e3;
  --sidebar-active:#cfe2ff;
  --sidebar-active-border: #4285f4;
  --toolbar-bg:    #f5f5f5;
  --toolbar-border:#e0e0e0;
  --border:        #e0e0e0;
  --text:          #212121;
  --text-muted:    #5f6368;
  --text-dim:      #9aa0a6;
  --link:          #1a0dab;
  --snippet:       #767676;
  --source-color:  #006621;
  --unread-bold:   #000000;
  --read-color:    #888888;
  --hover-row:     #f8f9fa;
  --active-row:    #e8f0fe;
  --badge-bg:      #4285f4;
  --badge-text:    #ffffff;
  --accent:        #4285f4;
  --btn-bg:        #f8f8f8;
  --btn-border:    #c6c6c6;
  --btn-text:      #444;
  --btn-hover:     #ebebeb;
  --font: Arial, Helvetica, sans-serif;
}

html.dark {
  --chrome-top:    #1a3a6b;
  --bg:            #202124;
  --content-bg:    #202124;
  --sidebar-bg:    #292a2d;
  --sidebar-hover: #35363a;
  --sidebar-active:#1a3a6b;
  --sidebar-active-border: #8ab4f8;
  --toolbar-bg:    #292a2d;
  --toolbar-border:#3c4043;
  --border:        #3c4043;
  --text:          #e8eaed;
  --text-muted:    #9aa0a6;
  --text-dim:      #5f6368;
  --link:          #8ab4f8;
  --snippet:       #bdc1c6;
  --source-color:  #81c995;
  --unread-bold:   #ffffff;
  --read-color:    #9aa0a6;
  --hover-row:     #35363a;
  --active-row:    #1a3a6b;
  --badge-bg:      #8ab4f8;
  --badge-text:    #202124;
  --accent:        #8ab4f8;
  --btn-bg:        #3c4043;
  --btn-border:    #5f6368;
  --btn-text:      #e8eaed;
  --btn-hover:     #4a4e52;
}

html, body {
  height: 100%; overflow: hidden;
  background: var(--bg); color: var(--text);
  font-family: var(--font); font-size: 13px;
  transition: background .2s, color .2s;
}

/* ── TOP CHROME BAR ── */
#chrome-bar {
  height: 40px; background: var(--chrome-top);
  display: flex; align-items: center;
  padding: 0 12px; gap: 8px; flex-shrink: 0;
}
.chrome-logo {
  display: flex; align-items: center; gap: 0;
  font-size: 20px; font-weight: bold; letter-spacing: -.5px;
  font-family: 'Arial', sans-serif;
}
.chrome-logo .cg  { color: #4285f4; }
.chrome-logo .co1 { color: #ea4335; }
.chrome-logo .co2 { color: #fbbc05; }
.chrome-logo .cg2 { color: #4285f4; }
.chrome-logo .cl  { color: #ea4335; }
.chrome-logo .ce  { color: #34a853; }
.chrome-logo-sep  { color: rgba(255,255,255,.55); margin: 0 5px; font-weight: 300; font-size: 22px; }
.chrome-logo-sub  { color: #fff; font-size: 18px; font-weight: normal; }
.chrome-vsep { width: 1px; height: 20px; background: rgba(255,255,255,.3); flex: 0 0 1px; margin: 0 2px; }

.chrome-btn {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 4px 10px; border-radius: 2px;
  font-size: 12px; font-family: var(--font);
  border: 1px solid rgba(255,255,255,.4);
  background: rgba(255,255,255,.15); color: #fff;
  cursor: pointer; transition: background .15s; white-space: nowrap;
}
.chrome-btn:hover { background: rgba(255,255,255,.25); }
.chrome-btn.primary { background: #fff; color: #444; border-color: #fff; }
.chrome-btn.primary:hover { background: #f0f0f0; }

#opml-input { display: none; }
#chrome-spacer { flex: 1; }
#chrome-status { font-size: 11px; color: rgba(255,255,255,.65); white-space: nowrap; }

/* theme toggle */
#theme-toggle {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 3px 8px; border-radius: 2px; font-size: 11px;
  border: 1px solid rgba(255,255,255,.35);
  background: rgba(255,255,255,.12); color: rgba(255,255,255,.85);
  cursor: pointer; transition: background .15s; font-family: var(--font);
  user-select: none;
}
#theme-toggle:hover { background: rgba(255,255,255,.22); }
.toggle-track {
  width: 26px; height: 14px; border-radius: 7px;
  background: rgba(255,255,255,.3); position: relative;
  transition: background .2s; flex: 0 0 26px;
}
html.dark .toggle-track { background: var(--accent); }
.toggle-thumb {
  position: absolute; top: 2px; left: 2px;
  width: 10px; height: 10px; border-radius: 50%;
  background: #fff; transition: transform .2s;
  box-shadow: 0 1px 2px rgba(0,0,0,.35);
}
html.dark .toggle-thumb { transform: translateX(12px); }

/* ── APP LAYOUT ── */
#app {
  display: grid; grid-template-columns: 220px 1fr;
  height: calc(100vh - 40px); overflow: hidden;
}

/* ── SIDEBAR ── */
#sidebar {
  background: var(--sidebar-bg); border-right: 1px solid var(--border);
  overflow-y: auto; overflow-x: hidden;
  display: flex; flex-direction: column;
  transition: background .2s;
}
#sidebar::-webkit-scrollbar { width: 5px; }
#sidebar::-webkit-scrollbar-thumb { background: #bbb; border-radius: 3px; }
html.dark #sidebar::-webkit-scrollbar-thumb { background: #555; }

.sb-section-label {
  padding: 9px 10px 3px; font-size: 11px; font-weight: bold;
  color: var(--text-muted); text-transform: uppercase; letter-spacing: .07em;
}

.special-row {
  display: flex; align-items: center;
  padding: 4px 8px 4px 10px; cursor: pointer;
  font-size: 13px; color: var(--text);
  transition: background .1s; border-left: 3px solid transparent; gap: 3px;
}
.special-row:hover { background: var(--sidebar-hover); }
.special-row.active {
  background: var(--sidebar-active);
  border-left-color: var(--sidebar-active-border); font-weight: bold;
}
.special-row .sr-label { flex: 1; }
.sr-badge {
  font-size: 10px; background: var(--badge-bg); color: var(--badge-text);
  padding: 1px 5px; border-radius: 9px; line-height: 14px;
}

.sub-label {
  padding: 8px 10px 2px; font-size: 11px; font-weight: bold;
  color: var(--text-muted); text-transform: uppercase; letter-spacing: .07em;
  border-top: 1px solid var(--border); margin-top: 3px;
}

/* folder */
.folder-header {
  display: flex; align-items: center;
  padding: 4px 8px 4px 6px; cursor: pointer;
  font-size: 13px; color: var(--text); font-weight: bold;
  user-select: none; transition: background .1s;
  border-left: 3px solid transparent; gap: 3px;
}
.folder-header:hover { background: var(--sidebar-hover); }
.folder-arrow { color: var(--text-dim); transition: transform .15s; flex: 0 0 12px; font-size: 9px; }
.folder.open > .folder-header .folder-arrow { transform: rotate(90deg); }
.folder-name-text { flex: 1; }
.folder-badge {
  font-size: 10px; background: var(--badge-bg); color: var(--badge-text);
  padding: 1px 5px; border-radius: 9px; line-height: 14px;
}
.folder-feeds { display: none; }
.folder.open > .folder-feeds { display: block; }

.feed-row {
  display: flex; align-items: center; gap: 4px;
  padding: 3px 8px 3px 22px; cursor: pointer;
  font-size: 13px; color: var(--text);
  transition: background .1s; border-left: 3px solid transparent;
}
.feed-row:hover { background: var(--sidebar-hover); }
.feed-row.active { background: var(--sidebar-active); border-left-color: var(--sidebar-active-border); }
.feed-row.active .feed-name { font-weight: bold; }
.feed-dot { width: 5px; height: 5px; border-radius: 50%; flex: 0 0 5px; }
.feed-dot.ok      { background: #34a853; }
.feed-dot.err     { background: #ea4335; }
.feed-dot.loading { background: #fbbc05; animation: pulse .9s infinite; }
.feed-dot.idle    { background: var(--border); }
@keyframes pulse { 0%,100%{opacity:1}50%{opacity:.3} }
.feed-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.feed-badge { font-size: 11px; color: var(--badge-bg); font-weight: bold; min-width: 16px; text-align: right; }

#sidebar-footer {
  margin-top: auto; padding: 7px 10px;
  font-size: 11px; color: var(--text-dim);
  border-top: 1px solid var(--border);
}

/* ── MAIN PANE ── */
#main { display: flex; flex-direction: column; overflow: hidden; background: var(--content-bg); transition: background .2s; }

/* toolbar */
#toolbar {
  background: var(--toolbar-bg); border-bottom: 2px solid var(--toolbar-border);
  padding: 5px 12px; display: flex; align-items: center; gap: 6px;
  flex-shrink: 0; transition: background .2s;
}
#feed-title-bar {
  font-size: 18px; font-weight: normal; color: var(--text);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 280px;
}
.tb-sep { width: 1px; height: 16px; background: var(--border); flex: 0 0 1px; margin: 0 2px; }
.tb-link {
  font-size: 12px; color: var(--accent); cursor: pointer;
  text-decoration: none; padding: 2px 4px; border-radius: 2px;
  transition: background .1s;
}
.tb-link:hover { text-decoration: underline; }
.tb-btn {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 3px 8px; border-radius: 2px; font-size: 12px;
  font-family: var(--font); border: 1px solid var(--btn-border);
  background: var(--btn-bg); color: var(--btn-text); cursor: pointer;
  transition: background .1s; white-space: nowrap;
}
.tb-btn:hover { background: var(--btn-hover); }
#toolbar-right { margin-left: auto; display: flex; align-items: center; gap: 8px; }
#item-count-label { font-size: 12px; color: var(--text-muted); }

/* ── ITEM LIST ── */
#items-area { flex: 1; overflow-y: auto; overflow-x: hidden; }
#items-area::-webkit-scrollbar { width: 6px; }
#items-area::-webkit-scrollbar-thumb { background: #ccc; border-radius: 3px; }
html.dark #items-area::-webkit-scrollbar-thumb { background: #555; }

.item-row {
  display: flex; align-items: baseline; gap: 0;
  padding: 4px 12px 4px 8px;
  border-bottom: 1px solid var(--border);
  cursor: pointer; transition: background .08s;
  flex-wrap: nowrap;
}
.item-row:hover { background: var(--hover-row); }
.item-row.active { background: var(--active-row); flex-wrap: wrap; }

/* icons column */
.item-icons {
  display: flex; align-items: center; gap: 2px;
  flex: 0 0 50px; padding-right: 6px; align-self: flex-start; padding-top: 3px;
}
.item-check {
  width: 13px; height: 13px; flex: 0 0 13px;
  border: 1px solid var(--border); border-radius: 2px;
  background: var(--bg); cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 9px; color: transparent; transition: all .1s; line-height: 1;
}
.item-check:hover { border-color: var(--accent); }
.item-row.read .item-check { color: var(--text-dim); }
.item-star {
  font-size: 14px; color: var(--border); cursor: pointer;
  transition: color .1s; line-height: 1; flex: 0 0 14px;
}
.item-star.starred { color: #fbbc05; }
.item-star:hover { color: #fbbc05; }

/* main line */
.item-body { flex: 1; min-width: 0; }
.item-line {
  display: flex; align-items: baseline; gap: 5px;
  white-space: nowrap; overflow: hidden;
}
.item-title {
  font-size: 13px; font-weight: bold; color: var(--unread-bold);
  flex-shrink: 0; max-width: 340px;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.item-row.read .item-title { font-weight: normal; color: var(--read-color); }
.item-mdash { color: var(--text-dim); flex-shrink: 0; }
.item-snippet {
  font-size: 13px; color: var(--snippet);
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1;
}
.item-source {
  font-size: 12px; color: var(--source-color); white-space: nowrap;
  flex-shrink: 0; margin-left: 6px; font-style: italic;
}
.item-time { font-size: 12px; color: var(--text-dim); flex-shrink: 0; margin-left: 8px; min-width: 30px; text-align: right; }

/* expanded post */
.item-expanded-post {
  display: none; width: 100%;
  margin-left: 50px; padding: 10px 0 14px 0;
  border-top: 1px solid var(--border); margin-top: 5px;
}
.item-row.active .item-expanded-post { display: block; }

.exp-title { font-size: 20px; font-weight: normal; color: var(--text); margin-bottom: 6px; line-height: 1.3; }
.exp-meta {
  font-size: 12px; color: var(--text-muted);
  display: flex; gap: 10px; flex-wrap: wrap;
  margin-bottom: 10px; padding-bottom: 8px;
  border-bottom: 1px solid var(--border);
  align-items: center;
}
.exp-meta a { color: var(--accent); text-decoration: none; }
.exp-meta a:hover { text-decoration: underline; }
.exp-body {
  font-size: 13px; color: var(--text); line-height: 1.65; max-width: 680px;
}
.exp-body img { max-width: 100%; border-radius: 2px; margin: 6px 0; }
.exp-body a { color: var(--link); }
.exp-body p { margin-bottom: 8px; }
.exp-body h1,.exp-body h2,.exp-body h3 { margin: 12px 0 5px; }
.exp-body ul,.exp-body ol { margin: 6px 0 6px 18px; }
.exp-body li { margin-bottom: 3px; }
.exp-body blockquote { border-left: 3px solid var(--border); padding-left: 10px; color: var(--text-muted); margin: 8px 0; font-style: italic; }
.exp-body pre { background: var(--toolbar-bg); padding: 8px; border-radius: 2px; overflow-x: auto; font-size: 12px; font-family: monospace; }
.exp-body code { font-family: monospace; font-size: 12px; background: var(--toolbar-bg); padding: 1px 3px; border-radius: 2px; }

/* empty state */
#items-empty { padding: 50px 24px; color: var(--text-muted); }
#items-empty .empty-h { font-size: 22px; font-weight: normal; margin-bottom: 8px; color: var(--text); }
#items-empty p { font-size: 13px; }

/* ── LOADING / TOAST / DROP ── */
#loading {
  position: fixed; inset: 0; background: rgba(255,255,255,.78);
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; gap: 10px; z-index: 999;
}
html.dark #loading { background: rgba(32,33,36,.82); }
#loading.hidden { display: none; }
.spinner { width: 28px; height: 28px; border: 3px solid #ddd; border-top-color: var(--accent); border-radius: 50%; animation: spin .7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
#loading p { font-size: 12px; color: var(--text-muted); }

#drop-overlay {
  position: fixed; inset: 0;
  border: 4px dashed var(--accent); background: rgba(66,133,244,.06);
  display: flex; align-items: center; justify-content: center;
  z-index: 998; pointer-events: none;
  opacity: 0; transition: opacity .2s;
  font-size: 22px; color: var(--accent);
}
#drop-overlay.active { opacity: 1; }

#toast {
  position: fixed; bottom: 16px; right: 16px;
  background: #323232; color: #fff; border-radius: 2px;
  padding: 8px 14px; font-size: 12px;
  box-shadow: 0 2px 8px rgba(0,0,0,.3);
  transform: translateY(50px); opacity: 0;
  transition: all .25s; z-index: 1000;
}
#toast.show { transform: translateY(0); opacity: 1; }
#toast.err { background: #c62828; }
#toast.ok  { background: #2e7d32; }
</style>
</head>
<body>

<div id="loading"><div class="spinner"></div><p id="loading-text">Loading…</p></div>
<div id="drop-overlay">Drop OPML file here</div>
<div id="toast"></div>

<!-- CHROME BAR -->
<div id="chrome-bar">
  <div class="chrome-logo">
    <span class="cg"></span><span class="co1">R</span><span class="co2">e</span><span class="cg2">n</span><span class="cl">e</span><span class="ce">x</span>
    <span class="chrome-logo-sep">·</span>
    <span class="chrome-logo-sub">Reader</span>
  </div>
  <div class="chrome-vsep"></div>
  <button class="chrome-btn" onclick="loadSampleOpml()">Load Sample</button>
  <button class="chrome-btn primary" onclick="document.getElementById('opml-input').click()">⬆ Import OPML</button>
  <input type="file" id="opml-input" accept=".opml,.xml" onchange="loadOpmlFile(this)">
  <!-- <button class="chrome-btn" onclick="loadSampleOpml()">Load Sample</button> -->
  <button class="chrome-btn" onclick="refreshAll()" id="refresh-btn">↻ Refresh All</button>
  <span id="chrome-spacer"></span>
  <span id="chrome-status"></span>
  <button id="theme-toggle" onclick="toggleTheme()" title="Light / Dark">
    <span id="theme-icon">🌙</span>
    <div class="toggle-track"><div class="toggle-thumb"></div></div>
  </button>
</div>

<!-- APP -->
<div id="app">

  <!-- SIDEBAR -->
  <div id="sidebar">
    <div class="sb-section-label" style="padding-top:10px">Your subscriptions</div>
    <div id="all-items-row" class="special-row active" onclick="selectAllFeeds()">
      <span class="sr-label">All items</span>
      <span id="all-unread-badge" class="sr-badge" style="display:none"></span>
    </div>
    <div class="sub-label">Subscriptions</div>
    <div id="feed-tree"></div>
    <div id="sidebar-footer"><span id="sidebar-stats">No feeds loaded</span></div>
  </div>

  <!-- MAIN -->
  <div id="main">
    <div id="toolbar">
      <span id="feed-title-bar">All items</span>
      <div class="tb-sep"></div>
      <a class="tb-link" onclick="markAllRead()">Mark all as read</a>
      <div class="tb-sep"></div>
      <button class="tb-btn" onclick="refreshAll()">↻ Refresh</button>
      <div id="toolbar-right">
        <span id="item-count-label"></span>
      </div>
    </div>
    <div id="items-area">
      <div id="items-container">
        <div id="items-empty">
          <div class="empty-h">Welcome to RSS Reader</div>
          <p>Import an OPML file or click "Load Sample" to get started.<br>You can also drag and drop an OPML file onto this window.</p>
        </div>
      </div>
    </div>
  </div>

</div>

<script>
const state = {
  folders: [],
  loose: [],
  activeFeed: null,
  activeItemId: null,
  starred: new Set(JSON.parse(localStorage.getItem("rss_starred") || "[]")),
  read: new Set(JSON.parse(localStorage.getItem("rss_read") || "[]")),
};

const PROXIES = [
  url => `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
  url => `https://corsproxy.io/?${encodeURIComponent(url)}`,
  url => `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(url)}`
];

function parseOpml(text) {
  const doc = new DOMParser().parseFromString(text, "text/xml");
  if (doc.querySelector("parsererror")) throw new Error("Invalid OPML/XML");

  const body = doc.querySelector("body");
  if (!body) throw new Error("No <body> in OPML");

  const folders = [];
  const loose = [];

  function mkFeed(el) {
    return {
      title: el.getAttribute("title") || el.getAttribute("text") || "Untitled",
      xmlUrl: el.getAttribute("xmlUrl") || el.getAttribute("xmlurl") || "",
      htmlUrl: el.getAttribute("htmlUrl") || el.getAttribute("htmlurl") || "",
      items: [],
      status: "idle",
      unread: 0,
      error: ""
    };
  }

  for (const ch of body.children) {
    const xu = ch.getAttribute("xmlUrl") || ch.getAttribute("xmlurl");

    if (xu) {
      loose.push(mkFeed(ch));
      continue;
    }

    const feeds = [];

    for (const fc of ch.children) {
      if (fc.getAttribute("xmlUrl") || fc.getAttribute("xmlurl")) {
        feeds.push(mkFeed(fc));
      }
    }

    if (feeds.length) {
      folders.push({
        name: ch.getAttribute("title") || ch.getAttribute("text") || "Folder",
        feeds,
        open: true
      });
    }
  }

  return { folders, loose };
}

function txt(el, names) {
  for (const name of names) {
    const found = el.getElementsByTagName(name)[0];
    if (found) return found.textContent || "";
  }
  return "";
}

function parseFeedXml(xml, feedTitle) {
  const doc = new DOMParser().parseFromString(xml, "text/xml");

  if (doc.querySelector("parsererror")) {
    throw new Error("Invalid feed XML");
  }

  const items = [];

  for (const it of doc.querySelectorAll("item")) {
    const raw = txt(it, ["content:encoded", "encoded", "description"]) || "";

    items.push({
      id: txt(it, ["guid"]) || txt(it, ["link"]) || rnd(),
      title: txt(it, ["title"]).trim() || "(no title)",
      link: txt(it, ["link"]).trim(),
      date: pd(txt(it, ["pubDate", "dc:date"])),
      content: raw,
      snippet: toSnippet(raw),
      feedTitle
    });
  }

  for (const en of doc.querySelectorAll("entry")) {
    const raw = txt(en, ["content", "summary"]) || "";

    const link =
      en.querySelector('link[rel="alternate"]')?.getAttribute("href") ||
      en.querySelector("link")?.getAttribute("href") ||
      "";

    items.push({
      id: txt(en, ["id"]) || link || rnd(),
      title: txt(en, ["title"]).trim() || "(no title)",
      link,
      date: pd(txt(en, ["updated", "published"])),
      content: raw,
      snippet: toSnippet(raw),
      feedTitle
    });
  }

  return items;
}

function pd(s) {
  if (!s) return new Date(0);
  const d = new Date(s);
  return isNaN(d) ? new Date(0) : d;
}

function rnd() {
  return Math.random().toString(36).slice(2);
}

function toSnippet(html) {
  const d = document.createElement("div");
  d.innerHTML = html;
  return (d.textContent || "").replace(/\s+/g, " ").trim().slice(0, 360);
}

async function fetchTextWithFallback(url) {
  let lastError;

  for (const makeUrl of PROXIES) {
    try {
      const res = await fetch(makeUrl(url), {
        signal: AbortSignal.timeout(15000)
      });

      if (!res.ok) throw new Error("HTTP " + res.status);

      const text = await res.text();

      if (!text || text.length < 50) {
        throw new Error("Empty feed");
      }

      return text;
    } catch (e) {
      lastError = e;
    }
  }

  throw lastError || new Error("All proxies failed");
}

async function fetchFeed(feed) {
  feed.status = "loading";
  feed.error = "";
  renderSidebar();

  try {
    const xml = await fetchTextWithFallback(feed.xmlUrl);
    feed.items = parseFeedXml(xml, feed.title);
    feed.items.sort((a, b) => b.date - a.date);
    feed.unread = feed.items.filter(i => !state.read.has(i.id)).length;
    feed.status = "ok";
  } catch (e) {
    feed.status = "err";
    feed.error = e.message;
    feed.items = [];
    feed.unread = 0;
  }

  renderSidebar();
}

async function refreshAll() {
  const all = getAllFeeds();

  if (!all.length) {
    toast("No feeds loaded", "err");
    return;
  }

  setLoading(true, "Refreshing " + all.length + " feeds…");
  document.getElementById("refresh-btn").textContent = "↻ …";

  await Promise.allSettled(all.map(f => fetchFeed(f)));

  setLoading(false);
  document.getElementById("refresh-btn").textContent = "↻ Refresh All";

  const ok = all.filter(f => f.status === "ok").length;
  const err = all.filter(f => f.status === "err").length;

  document.getElementById("chrome-status").textContent =
    "✓ " + ok + " ok" +
    (err ? " · ✗ " + err + " err" : "") +
    " · " + new Date().toLocaleTimeString();

  renderSidebar();
  renderItems();

  toast(
    "Refreshed " + ok + " feed" + (ok !== 1 ? "s" : "") +
    (err ? " (" + err + " failed)" : ""),
    err ? "err" : "ok"
  );
}

function loadOpmlFile(input) {
  const f = input.files[0];
  if (!f) return;

  const r = new FileReader();
  r.onload = e => importOpml(e.target.result);
  r.readAsText(f);
  input.value = "";
}

function importOpml(text) {
  try {
    const { folders, loose } = parseOpml(text);

    state.folders = folders;
    state.loose = loose;
    state.activeFeed = null;
    state.activeItemId = null;

    renderSidebar();
    renderItems();

    const n = getAllFeeds().length;
    toast("Loaded " + n + " feed" + (n !== 1 ? "s" : ""), "ok");

    refreshAll();
  } catch (e) {
    toast("OPML error: " + e.message, "err");
  }
}

document.addEventListener("dragover", e => {
  e.preventDefault();
  document.getElementById("drop-overlay").classList.add("active");
});

document.addEventListener("dragleave", e => {
  if (!e.relatedTarget) {
    document.getElementById("drop-overlay").classList.remove("active");
  }
});

document.addEventListener("drop", e => {
  e.preventDefault();
  document.getElementById("drop-overlay").classList.remove("active");

  const f = e.dataTransfer.files[0];
  if (!f) return;

  const r = new FileReader();
  r.onload = ev => importOpml(ev.target.result);
  r.readAsText(f);
});

function loadSampleOpml() {
  importOpml(SAMPLE_OPML);
}

function getAllFeeds() {
  return [...state.folders.flatMap(f => f.feeds), ...state.loose];
}

function getActiveItems() {
  const feeds = state.activeFeed ? [state.activeFeed] : getAllFeeds();
  return feeds.flatMap(f => f.items).sort((a, b) => b.date - a.date);
}

function markRead(id) {
  state.read.add(id);
  persist();

  getAllFeeds().forEach(f => {
    f.unread = f.items.filter(i => !state.read.has(i.id)).length;
  });
}

function markAllRead() {
  getActiveItems().forEach(i => state.read.add(i.id));
  persist();

  getAllFeeds().forEach(f => {
    f.unread = f.items.filter(i => !state.read.has(i.id)).length;
  });

  renderSidebar();
  renderItems();
}

function toggleStar(id, e) {
  e.stopPropagation();

  if (state.starred.has(id)) {
    state.starred.delete(id);
  } else {
    state.starred.add(id);
  }

  persist();

  document.querySelectorAll('.item-star[data-id="' + CSS.escape(id) + '"]').forEach(el => {
    el.classList.toggle("starred", state.starred.has(id));
  });
}

function persist() {
  localStorage.setItem("rss_read", JSON.stringify([...state.read].slice(-3000)));
  localStorage.setItem("rss_starred", JSON.stringify([...state.starred].slice(-500)));
}

function fmtTime(d) {
  if (!d || d.getTime() === 0) return "";

  const diff = (Date.now() - d) / 1000;

  if (diff < 60) return Math.floor(diff) + "s";
  if (diff < 3600) return Math.floor(diff / 60) + "m";
  if (diff < 86400) return Math.floor(diff / 3600) + "h";
  if (diff < 604800) return Math.floor(diff / 86400) + "d";

  return d.toLocaleDateString(undefined, {
    month: "short",
    day: "numeric"
  });
}

function esc(s) {
  if (!s) return "";

  return String(s)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;");
}

function renderSidebar() {
  const allUnread = getAllFeeds().reduce((s, f) => s + f.unread, 0);

  const badge = document.getElementById("all-unread-badge");

  if (allUnread) {
    badge.style.display = "";
    badge.textContent = allUnread > 999 ? "999+" : allUnread;
  } else {
    badge.style.display = "none";
  }

  document.getElementById("all-items-row").className =
    "special-row" + (!state.activeFeed ? " active" : "");

  let html = "";

  for (let fi = 0; fi < state.folders.length; fi++) {
    const folder = state.folders[fi];
    const fu = folder.feeds.reduce((s, f) => s + f.unread, 0);

    html += `
      <div class="folder${folder.open ? " open" : ""}" id="folder-${fi}">
        <div class="folder-header" onclick="toggleFolder(${fi})">
          <span class="folder-arrow">▶</span>
          <span class="folder-name-text">${esc(folder.name)}</span>
          ${fu ? `<span class="folder-badge">${fu > 999 ? "999+" : fu}</span>` : ""}
        </div>
        <div class="folder-feeds">
    `;

    for (let i = 0; i < folder.feeds.length; i++) {
      html += buildFeedRow(folder.feeds[i], `f${fi}_${i}`);
    }

    html += `</div></div>`;
  }

  for (let i = 0; i < state.loose.length; i++) {
    html += buildFeedRow(state.loose[i], `l${i}`);
  }

  document.getElementById("feed-tree").innerHTML = html;

  const total = getAllFeeds().length;

  document.getElementById("sidebar-stats").textContent =
    total + " feed" + (total !== 1 ? "s" : "") + " · " + allUnread + " unread";
}

function buildFeedRow(feed, id) {
  const isActive = state.activeFeed === feed;
  const u = feed.unread;

  return `
    <div class="feed-row${isActive ? " active" : ""}" onclick="selectFeed('${id}', event)">
      <span class="feed-dot ${feed.status}" title="${esc(feed.error || feed.status)}"></span>
      <span class="feed-name" title="${esc(feed.title)}">${esc(feed.title)}</span>
      ${u ? `<span class="feed-badge">${u > 999 ? "999+" : u}</span>` : ""}
    </div>
  `;
}

function toggleFolder(fi) {
  state.folders[fi].open = !state.folders[fi].open;
  renderSidebar();
}

function selectFeed(id, e) {
  e?.stopPropagation();

  const feed = resolveFeed(id);
  if (!feed) return;

  state.activeFeed = feed;
  state.activeItemId = null;

  renderSidebar();
  renderItems();
}

function selectAllFeeds() {
  state.activeFeed = null;
  state.activeItemId = null;

  renderSidebar();
  renderItems();
}

function resolveFeed(id) {
  if (id.startsWith("f")) {
    const [, fi, i] = id.match(/f(\d+)_(\d+)/);
    return state.folders[+fi]?.feeds[+i];
  }

  const [, i] = id.match(/l(\d+)/);
  return state.loose[+i];
}

function renderItems() {
  const items = getActiveItems();
  const title = state.activeFeed ? state.activeFeed.title : "All items";

  document.getElementById("feed-title-bar").textContent = title;
  document.getElementById("item-count-label").textContent =
    items.length ? items.length + " item" + (items.length !== 1 ? "s" : "") : "";

  const container = document.getElementById("items-container");

  if (!items.length) {
    container.innerHTML = `
      <div id="items-empty">
        <div class="empty-h">${esc(title)}</div>
        <p>${getAllFeeds().length ? "No items yet. Try refreshing." : "Import an OPML file or click Load Sample to get started."}</p>
      </div>
    `;
    return;
  }

  container.innerHTML = items.map((item, idx) => {
    const isRead = state.read.has(item.id);
    const isActive = state.activeItemId === item.id;
    const isStarred = state.starred.has(item.id);
    const safeId = esc(item.id);
    const sanitized = sanitize(item.content);

    return `
      <div class="item-row${isActive ? " active" : ""}${isRead ? " read" : ""}" id="ir-${idx}" onclick="selectItem(${idx})">
        <div class="item-icons" onclick="event.stopPropagation()">
          <span class="item-check" title="Toggle read" onclick="toggleReadItem(${idx}, event)">✓</span>
          <span class="item-star${isStarred ? " starred" : ""}" data-id="${safeId}" title="Star" onclick="toggleStar('${safeId}', event)">★</span>
        </div>

        <div class="item-body">
          <div class="item-line">
            <span class="item-title">${esc(item.title)}</span>
            ${item.snippet ? `<span class="item-mdash"> — </span><span class="item-snippet">${esc(item.snippet)}</span>` : ""}
            <span class="item-source">${esc(item.feedTitle)}</span>
            <span class="item-time">${fmtTime(item.date)}</span>
          </div>

          <div class="item-expanded-post">
            <div class="exp-title">${esc(item.title)}</div>

            <div class="exp-meta">
              <strong>${esc(item.feedTitle)}</strong>
              ${item.date.getTime() ? `<span>${item.date.toLocaleString()}</span>` : ""}
              ${item.link ? `<a href="${esc(item.link)}" target="_blank" rel="noopener">↗ Open original</a>` : ""}
            </div>

            <div class="exp-body">
              ${sanitized || "<p><em>No content available. Open the original link to read.</em></p>"}
            </div>
          </div>
        </div>
      </div>
    `;
  }).join("");
}

function selectItem(idx) {
  const items = getActiveItems();
  const item = items[idx];

  if (!item) return;

  if (state.activeItemId === item.id) {
    state.activeItemId = null;
    renderItems();
    return;
  }

  state.activeItemId = item.id;
  markRead(item.id);

  renderSidebar();
  renderItems();

  requestAnimationFrame(() => {
    const el = document.getElementById("ir-" + idx);
    if (el) el.scrollIntoView({ behavior: "smooth", block: "nearest" });
  });
}

function toggleReadItem(idx, e) {
  e.stopPropagation();

  const item = getActiveItems()[idx];
  if (!item) return;

  if (state.read.has(item.id)) {
    state.read.delete(item.id);
  } else {
    state.read.add(item.id);
  }

  persist();

  getAllFeeds().forEach(f => {
    f.unread = f.items.filter(i => !state.read.has(i.id)).length;
  });

  renderSidebar();
  renderItems();
}

function sanitize(html) {
  if (!html) return "";

  return String(html)
    .replace(/<script[\s\S]*?<\/script>/gi, "")
    .replace(/<iframe[\s\S]*?<\/iframe>/gi, "")
    .replace(/\son\w+="[^"]*"/gi, "")
    .replace(/\son\w+='[^']*'/gi, "")
    .replace(/javascript:/gi, "");
}

function setLoading(on, msg) {
  document.getElementById("loading").classList.toggle("hidden", !on);

  if (msg) {
    document.getElementById("loading-text").textContent = msg;
  }
}

let _tt;

function toast(msg, type) {
  const el = document.getElementById("toast");

  el.textContent = msg;
  el.className = "show" + (type ? " " + type : "");

  clearTimeout(_tt);

  _tt = setTimeout(() => {
    el.className = "";
  }, 3000);
}

function toggleTheme() {
  const dark = document.documentElement.classList.toggle("dark");

  document.getElementById("theme-icon").textContent = dark ? "☀️" : "🌙";
  localStorage.setItem("rss_theme", dark ? "dark" : "light");
}

if (localStorage.getItem("rss_theme") === "dark") {
  document.documentElement.classList.add("dark");
  document.getElementById("theme-icon").textContent = "☀️";
}

setLoading(false);
loadSampleOpml()

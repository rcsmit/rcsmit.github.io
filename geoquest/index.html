<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>GeoQuest</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/topojson/3.0.2/topojson.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap');

/* ── THEMES ── */
[data-theme="dark"] {
  --bg:#0b0e16; --surf:#111520; --card:#181d2a; --border:#2a3050;
  --text:#dde2f0; --muted:#5a6280;
  --water:#0d1825; --land:#253550; --land-h:#2e4468; --land-dim:#131c2c;
  --stroke: rgba(6,9,18,.9);
  --overlay:rgba(8,11,20,.96); --shadow:rgba(0,0,0,.5);
}
[data-theme="light"] {
  --bg:#eef1f8; --surf:#ffffff; --card:#e2e6f2; --border:#b0bcd4;
  --text:#1a1f32; --muted:#7880a0;
  --water:#a8c8e8; --land:#c8d8e8; --land-h:#a8bccc; --land-dim:#dce4ec;
  --stroke: rgba(80,100,130,.7);
  --overlay:rgba(238,241,248,.97); --shadow:rgba(0,0,0,.12);
}
:root { --gold:#d4a030; --green:#28b870; --red:#d84040; --purple:#b050e8; }
[data-theme="light"] { --gold:#a06800; --green:#1a9050; --red:#b83030; --purple:#8030c0; }

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;-webkit-tap-highlight-color:transparent;}
body{
  background:var(--bg); color:var(--text);
  font-family:'DM Sans',sans-serif; font-weight:300;
  height:100dvh; overflow:hidden;
  display:flex; flex-direction:column;
  transition:background .25s,color .25s;
}

/* ═══════════════════ HEADER ═══════════════════ */
header{
  flex-shrink:0; display:flex; align-items:center; gap:8px;
  padding:0 14px; height:46px;
  background:var(--surf); border-bottom:1px solid var(--border);
  z-index:60; transition:background .25s,border-color .25s;
}
.logo{
  font-family:'Bebas Neue',sans-serif; font-size:19px;
  letter-spacing:4px; color:var(--gold); flex-shrink:0; user-select:none;
}
.logo span{color:var(--text);}
.spacer{flex:1;}

/* icon buttons */
.icon-btn{
  width:34px; height:34px; border-radius:8px; flex-shrink:0;
  border:1px solid var(--border); background:var(--card);
  color:var(--text); font-size:15px; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  transition:all .18s; touch-action:manipulation; user-select:none;
}
.icon-btn:hover,.icon-btn.active{border-color:var(--gold); color:var(--gold);}

/* scoreboard in header */
.scoreboard{display:flex; gap:10px; align-items:center;}
.sc{display:flex; flex-direction:column; align-items:center; min-width:28px;}
.sc-val{font-family:'Bebas Neue',sans-serif; font-size:18px; line-height:1;}
.sc-lbl{font-size:7px; letter-spacing:2px; text-transform:uppercase; color:var(--muted);}

/* mode pills in header */
.hdr-pills{display:flex; gap:4px;}
.hpill{
  padding:4px 10px; border-radius:20px; border:1px solid var(--border);
  background:transparent; color:var(--muted);
  font-family:'DM Sans',sans-serif; font-size:11px; cursor:pointer;
  transition:all .18s; white-space:nowrap; touch-action:manipulation;
}
.hpill.active{background:var(--gold); color:#fff; border-color:var(--gold); font-weight:500;}

/* ═══════════════════ MAIN LAYOUT ═══════════════════ */
main{flex:1; display:grid; grid-template-columns:1fr 260px; overflow:hidden;}

/* ═══════════════════ MAP ═══════════════════ */
.map-wrap{position:relative; overflow:hidden; background:var(--water); transition:background .25s;}
#map-svg{width:100%; height:100%; display:block; touch-action:none;}

.graticule{fill:none; stroke-width:.5;}
[data-theme="dark"]  .graticule{stroke:rgba(255,255,255,.06);}
[data-theme="light"] .graticule{stroke:rgba(0,0,0,.08);}
.sphere{fill:var(--water); transition:fill .25s;}

.country{
  fill:var(--land); stroke:var(--stroke); stroke-width:.5;
  cursor:pointer; transition:fill .1s; vector-effect:non-scaling-stroke;
}
.country.dimmed {fill:var(--land-dim); cursor:default; pointer-events:none;}
.country:not(.dimmed):hover{fill:var(--land-h);}
.country.target {fill:var(--gold); filter:drop-shadow(0 0 6px rgba(212,160,48,.55)); cursor:default;}
.country.correct{fill:var(--green);}
.country.wrong  {fill:var(--red);}
.country.reveal {fill:rgba(40,184,112,.32);}

/* map corner controls */
.map-controls{
  position:absolute; bottom:12px; left:12px;
  display:flex; flex-direction:column; gap:4px;
}
.map-btn{
  width:32px; height:32px; background:var(--surf);
  border:1px solid var(--border); border-radius:7px;
  color:var(--text); font-size:16px; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  transition:all .15s; touch-action:manipulation;
  box-shadow:0 2px 8px var(--shadow);
}
.map-btn:hover{border-color:var(--gold); color:var(--gold);}
.map-btn.active{background:var(--gold); color:#fff; border-color:var(--gold);}

/* tooltip */
#tt{
  position:fixed; background:var(--surf); border:1px solid var(--border);
  border-radius:6px; padding:4px 10px; font-size:11px;
  font-family:'DM Mono',monospace; pointer-events:none;
  opacity:0; z-index:200; white-space:nowrap;
  box-shadow:0 4px 12px var(--shadow); color:var(--text);
  transition:opacity .12s;
}
#tt.show{opacity:1;}

/* ═══════════════════ SIDE PANEL ═══════════════════ */
.side{
  background:var(--surf); border-left:1px solid var(--border);
  display:flex; flex-direction:column; overflow:hidden;
  transition:background .25s,border-color .25s;
}

.q-card{padding:14px 16px; border-bottom:1px solid var(--border); flex-shrink:0;}
.q-mode-lbl{font-size:8px; letter-spacing:3px; text-transform:uppercase; color:var(--muted); margin-bottom:4px;}
.q-target{
  font-family:'Bebas Neue',sans-serif; font-size:26px;
  letter-spacing:2px; color:var(--gold); line-height:1.1; word-break:break-word;
}
.q-sub{font-size:11px; color:var(--muted); margin-top:3px;}
.q-bar-wrap{margin-top:9px; height:3px; background:var(--border); border-radius:2px; overflow:hidden;}
.q-bar{height:100%; background:var(--gold); transition:width .4s; border-radius:2px;}

.answer-sec{padding:12px 16px; border-bottom:1px solid var(--border); flex-shrink:0;}
#name-input{
  width:100%; background:var(--card); border:1px solid var(--border);
  border-radius:8px; padding:10px 13px; color:var(--text);
  font-family:'DM Sans',sans-serif; font-size:15px; outline:none;
  transition:border-color .2s; -webkit-appearance:none;
}
#name-input:focus{border-color:var(--gold);}
#name-input.ok {border-color:var(--green); background:rgba(40,184,112,.07);}
#name-input.err{border-color:var(--red);   background:rgba(216,64,64,.07);}

.feedback{font-size:12px; min-height:18px; margin-top:6px; font-family:'DM Mono',monospace;}
.feedback.ok {color:var(--green);}
.feedback.err{color:var(--red);}

.btns{display:flex; gap:6px; margin-top:9px;}
.btn{
  flex:1; padding:10px 0; border-radius:8px; border:none;
  cursor:pointer; font-family:'DM Sans',sans-serif;
  font-size:13px; font-weight:500; transition:all .15s; touch-action:manipulation;
}
.btn-g{background:var(--gold); color:#fff;}
.btn-g:hover:not(:disabled){filter:brightness(1.1);}
.btn-s{background:transparent; border:1px solid var(--border); color:var(--muted);}
.btn-s:hover:not(:disabled){border-color:var(--muted); color:var(--text);}
.btn:disabled{opacity:.35; cursor:not-allowed;}

.reveal-box{
  margin-top:9px; padding:8px 11px; background:var(--card);
  border-radius:7px; border:1px solid var(--border); display:none;
}
.reveal-lbl {font-size:9px; letter-spacing:2px; color:var(--muted); text-transform:uppercase;}
.reveal-name{font-family:'Bebas Neue',sans-serif; font-size:20px; color:var(--green); letter-spacing:1px;}

.log-wrap{flex:1; overflow-y:auto; padding:10px 16px;}
.log-title{font-size:8px; letter-spacing:3px; text-transform:uppercase; color:var(--muted); margin-bottom:7px;}
.log-entry{display:flex; align-items:center; gap:7px; padding:4px 0; border-bottom:1px solid var(--border); font-size:11px;}
.log-dot  {width:6px; height:6px; border-radius:50%; flex-shrink:0;}
.log-entry.ok  .log-dot{background:var(--green);}
.log-entry.err .log-dot{background:var(--red);}
.log-ctry{flex:1;}
.log-mark{font-family:'DM Mono',monospace; font-size:10px;}
.log-entry.ok  .log-mark{color:var(--green);}
.log-entry.err .log-mark{color:var(--red);}

/* ═══════════════════ HAMBURGER DRAWER ═══════════════════ */
#menu-backdrop{
  position:fixed; inset:0; background:rgba(0,0,0,.5);
  z-index:200; opacity:0; pointer-events:none;
  transition:opacity .25s; backdrop-filter:blur(2px);
}
#menu-backdrop.open{opacity:1; pointer-events:all;}

#menu-drawer{
  position:fixed; top:0; left:0; bottom:0; width:300px; max-width:88vw;
  background:var(--surf); border-right:1px solid var(--border);
  z-index:210; display:flex; flex-direction:column;
  transform:translateX(-100%); transition:transform .28s cubic-bezier(.4,0,.2,1);
  overflow-y:auto;
}
#menu-drawer.open{transform:translateX(0);}

.drawer-header{
  display:flex; align-items:center; justify-content:space-between;
  padding:14px 16px; border-bottom:1px solid var(--border); flex-shrink:0;
}
.drawer-logo{font-family:'Bebas Neue',sans-serif; font-size:20px; letter-spacing:4px; color:var(--gold);}
.drawer-logo span{color:var(--text);}
.drawer-close{
  width:30px; height:30px; border-radius:6px; border:1px solid var(--border);
  background:transparent; color:var(--muted); font-size:16px; cursor:pointer;
  display:flex; align-items:center; justify-content:center; transition:all .15s;
}
.drawer-close:hover{border-color:var(--red); color:var(--red);}

.drawer-section{padding:14px 16px; border-bottom:1px solid var(--border);}
.drawer-label{
  font-size:8px; letter-spacing:3px; text-transform:uppercase;
  color:var(--muted); margin-bottom:10px;
}

/* continent grid in drawer */
.cont-grid{display:grid; grid-template-columns:repeat(3,1fr); gap:6px;}
.cont-card{
  background:var(--card); border:2px solid var(--border); border-radius:9px;
  padding:8px 6px; cursor:pointer; transition:all .18s; text-align:center;
  touch-action:manipulation;
}
.cont-card.active{background:rgba(212,160,48,.1);}
.cont-icon{font-size:18px;}
.cont-name{font-family:'Bebas Neue',sans-serif; font-size:11px; letter-spacing:1px; margin-top:2px;}
.cont-count{font-size:9px; color:var(--muted);}

/* diff buttons */
.diff-grid{display:grid; grid-template-columns:1fr 1fr; gap:6px;}
.hd{
  padding:8px 0; border-radius:8px; border:1px solid var(--border);
  background:transparent; color:var(--muted); cursor:pointer;
  font-family:'DM Sans',sans-serif; font-size:12px; font-weight:400;
  transition:all .18s; text-align:center; touch-action:manipulation;
}
.hd.active{background:rgba(212,160,48,.12); border-color:var(--gold); color:var(--gold); font-weight:500;}
#hd-x.active{background:rgba(176,80,232,.12); border-color:var(--purple); color:var(--purple);}

/* mode buttons in drawer */
.mode-grid{display:grid; grid-template-columns:1fr 1fr; gap:8px;}
.mode-card{
  background:var(--card); border:1px solid var(--border); border-radius:10px;
  padding:14px 10px; cursor:pointer; transition:all .18s; text-align:center;
  touch-action:manipulation;
}
.mode-card:hover,.mode-card:active{border-color:var(--gold); background:rgba(212,160,48,.07);}
.mc-icon {font-size:26px; margin-bottom:5px;}
.mc-title{font-family:'Bebas Neue',sans-serif; font-size:16px; letter-spacing:1px; color:var(--gold); margin-bottom:2px;}
.mc-desc {font-size:10px; color:var(--muted); line-height:1.4;}

/* theme row */
.theme-row{display:flex; align-items:center; justify-content:space-between; padding:14px 16px;}
.theme-row-label{font-size:12px; color:var(--muted);}
.toggle-switch{
  width:42px; height:24px; border-radius:12px;
  background:var(--border); border:none; cursor:pointer;
  position:relative; transition:background .2s; flex-shrink:0;
}
.toggle-switch.on{background:var(--gold);}
.toggle-knob{
  position:absolute; top:3px; left:3px;
  width:18px; height:18px; border-radius:50%;
  background:#fff; transition:transform .2s;
}
.toggle-switch.on .toggle-knob{transform:translateX(18px);}

/* ═══════════════════ RESULTS OVERLAY ═══════════════════ */
#res-ov{
  position:fixed; inset:0; background:var(--overlay);
  display:none; flex-direction:column; align-items:center; justify-content:center;
  gap:22px; z-index:300; backdrop-filter:blur(6px);
}
.res-grade{font-size:60px;}
.res-title{font-family:'Bebas Neue',sans-serif; font-size:clamp(38px,8vw,76px); letter-spacing:4px; text-align:center;}
.res-stats{display:flex; gap:24px; flex-wrap:wrap; justify-content:center;}
.rstat{display:flex; flex-direction:column; align-items:center; gap:2px;}
.rval{font-family:'Bebas Neue',sans-serif; font-size:44px; line-height:1;}
.rlbl{font-size:9px; letter-spacing:2px; text-transform:uppercase; color:var(--muted);}
.res-btns{display:flex; gap:10px;}
.rbtn{
  padding:11px 24px; border-radius:8px; border:none; cursor:pointer;
  font-family:'DM Sans',sans-serif; font-size:13px; font-weight:500;
  transition:all .18s; touch-action:manipulation;
}

/* ═══════════════════ LOADING ═══════════════════ */
#loading{
  position:fixed; inset:0; background:var(--bg);
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:12px; z-index:400;
}
.spin{font-size:40px; animation:spin 2s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-txt{font-family:'Bebas Neue',sans-serif; font-size:14px; letter-spacing:4px; color:var(--muted);}

/* ═══════════════════ RESPONSIVE ═══════════════════ */
@media(max-width:640px){
  main{grid-template-columns:1fr; grid-template-rows:1fr auto;}
  .side{
    border-left:none; border-top:1px solid var(--border);
    flex-direction:row; overflow:hidden; max-height:185px;
  }
  .q-card{
    flex:1; padding:10px 12px; border-bottom:none; border-right:1px solid var(--border);
    min-width:0;
  }
  .q-target{font-size:20px;}
  .answer-sec{flex:1; padding:10px 12px; border-bottom:none; overflow-y:auto;}
  .log-wrap{display:none;}
  #name-input{font-size:16px;} /* prevent iOS zoom */
  .btn{padding:11px 0;}
  .map-controls{bottom:8px; left:8px;}
  .map-btn{width:36px; height:36px; font-size:17px;}
}

::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border); border-radius:2px;}
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <button class="icon-btn" id="burger-btn" onclick="toggleMenu()" title="Menu" aria-label="Open menu">☰</button>
  <div class="logo">GEO<span>QUEST</span></div>

  <div class="hdr-pills" id="mode-pills" style="display:none">
    <button class="hpill active" id="pp" onclick="switchMode('point')">🖱 Point</button>
    <button class="hpill"        id="np" onclick="switchMode('name')">⌨ Name</button>
  </div>

  <div class="spacer"></div>

  <div class="scoreboard" id="sb" style="display:none">
    <div class="sc"><span class="sc-val" style="color:var(--green)" id="sc-ok">0</span><span class="sc-lbl">OK</span></div>
    <div class="sc"><span class="sc-val" style="color:var(--red)"   id="sc-no">0</span><span class="sc-lbl">✗</span></div>
    <div class="sc"><span class="sc-val" style="color:var(--gold)"  id="sc-st">0</span><span class="sc-lbl">🔥</span></div>
  </div>
</header>

<!-- MAIN -->
<main>
  <!-- MAP -->
  <div class="map-wrap">
    <svg id="map-svg"></svg>
    <div class="map-controls">
      <button class="map-btn" onclick="zBy(1.5)" title="Zoom in">+</button>
      <button class="map-btn" onclick="zBy(0.67)" title="Zoom out">−</button>
      <button class="map-btn" onclick="zReset()" title="Reset view" style="font-size:13px">⌂</button>
      <button class="map-btn" id="tt-btn" onclick="toggleTooltip()" title="Toggle country names">👁</button>
    </div>
  </div>

  <!-- SIDE PANEL -->
  <div class="side">
    <div class="q-card">
      <div class="q-mode-lbl" id="q-mode-lbl">SELECT A MODE</div>
      <div class="q-target"   id="q-target">—</div>
      <div class="q-sub"      id="q-sub">Open ☰ to start</div>
      <div class="q-bar-wrap"><div class="q-bar" id="q-bar" style="width:0%"></div></div>
    </div>
    <div class="answer-sec">
      <div id="name-ui" style="display:none">
        <input id="name-input" type="text" placeholder="Type country name…" autocomplete="off" spellcheck="false" enterkeyhint="done">
        <div class="feedback" id="feedback"></div>
        <div class="btns">
          <button class="btn btn-g" id="sub-btn"  onclick="submitName()">Submit</button>
          <button class="btn btn-s" id="skip-btn" onclick="skip()">Skip</button>
        </div>
      </div>
      <div id="point-ui" style="display:none">
        <div class="feedback" id="pt-fb"></div>
        <div class="btns" style="margin-top:10px">
          <button class="btn btn-s" id="pt-skip" onclick="skip()">Skip</button>
        </div>
      </div>
      <div class="reveal-box" id="rev-box">
        <div class="reveal-lbl">Answer</div>
        <div class="reveal-name" id="rev-name"></div>
      </div>
    </div>
    <div class="log-wrap">
      <div class="log-title">Recent</div>
      <div id="log"></div>
    </div>
  </div>
</main>

<!-- TOOLTIP -->
<div id="tt"></div>

<!-- LOADING -->
<div id="loading"><div class="spin">🌍</div><div class="loading-txt">Loading map…</div></div>

<!-- RESULTS -->
<div id="res-ov">
  <div class="res-grade" id="r-grade">🌍</div>
  <div class="res-title" id="r-title">WELL DONE</div>
  <div class="res-stats">
    <div class="rstat"><span class="rval" style="color:var(--green)" id="r-ok">0</span><span class="rlbl">Correct</span></div>
    <div class="rstat"><span class="rval" style="color:var(--red)"   id="r-no">0</span><span class="rlbl">Wrong</span></div>
    <div class="rstat"><span class="rval" style="color:var(--gold)"  id="r-pc">0%</span><span class="rlbl">Accuracy</span></div>
    <div class="rstat"><span class="rval" style="color:var(--gold)"  id="r-st">0</span><span class="rlbl">Streak</span></div>
  </div>
  <div class="res-btns">
    <button class="rbtn" style="background:var(--gold);color:#fff"   onclick="startGame(currentMode)">Play Again</button>
    <button class="rbtn" style="background:var(--card);border:1px solid var(--border);color:var(--text)" onclick="openMenu()">Change Settings</button>
  </div>
</div>

<!-- HAMBURGER BACKDROP -->
<div id="menu-backdrop" onclick="closeMenu()"></div>

<!-- HAMBURGER DRAWER -->
<div id="menu-drawer">
  <div class="drawer-header">
    <div class="drawer-logo">GEO<span>QUEST</span></div>
    <button class="drawer-close" onclick="closeMenu()">✕</button>
  </div>

  <!-- Region -->
  <div class="drawer-section">
    <div class="drawer-label">① Region</div>
    <div class="cont-grid" id="cont-grid"></div>
  </div>

  <!-- Difficulty -->
  <div class="drawer-section">
    <div class="drawer-label">② Difficulty</div>
    <div class="diff-grid">
      <button class="hd" id="hd-e" onclick="setDiff('easy')">Easy</button>
      <button class="hd" id="hd-m" onclick="setDiff('medium')">Medium</button>
      <button class="hd" id="hd-h" onclick="setDiff('hard')">Hard</button>
      <button class="hd" id="hd-x" onclick="setDiff('expert')" style="border-color:var(--purple);color:var(--purple)">★ Expert</button>
    </div>
  </div>

  <!-- Mode / Start -->
  <div class="drawer-section">
    <div class="drawer-label">③ Start Playing</div>
    <div class="mode-grid">
      <div class="mode-card" onclick="startGame('point')">
        <div class="mc-icon">🖱️</div>
        <div class="mc-title">Point It</div>
        <div class="mc-desc">Name shown, click the country</div>
      </div>
      <div class="mode-card" onclick="startGame('name')">
        <div class="mc-icon">⌨️</div>
        <div class="mc-title">Name It</div>
        <div class="mc-desc">Country lit up, type the name</div>
      </div>
    </div>
  </div>

  <!-- Theme -->
  <div class="theme-row">
    <span class="theme-row-label">Light mode</span>
    <button class="toggle-switch on" id="theme-toggle" onclick="toggleTheme()">
      <div class="toggle-knob"></div>
    </button>
  </div>
</div>

<script>
// ════════════════════════════════════════════════════════════
//  COUNTRY DATA  [iso_numeric, name, continent]

// ── Map init ──────────────────────────────────────────────
const mapWrap=()=>document.querySelector('.map-wrap');
const W=()=>mapWrap().clientWidth;
const H=()=>mapWrap().clientHeight;

async function initMap(){
  // Base projection — reset scale=1, translate=[0,0]; zoom handles everything
  projection = d3.geoNaturalEarth1().scale(1).translate([0,0]);
  pathGen    = d3.geoPath().projection(projection);

  zoomBeh = d3.zoom().scaleExtent([0.5,6000])
    .on('zoom', e=>{ g.attr('transform',e.transform); });

  svg = d3.select('#map-svg').attr('width',W()).attr('height',H()).call(zoomBeh);
  g   = svg.append('g');

  g.append('path').datum({type:'Sphere'}).attr('class','sphere').attr('d',pathGen);
  g.append('path').datum(d3.geoGraticule()()).attr('class','graticule').attr('d',pathGen);

  let world;
  try{
    const r=await fetch('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json');
    world=await r.json();
  }catch{
    document.getElementById('loading').innerHTML=
      '<div style="color:var(--red);font-family:Bebas Neue,sans-serif;font-size:18px;letter-spacing:2px;text-align:center">Map load failed<br><span style="font-size:11px;color:var(--muted)">Check internet</span></div>';
    return;
  }

  const features=topojson.feature(world,world.objects.countries).features;
  features.forEach(f=>{ if(NAMES[+f.id]) validOnMap.add(+f.id); });

  cPaths=g.selectAll('.country')
    .data(features).enter().append('path')
    .attr('class','country').attr('d',pathGen)
    .attr('data-id',d=>+d.id)
    .on('mouseenter',(e,d)=>{
      if(!tooltipOn) return;
      const n=NAMES[+d.id]; if(!n) return;
      const tt=document.getElementById('tt');
      tt.textContent=n; tt.classList.add('show');
    })
    .on('mousemove',e=>{
      if(!tooltipOn) return;
      const tt=document.getElementById('tt');
      tt.style.left=(e.clientX+14)+'px'; tt.style.top=(e.clientY-10)+'px';
    })
    .on('mouseleave',()=>{ document.getElementById('tt').classList.remove('show'); })
    .on('click',(e,d)=>onCountryClick(+d.id));

  window.addEventListener('resize',()=>{
    svg.attr('width',W()).attr('height',H());
    // Reapply zoom transform so map stays in place
    zoomToContinent(continent,0);
  });

  document.getElementById('loading').style.display='none';
  buildContGrid();

  // Set initial view to world — using fitSize approach
  zoomToContinent('world',0);
}

// ── Zoom ──────────────────────────────────────────────────
function zBy(k){ svg.transition().duration(250).call(zoomBeh.scaleBy,k,[W()/2,H()/2]); }
function zReset(){ zoomToContinent(continent,500); }

// KEY FIX: projection scale=1, translate=[0,0]
// So pathGen.bounds() returns raw projection coords.
// We compute scale & translate to fit those into the viewport.
function zoomToContinent(cont, dur=700){
  if(!cPaths) return;

  let features;
  if(cont==='world'){
    // Use a sphere for world bounds
    const sphereBounds = pathGen.bounds({type:'Sphere'});
    features=null;
    const [[x0,y0],[x1,y1]]=sphereBounds;
    fitBounds(x0,y0,x1,y1,dur);
    return;
  }

  const ids=new Set((BY_CONT[cont]||[]).filter(id=>validOnMap.has(id)));
  if(!ids.size) return;

  features=cPaths.data().filter(d=>ids.has(+d.id));
  if(!features.length) return;

  // Compute unified bounding box across all features
  let minX=Infinity,minY=Infinity,maxX=-Infinity,maxY=-Infinity;
  features.forEach(f=>{
    const [[x0,y0],[x1,y1]]=pathGen.bounds(f);
    minX=Math.min(minX,x0); minY=Math.min(minY,y0);
    maxX=Math.max(maxX,x1); maxY=Math.max(maxY,y1);
  });
  fitBounds(minX,minY,maxX,maxY,dur);
}

function fitBounds(x0,y0,x1,y1,dur){
  const pad=30;
  const bw=x1-x0, bh=y1-y0;
  if(bw<=0||bh<=0) return;
  const mw=W(), mh=H();
  const scale=Math.min((mw-pad*2)/bw,(mh-pad*2)/bh);
  const tx=mw/2-scale*(x0+bw/2);
  const ty=mh/2-scale*(y0+bh/2);
  const t=d3.zoomIdentity.translate(tx,ty).scale(scale);
  if(dur===0){ svg.call(zoomBeh.transform,t); }
  else { svg.transition().duration(dur).ease(d3.easeCubicInOut).call(zoomBeh.transform,t); }
}

// ── Continent grid ─────────────────────────────────────────
function buildContGrid(){
  document.getElementById('cont-grid').innerHTML=
    Object.entries(CONT_META).map(([key,meta])=>{
      const n=key==='world'?validOnMap.size:(BY_CONT[key]||[]).filter(id=>validOnMap.has(id)).length;
      return `<div class="cont-card ${key===continent?'active':''}" id="cc-${key}"
        style="${key===continent?`border-color:${meta.color};`:''}"
        onclick="selectContinent('${key}')">
        <div class="cont-icon">${meta.icon}</div>
        <div class="cont-name" style="color:${meta.color}">${meta.name}</div>
        <div class="cont-count">${n}</div>
      </div>`;
    }).join('');
}

function selectContinent(c){
  continent=c;
  document.querySelectorAll('.cont-card').forEach(el=>{
    el.classList.remove('active'); el.style.borderColor='';
  });
  const card=document.getElementById('cc-'+c);
  card.classList.add('active');
  card.style.borderColor=CONT_META[c].color;
  applyDim(c);
  zoomToContinent(c,600);
}

function setDiff(d){
  difficulty=d;
  // Clear all active states first (don't rely on :hover)
  ['e','m','h','x'].forEach(x=>{
    const btn=document.getElementById('hd-'+x);
    if(btn) btn.classList.remove('active');
  });
  const map={easy:'e',medium:'m',hard:'h',expert:'x'};
  const btn=document.getElementById('hd-'+map[d]);
  if(btn) btn.classList.add('active');
}

// ── Game ──────────────────────────────────────────────────
function startGame(mode){
  currentMode=mode;
  nOk=nNo=streak=best=qIdx=0;
  logArr=[]; answered=false;

  closeMenu();
  document.getElementById('res-ov').style.display='none';
  document.getElementById('sb').style.display='flex';
  document.getElementById('mode-pills').style.display='flex';
  document.getElementById('pp').classList.toggle('active',mode==='point');
  document.getElementById('np').classList.toggle('active',mode==='name');

  buildQuestions();
  applyDim(continent);
  zoomToContinent(continent,800);
  updateSB(); loadQ();
}

function switchMode(m){ startGame(m); }

function applyDim(cont){
  if(!cPaths) return;
  cPaths.classed('dimmed',d=>{
    if(cont==='world') return false;
    return CONTS[+d.id]!==cont;
  });
}

function buildQuestions(){
  let pool=continent==='world'?[...validOnMap]:(BY_CONT[continent]||[]).filter(id=>validOnMap.has(id));
  if(difficulty==='easy'){
    const es=new Set(EASY_IDS[continent]||EASY_IDS.world);
    const e=pool.filter(id=>es.has(id));
    pool=e.length>=5?e:pool;
  } else if(difficulty==='medium'){
    const es=new Set(EASY_IDS[continent]||EASY_IDS.world);
    const e=shuffle(pool.filter(id=>es.has(id)));
    const r=shuffle(pool.filter(id=>!es.has(id)));
    pool=[...e,...r].slice(0,Math.max(10,Math.floor(pool.length*.6)));
  } else if(difficulty==='hard'){
    pool=shuffle(pool).slice(0,Math.max(12,Math.floor(pool.length*.8)));
  }
  questions=shuffle(pool).slice(0,Math.min(continent==='world'&&difficulty==='expert'?195:25,pool.length));
}

function loadQ(){
  if(qIdx>=questions.length){showResults();return;}
  answered=false;
  const id=questions[qIdx], name=NAMES[id];

  clearStyles(); applyDim(continent);
  document.getElementById('rev-box').style.display='none';
  document.getElementById('feedback').textContent='';
  document.getElementById('pt-fb').textContent='';
  document.getElementById('q-bar').style.width=(qIdx/questions.length*100)+'%';
  document.getElementById('q-sub').textContent=`${qIdx+1} / ${questions.length}`;

  if(currentMode==='point'){
    document.getElementById('q-mode-lbl').textContent='🖱  POINT IT';
    document.getElementById('q-target').textContent=name;
    document.getElementById('name-ui').style.display='none';
    document.getElementById('point-ui').style.display='block';
    document.getElementById('pt-skip').disabled=false;
    document.getElementById('pt-fb').className='feedback';
  } else {
    document.getElementById('q-mode-lbl').textContent='⌨  NAME IT';
    document.getElementById('q-target').textContent='???';
    document.getElementById('name-ui').style.display='block';
    document.getElementById('point-ui').style.display='none';
    setClass(id,'target');
    const inp=document.getElementById('name-input');
    inp.value=''; inp.className=''; inp.disabled=false;
    document.getElementById('sub-btn').disabled=false;
    document.getElementById('skip-btn').disabled=false;
    document.getElementById('feedback').className='feedback';
    setTimeout(()=>inp.focus(),80);
  }
  updateLog();
}

function onCountryClick(cid){
  if(currentMode!=='point'||answered) return;
  if(!NAMES[cid]) return;
  if(continent!=='world'&&CONTS[cid]!==continent) return;
  const tid=questions[qIdx], tname=NAMES[tid];
  if(cid===tid){
    setClass(tid,'correct');
    record(true,tname,NAMES[cid]);
    fb('pt-fb','ok','✓ Correct!');
    document.getElementById('pt-skip').disabled=true;
    answered=true; setTimeout(nextQ,1000);
  } else {
    setClass(cid,'wrong'); setClass(tid,'reveal');
    showReveal(tname);
    fb('pt-fb','err',`✗ That's ${NAMES[cid]}`);
    record(false,tname,NAMES[cid]);
    document.getElementById('pt-skip').disabled=true;
    answered=true; setTimeout(nextQ,2200);
  }
}

function submitName(){
  if(answered) return;
  const inp=document.getElementById('name-input');
  const val=inp.value.trim(); if(!val) return;
  const tid=questions[qIdx], tname=NAMES[tid];
  const match=fuzzyMatch(val,tname);
  inp.disabled=true;
  document.getElementById('sub-btn').disabled=true;
  document.getElementById('skip-btn').disabled=true;
  if(match!=='wrong'){
    inp.className='ok';
    fb('feedback','ok',match==='exact'?'✓ Correct!':`✓ Close! (${tname})`);
    setClass(tid,'correct'); record(true,tname,val);
    answered=true; setTimeout(nextQ,match==='exact'?1000:1600);
  } else {
    inp.className='err'; fb('feedback','err','✗ Not quite');
    setClass(tid,'wrong'); showReveal(tname); record(false,tname,val);
    answered=true; setTimeout(nextQ,2200);
  }
}

function skip(){
  if(answered) return;
  const tid=questions[qIdx], tname=NAMES[tid];
  setClass(tid,'reveal'); showReveal(tname);
  record(false,tname,'(skipped)'); answered=true;
  if(currentMode==='name'){
    document.getElementById('name-input').disabled=true;
    document.getElementById('sub-btn').disabled=true;
    document.getElementById('skip-btn').disabled=true;
  } else { document.getElementById('pt-skip').disabled=true; }
  setTimeout(nextQ,2000);
}

function nextQ(){ qIdx++; loadQ(); }

// ── Helpers ───────────────────────────────────────────────
function setClass(id,cls){
  if(!cPaths) return;
  cPaths.filter(d=>+d.id===id)
    .classed('target', cls==='target')
    .classed('correct',cls==='correct')
    .classed('wrong',  cls==='wrong')
    .classed('reveal', cls==='reveal');
}
function clearStyles(){
  if(!cPaths) return;
  cPaths.classed('target',false).classed('correct',false).classed('wrong',false).classed('reveal',false);
}
function showReveal(name){
  document.getElementById('rev-box').style.display='block';
  document.getElementById('rev-name').textContent=name;
}
function fb(elId,cls,txt){
  const el=document.getElementById(elId);
  el.className='feedback '+cls; el.textContent=txt;
}
function norm(s){
  return s.toLowerCase()
    .replace(/[áàäâã]/g,'a').replace(/[éèëê]/g,'e')
    .replace(/[íìïî]/g,'i').replace(/[óòöôõ]/g,'o')
    .replace(/[úùüû]/g,'u').replace(/ñ/g,'n').replace(/ç/g,'c')
    .replace(/[^a-z0-9 ]/g,'').replace(/\s+/g,' ').trim();
}
function levenshtein(a,b){
  const m=a.length,n=b.length;
  const dp=Array.from({length:m+1},(_,i)=>Array.from({length:n+1},(_,j)=>i?j?0:i:j));
  for(let i=1;i<=m;i++) for(let j=1;j<=n;j++)
    dp[i][j]=a[i-1]===b[j-1]?dp[i-1][j-1]:1+Math.min(dp[i-1][j],dp[i][j-1],dp[i-1][j-1]);
  return dp[m][n];
}
function fuzzyMatch(input,target){
  const a=norm(input),b=norm(target);
  if(a===b) return 'exact';
  const d=levenshtein(a,b);
  return d<=(b.length<=6?1:2)?'close':'wrong';
}
function record(ok,target,given){
  if(ok){nOk++;streak++;if(streak>best)best=streak;}
  else  {nNo++;streak=0;}
  logArr.unshift({ok,target,given});
  if(logArr.length>40)logArr.pop();
  updateSB(); updateLog();
}
function updateSB(){
  document.getElementById('sc-ok').textContent=nOk;
  document.getElementById('sc-no').textContent=nNo;
  document.getElementById('sc-st').textContent=streak;
}
function updateLog(){
  document.getElementById('log').innerHTML=logArr.slice(0,14).map(e=>`
    <div class="log-entry ${e.ok?'ok':'err'}">
      <span class="log-dot"></span>
      <span class="log-ctry">${e.target}</span>
      <span class="log-mark">${e.ok?'✓':'✗'}</span>
    </div>`).join('');
}
function showResults(){
  const total=nOk+nNo,pct=total?Math.round(nOk/total*100):0;
  document.getElementById('r-ok').textContent=nOk;
  document.getElementById('r-no').textContent=nNo;
  document.getElementById('r-pc').textContent=pct+'%';
  document.getElementById('r-st').textContent=best;
  const [g2,t]=pct>=95?['🏆','CARTOGRAPHER']:pct>=80?['🌍','GEOGRAPHY MASTER']:pct>=65?['🗺️','WELL DONE!']:pct>=45?['🌐','KEEP EXPLORING']:['📍','STUDY MORE!'];
  document.getElementById('r-grade').textContent=g2;
  document.getElementById('r-title').textContent=t;
  document.getElementById('res-ov').style.display='flex';
  document.getElementById('sb').style.display='none';
  document.getElementById('mode-pills').style.display='none';
}
function shuffle(a){
  const b=[...a];
  for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}
  return b;
}

// keyboard
document.addEventListener('keydown',e=>{
  if(e.key==='Enter'&&currentMode==='name'&&!answered) submitName();
  if(e.key==='Escape') closeMenu();
});

// init — open directly with world / point-it / medium
setDiff('medium');
initMap().then(()=>{ openMenu(); });
</script>

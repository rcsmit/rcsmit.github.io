<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Scream Timer</title>
    <style>
        :root {
            --bg-color: #121212;
            --text-color: #ffffff;
            --accent-color: #ff4757;
            --secondary-color: #2f3542;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden; /* Prevent scrolling */
        }

        /* Main Timer Display */
        #display-container {
            text-align: center;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        #status-label {
            font-size: 1.5rem;
            color: #a4b0be;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
            height: 30px; 
        }

        #timer-display {
            font-size: 25vw; /* Responsive font size */
            font-weight: bold;
            font-variant-numeric: tabular-nums;
            line-height: 1;
        }

        /* Controls */
        .controls {
            padding: 40px;
            width: 100%;
            box-sizing: border-box;
            display: flex;
            gap: 20px;
            justify-content: center;
        }

        button {
            background: var(--secondary-color);
            color: white;
            border: none;
            padding: 20px 30px;
            font-size: 1.2rem;
            border-radius: 12px;
            cursor: pointer;
            touch-action: manipulation;
            transition: background 0.2s;
            min-width: 80px;
        }

        button:active {
            transform: scale(0.98);
        }

        #start-btn {
            background-color: var(--accent-color);
            flex-grow: 2;
            font-weight: bold;
        }

        /* Settings Modal */
        #settings-modal {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.9);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            z-index: 100;
        }

        .setting-row {
            margin-bottom: 25px;
            width: 100%;
            max-width: 400px;
        }

        label {
            display: block;
            margin-bottom: 10px;
            font-size: 1.1rem;
            color: #dfe4ea;
        }

        input[type="number"], select {
            width: 100%;
            padding: 15px;
            font-size: 1.2rem;
            border-radius: 8px;
            border: 1px solid #57606f;
            background: #2f3542;
            color: white;
            box-sizing: border-box;
        }

        .close-btn {
            margin-top: 20px;
            background: #2ed573;
            width: 100%;
            max-width: 400px;
        }
    </style>
</head>
<body>

    <div id="display-container">
        <div id="status-label">READY</div>
        <div id="timer-display">00:00</div>
    </div>

    <div class="controls">
        <button id="settings-btn" onclick="openSettings()">⚙️</button>
        <button id="start-btn" onclick="toggleTimer()">START</button>
    </div>

    <div id="settings-modal">
        <div class="setting-row">
            <label>Pre-Countdown (seconds)</label>
            <input type="number" id="set-pre" value="5" pattern="[0-9]*" inputmode="numeric">
        </div>
        <div class="setting-row">
            <label>Main Countdown (seconds)</label>
            <input type="number" id="set-main" value="60" pattern="[0-9]*" inputmode="numeric">
        </div>
        <div class="setting-row">
            <label>Direction</label>
            <select id="set-direction">
                <option value="down">Count Down</option>
                <option value="up">Count Up</option>
            </select>
        </div>
        <button class="close-btn" onclick="closeSettings()">SAVE & CLOSE</button>
    </div>

<script>
    // State variables
    let intervalId = null;
    let isRunning = false;
    let currentPhase = 'idle'; // idle, pre, main
    let timeLeft = 0;
    
    // Audio Context for iOS (unlocked on first user interaction)
    const audioContext = new (window.AudioContext || window.webkitAudioContext)();
    const audioPath = 'audio-numbers/';

    // Settings
    let settings = {
        pre: 5,
        main: 60,
        direction: 'down'
    };

    const els = {
        display: document.getElementById('timer-display'),
        status: document.getElementById('status-label'),
        startBtn: document.getElementById('start-btn'),
        modal: document.getElementById('settings-modal'),
        inputs: {
            pre: document.getElementById('set-pre'),
            main: document.getElementById('set-main'),
            dir: document.getElementById('set-direction')
        }
    };

    // Initialize display
    updateDisplay(settings.main);

    function formatTime(seconds) {
        // Simple seconds display, or mm:ss if large
        if(seconds >= 60) {
            const m = Math.floor(seconds / 60);
            const s = seconds % 60;
            return `${m}:${s.toString().padStart(2, '0')}`;
        }
        return seconds;
    }

    function updateDisplay(num) {
        els.display.textContent = formatTime(num);
    }

    function playSound(filename) {
        const audio = new Audio(`${audioPath}${filename}`);
        audio.play().catch(e => console.log("Audio play blocked or file missing:", e));
    }

    // iOS Audio Unlocker
    function unlockAudio() {
        if (audioContext.state === 'suspended') {
            audioContext.resume();
        }
        // Play a silent buffer to fully warm up the engine
        const buffer = audioContext.createBuffer(1, 1, 22050);
        const source = audioContext.createBufferSource();
        source.buffer = buffer;
        source.connect(audioContext.destination);
        source.start(0);
    }

    function toggleTimer() {
        if (isRunning) {
            stopTimer();
        } else {
            startSequence();
        }
    }

    function stopTimer() {
        clearInterval(intervalId);
        isRunning = false;
        currentPhase = 'idle';
        els.status.textContent = "STOPPED";
        els.startBtn.textContent = "START";
        els.startBtn.style.backgroundColor = "#ff4757"; // Red/Accent
    }

    function startSequence() {
        // 1. Capture settings
        settings.pre = parseInt(els.inputs.pre.value) || 0;
        settings.main = parseInt(els.inputs.main.value) || 60;
        settings.direction = els.inputs.dir.value;

        // 2. Unlock iOS Audio
        unlockAudio();

        // 3. Start Pre-Countdown
        isRunning = true;
        els.startBtn.textContent = "STOP";
        els.startBtn.style.backgroundColor = "#ffa502"; // Orange
        
        if (settings.pre > 0) {
            startPreCountdown();
        } else {
            playSound('beep.mp3');
            startMainTimer();
        }
    }

    function startPreCountdown() {
        currentPhase = 'pre';
        timeLeft = settings.pre;
        els.status.textContent = "GET READY";
        updateDisplay(timeLeft);

        intervalId = setInterval(() => {
            timeLeft--;
            if (timeLeft <= 0) {
                clearInterval(intervalId);
                updateDisplay(0); // Show 0 briefly
                playSound('beep.mp3');
                startMainTimer();
            } else {
                updateDisplay(timeLeft);
            }
        }, 1000);
    }

    function startMainTimer() {
        currentPhase = 'main';
        els.status.textContent = settings.direction === 'down' ? "COUNTDOWN" : "COUNTUP";
        
        // Initialize start time based on direction
        let currentTick = settings.direction === 'down' ? settings.main : 0;
        const target = settings.direction === 'down' ? 0 : settings.main;
        
        updateDisplay(currentTick);

        intervalId = setInterval(() => {
            // Logic: Update time FIRST, then check audio
            if (settings.direction === 'down') {
                currentTick--;
            } else {
                currentTick++;
            }

            updateDisplay(currentTick);
            handleAudioLogic(currentTick, settings.main, settings.direction);

            // Check finish condition
            if (currentTick === target) {
                clearInterval(intervalId);
                finishTimer();
            }

        }, 1000);
    }

    function handleAudioLogic(current, total, direction) {
        // Logic for "Scream": play audio file corresponding to the number
        // 1. Every 10 seconds
        // 2. Last 10 seconds (every second)
        
        let shouldScream = false;
        
        if (direction === 'down') {
            // Countdown Logic
            if (current <= 10 && current > 0) {
                shouldScream = true; // Last 10 seconds
            } else if (current % 10 === 0 && current !== total && current !== 0) {
                shouldScream = true; // Every 10s (e.g. 50, 40, 30...)
            }
        } else {
            // Countup Logic
            const timeRemaining = total - current;
            if (timeRemaining <= 10 && timeRemaining >= 0) {
                 shouldScream = true; // Last 10 seconds relative to target
            } else if (current % 10 === 0 && current !== 0) {
                shouldScream = true; // Every 10s (10, 20, 30...)
            }
        }

        if (shouldScream) {
            playSound(`${current}.mp3`);
        }
    }

    function finishTimer() {
        isRunning = false;
        els.status.textContent = "DONE";
        els.startBtn.textContent = "RESTART";
        els.startBtn.style.backgroundColor = "#2ed573"; // Green
    }

    // Modal Logic
    function openSettings() {
        if(isRunning) stopTimer();
        els.modal.style.display = 'flex';
    }
    function closeSettings() {
        els.modal.style.display = 'none';
        // Update display to preview new time
        let prevVal = parseInt(els.inputs.main.value);
        updateDisplay(prevVal);
    }

</script>
</body>
</html>

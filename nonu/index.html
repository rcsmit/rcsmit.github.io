<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NoNu · Thai Transcription</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Pro:ital,wght@0,300;0,400;0,500;1,300;1,400&display=swap" rel="stylesheet">

    <style>
        /* ── LIGHT THEME (default) ── */
        :root,
        [data-theme="light"] {
            --bg: #faf7f2;
            --surface: #ffffff;
            --surface2: #f3ede3;
            --border: rgba(160, 120, 40, 0.2);
            --gold: #9a6f1e;
            --gold-light: #b8890a;
            --gold-dim: rgba(154, 111, 30, 0.3);
            --text: #2a2118;
            --text-muted: #7a6a50;
            --text-dim: #b0a08a;
            --accent: #b06030;
            --red: #9a2828;
            --radius: 6px;
            --shadow: 0 1px 4px rgba(80,50,10,0.08), 0 4px 16px rgba(80,50,10,0.05);
            --top-bar: linear-gradient(90deg, transparent, rgba(154,111,30,0.4) 30%, #9a6f1e 50%, rgba(154,111,30,0.4) 70%, transparent);
            --ambient: radial-gradient(ellipse, rgba(180, 130, 40, 0.06) 0%, transparent 70%);
            --class-mid-bg: rgba(60, 100, 160, 0.08);
            --class-mid-color: #2d5fa0;
            --class-mid-border: rgba(60, 100, 160, 0.2);
            --class-high-bg: rgba(154, 111, 30, 0.08);
            --class-high-color: #9a6f1e;
            --class-high-border: rgba(154, 111, 30, 0.2);
            --class-low-bg: rgba(176, 96, 48, 0.08);
            --class-low-color: #b06030;
            --class-low-border: rgba(176, 96, 48, 0.2);
            --thead-bg: #f5efe3;
            --row-hover: rgba(154, 111, 30, 0.04);
            --row-border: rgba(154, 111, 30, 0.08);
            --chip-bg: #f3ede3;
            --overlay-bg: rgba(40, 30, 10, 0.55);
            --overlay-card: #ffffff;
        }

        /* ── DARK THEME ── */
        [data-theme="dark"] {
            --bg: #0d0e12;
            --surface: #13151c;
            --surface2: #1a1d27;
            --border: rgba(212, 175, 85, 0.18);
            --gold: #d4af55;
            --gold-light: #f0d080;
            --gold-dim: rgba(212, 175, 85, 0.35);
            --text: #e8e0d0;
            --text-muted: #8a8070;
            --text-dim: #5a5448;
            --accent: #c9914a;
            --red: #a03030;
            --shadow: 0 1px 4px rgba(0,0,0,0.3);
            --top-bar: linear-gradient(90deg, transparent, rgba(212,175,85,0.35) 30%, #d4af55 50%, rgba(212,175,85,0.35) 70%, transparent);
            --ambient: radial-gradient(ellipse, rgba(180, 130, 40, 0.07) 0%, transparent 70%);
            --class-mid-bg: rgba(100, 160, 220, 0.12);
            --class-mid-color: #7bafd4;
            --class-mid-border: rgba(100, 160, 220, 0.2);
            --class-high-bg: rgba(212, 175, 85, 0.1);
            --class-high-color: #d4af55;
            --class-high-border: rgba(212, 175, 85, 0.2);
            --class-low-bg: rgba(201, 145, 74, 0.1);
            --class-low-color: #c9914a;
            --class-low-border: rgba(201, 145, 74, 0.2);
            --thead-bg: #1a1d27;
            --row-hover: rgba(212, 175, 85, 0.04);
            --row-border: rgba(212, 175, 85, 0.07);
            --chip-bg: #1a1d27;
            --overlay-bg: rgba(0,0,0,0.75);
            --overlay-card: #13151c;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Crimson Pro', Georgia, serif;
            font-weight: 300;
            min-height: 100vh;
            overflow-x: hidden;
            transition: background 0.3s, color 0.3s;
        }

        body::before {
            content: '';
            position: fixed;
            top: -40%;
            left: 50%;
            transform: translateX(-50%);
            width: 900px;
            height: 600px;
            background: var(--ambient);
            pointer-events: none;
            z-index: 0;
        }

        .top-bar {
            height: 2px;
            background: var(--top-bar);
        }

        /* ── HEADER ── */
        header {
            position: relative;
            z-index: 10;
            padding: 2.5rem 2rem 1.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border);
        }

        .logo-area { display: flex; align-items: center; gap: 1rem; }
        .logo-gem  { width: 38px; height: 38px; flex-shrink: 0; }
        .logo-gem svg { width: 100%; height: 100%; }

        .brand { display: flex; flex-direction: column; gap: 1px; }

        .brand-name {
            font-family: 'Cinzel', serif;
            font-size: 1.4rem;
            font-weight: 700;
            letter-spacing: 0.18em;
            color: var(--gold);
            line-height: 1;
        }

        .brand-sub {
            font-size: 0.7rem;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            color: var(--text-muted);
        }

        .header-actions { display: flex; align-items: center; gap: 0.6rem; }

        /* ── THEME TOGGLE ── */
        .theme-toggle {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            cursor: pointer;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 999px;
            padding: 0.3rem 0.8rem 0.3rem 0.5rem;
            transition: border-color 0.25s, background 0.3s;
            user-select: none;
        }

        .theme-toggle:hover { border-color: var(--gold-dim); }

        .toggle-track {
            width: 30px;
            height: 17px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 999px;
            position: relative;
            transition: background 0.3s, border-color 0.3s;
            flex-shrink: 0;
        }

        [data-theme="dark"] .toggle-track {
            background: var(--gold-dim);
            border-color: var(--gold-dim);
        }

        .toggle-knob {
            position: absolute;
            top: 2px;
            left: 2px;
            width: 11px;
            height: 11px;
            background: var(--text-muted);
            border-radius: 50%;
            transition: transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1), background 0.25s;
        }

        [data-theme="dark"] .toggle-knob {
            transform: translateX(13px);
            background: var(--gold);
        }

        .toggle-icon { font-size: 0.85rem; line-height: 1; }
        .icon-sun  { display: block; }
        .icon-moon { display: none; }
        [data-theme="dark"] .icon-sun  { display: none; }
        [data-theme="dark"] .icon-moon { display: block; }

        .toggle-label {
            font-family: 'Cinzel', serif;
            font-size: 0.58rem;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: var(--text-muted);
            white-space: nowrap;
        }

        .info-btn {
            background: none;
            border: 1px solid var(--border);
            color: var(--text-muted);
            width: 34px;
            height: 34px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-family: 'Cinzel', serif;
            font-size: 0.85rem;
            transition: all 0.25s;
        }

        .info-btn:hover { border-color: var(--gold-dim); color: var(--gold); }

        /* ── MAIN ── */
        main {
            position: relative;
            z-index: 1;
            max-width: 900px;
            margin: 0 auto;
            padding: 2.5rem 1.5rem 4rem;
        }

        .input-section { margin-bottom: 2.5rem; }

        .input-label {
            font-size: 0.68rem;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 0.6rem;
            display: block;
        }

        .input-wrapper {
            display: flex;
            align-items: stretch;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            background: var(--surface);
            box-shadow: var(--shadow);
            transition: border-color 0.25s, box-shadow 0.25s;
            overflow: hidden;
        }

        .input-wrapper:focus-within {
            border-color: var(--gold-dim);
            box-shadow: 0 0 0 3px rgba(154, 111, 30, 0.08), var(--shadow);
        }

        [data-theme="dark"] .input-wrapper:focus-within {
            box-shadow: 0 0 0 3px rgba(212, 175, 85, 0.06);
        }

        #thaiInput {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            padding: 1rem 1.2rem;
            font-family: 'Crimson Pro', Georgia, serif;
            font-size: 1.5rem;
            color: var(--text);
            min-width: 0;
        }

        #thaiInput::placeholder { color: var(--text-dim); font-style: italic; }

        .btn-group { display: flex; border-left: 1px solid var(--border); }

        .btn {
            background: none;
            border: none;
            cursor: pointer;
            font-family: 'Cinzel', serif;
            font-size: 0.62rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            padding: 0 1rem;
            transition: all 0.2s;
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }

        .btn + .btn { border-left: 1px solid var(--border); }

        .btn-primary  { color: var(--gold); }
        .btn-primary:hover  { background: rgba(154, 111, 30, 0.07); }
        [data-theme="dark"] .btn-primary:hover { background: rgba(212, 175, 85, 0.08); }

        .btn-secondary { color: var(--text-muted); }
        .btn-secondary:hover { background: rgba(0,0,0,0.04); color: var(--text); }
        [data-theme="dark"] .btn-secondary:hover { background: rgba(255,255,255,0.04); }

        .btn-clear { color: var(--text-dim); }
        .btn-clear:hover { color: var(--red); background: rgba(154, 40, 40, 0.06); }

        /* ── PHONEME STRIP ── */
        #results_word {
            min-height: 2.8rem;
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.15rem;
            padding: 0.2rem 0;
            margin-bottom: 1.5rem;
        }

        .phoneme-chip {
            display: inline-flex;
            align-items: center;
            padding: 0.3rem 0.65rem;
            background: var(--chip-bg);
            border: 1px solid var(--border);
            border-radius: 3px;
            font-family: 'Cinzel', serif;
            font-size: 0.82rem;
            letter-spacing: 0.08em;
            color: var(--gold);
            animation: chipIn 0.2s ease both;
        }

        .phoneme-space { width: 0.5rem; }

        @keyframes chipIn {
            from { opacity: 0; transform: translateY(4px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* ── TABLE ── */
        .table-wrapper {
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
            background: var(--surface);
            box-shadow: var(--shadow);
            animation: fadeUp 0.3s ease both;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(10px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        table { width: 100%; border-collapse: collapse; font-size: 0.95rem; }

        thead tr { background: var(--thead-bg); border-bottom: 1px solid var(--border); }

        th {
            padding: 0.75rem 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.6rem;
            font-weight: 600;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            color: var(--text-muted);
            text-align: left;
            white-space: nowrap;
        }

        tbody tr {
            border-bottom: 1px solid var(--row-border);
            transition: background 0.15s;
            animation: rowIn 0.25s ease both;
        }

        tbody tr:last-child { border-bottom: none; }
        tbody tr:hover { background: var(--row-hover); }

        @keyframes rowIn { from { opacity: 0; } to { opacity: 1; } }

        td { padding: 0.75rem 1rem; vertical-align: middle; }

        .cell-letter      { font-size: 1.6rem; color: var(--gold); line-height: 1; min-width: 2rem; }
        .cell-rtgs        { font-family: 'Crimson Pro', serif; font-style: italic; color: var(--text-muted); font-size: 0.88rem; }
        .cell-sample      { font-size: 1.1rem; color: var(--text); }
        .cell-translation { color: var(--text-muted); font-size: 0.9rem; }
        .cell-sounds      { color: var(--accent); font-size: 0.88rem; font-style: italic; }

        /* ── CLASS BADGES ── */
        .class-badge {
            display: inline-block;
            font-family: 'Cinzel', serif;
            font-size: 0.55rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            padding: 0.15rem 0.4rem;
            border-radius: 2px;
        }

        .class-mid  { background: var(--class-mid-bg);  color: var(--class-mid-color);  border: 1px solid var(--class-mid-border); }
        .class-high { background: var(--class-high-bg); color: var(--class-high-color); border: 1px solid var(--class-high-border); }
        .class-low  { background: var(--class-low-bg);  color: var(--class-low-color);  border: 1px solid var(--class-low-border); }

        /* ── EMPTY STATE ── */
        .empty-state { text-align: center; padding: 4rem 2rem; }
        .empty-glyph { font-size: 3.5rem; color: var(--text-dim); margin-bottom: 1rem; opacity: 0.4; display: block; }
        .empty-state p { font-size: 1rem; font-style: italic; color: var(--text-muted); margin-bottom: 0.3rem; }
        .empty-state small { font-size: 0.78rem; letter-spacing: 0.1em; color: var(--text-dim); }

        /* ── OVERLAY ── */
        .overlay-backdrop {
            position: fixed;
            inset: 0;
            background: var(--overlay-bg);
            backdrop-filter: blur(4px);
            z-index: 100;
            display: none;
            align-items: center;
            justify-content: center;
        }

        .overlay-backdrop.visible { display: flex; animation: backdropIn 0.2s ease; }

        @keyframes backdropIn { from { opacity: 0; } to { opacity: 1; } }

        .overlay-card {
            background: var(--overlay-card);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 2.5rem;
            max-width: 420px;
            width: calc(100% - 3rem);
            box-shadow: var(--shadow);
            animation: cardIn 0.25s ease;
        }

        @keyframes cardIn {
            from { opacity: 0; transform: scale(0.97) translateY(10px); }
            to   { opacity: 1; transform: scale(1) translateY(0); }
        }

        .overlay-card h2 { font-family: 'Cinzel', serif; font-size: 1.1rem; letter-spacing: 0.15em; color: var(--gold); margin-bottom: 1.2rem; }
        .overlay-card p  { font-size: 1rem; color: var(--text-muted); line-height: 1.7; margin-bottom: 0.8rem; }
        .overlay-card a  { color: var(--gold); text-decoration: none; border-bottom: 1px solid var(--gold-dim); }
        .overlay-card a:hover { color: var(--gold-light); }

        .overlay-close {
            margin-top: 1.5rem;
            width: 100%;
            padding: 0.75rem;
            background: transparent;
            border: 1px solid var(--gold-dim);
            color: var(--gold);
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            border-radius: var(--radius);
            cursor: pointer;
            transition: all 0.2s;
        }

        .overlay-close:hover { background: rgba(154, 111, 30, 0.08); }
        [data-theme="dark"] .overlay-close:hover { background: rgba(212, 175, 85, 0.1); }

        /* ── RESPONSIVE ── */
        @media (max-width: 600px) {
            header { padding: 1.5rem 1rem 1rem; }
            main   { padding: 1.5rem 1rem 3rem; }
            .btn-group { display: none; }
            .toggle-label { display: none; }

            .mobile-btns {
                display: flex;
                gap: 0.6rem;
                margin-top: 0.8rem;
            }

            .mobile-btn {
                flex: 1;
                padding: 0.65rem;
                background: var(--surface2);
                border: 1px solid var(--border);
                border-radius: var(--radius);
                color: var(--text-muted);
                font-family: 'Cinzel', serif;
                font-size: 0.62rem;
                letter-spacing: 0.15em;
                text-transform: uppercase;
                cursor: pointer;
                transition: all 0.2s;
                text-align: center;
            }

            .mobile-btn.primary { color: var(--gold); border-color: var(--gold-dim); }
            .mobile-btn:hover { background: rgba(154, 111, 30, 0.06); }

            th:nth-child(2), td:nth-child(2),
            th:nth-child(5), td:nth-child(5) { display: none; }
        }

        @media (min-width: 601px) { .mobile-btns { display: none; } }
    </style>
</head>
<body>

<div class="top-bar"></div>

<header>
    <div class="logo-area">
        <div class="logo-gem">
            <svg viewBox="0 0 38 38" fill="none" xmlns="http://www.w3.org/2000/svg">
                <polygon points="19,3 35,13 35,25 19,35 3,25 3,13" fill="none" stroke="var(--gold)" stroke-width="1.2" opacity="0.4"/>
                <polygon points="19,3 35,13 19,18"  fill="var(--gold)" opacity="0.12"/>
                <polygon points="3,13 19,18 19,3"   fill="var(--gold)" opacity="0.06"/>
                <polygon points="35,13 35,25 19,18" fill="var(--gold)" opacity="0.09"/>
                <polygon points="3,13 19,18 3,25"   fill="var(--gold)" opacity="0.05"/>
                <polygon points="19,18 35,25 19,35 3,25" fill="var(--gold)" opacity="0.08"/>
                <circle cx="19" cy="18" r="1.5" fill="var(--gold)" opacity="0.7"/>
            </svg>
        </div>
        <div class="brand">
            <span class="brand-name">NoNu</span>
            <span class="brand-sub">Thai Transcription</span>
        </div>
    </div>

    <div class="header-actions">
        <button class="theme-toggle" id="themeToggle" title="Toggle theme" aria-label="Toggle light/dark theme">
            <div class="toggle-track"><div class="toggle-knob"></div></div>
            <span class="toggle-icon">
                <span class="icon-sun">☀️</span>
                <span class="icon-moon">🌙</span>
            </span>
            <span class="toggle-label">Dark</span>
        </button>
        <button class="info-btn" id="infoBtn" title="About">i</button>
    </div>
</header>

<main>
    <div class="input-section">
        <label class="input-label" for="thaiInput">Enter Thai text</label>
        <div class="input-wrapper">
            <input
                type="text"
                id="thaiInput"
                placeholder="สวัสดี ฉันชื่อเรเน่"
                value="สวัสดี ฉันชื่อเรเน่"
                autocomplete="off"
                spellcheck="false"
            >
            <div class="btn-group">
                <button class="btn btn-primary"   onclick="searchCharacters()">◈ Transcribe</button>
                <button class="btn btn-secondary" onclick="sendToGoogleTranslate()">↗ Translate</button>
                <button class="btn btn-clear"     onclick="clearInput()">✕</button>
            </div>
        </div>
        <div class="mobile-btns">
            <button class="mobile-btn primary" onclick="searchCharacters()">◈ Transcribe</button>
            <button class="mobile-btn" onclick="sendToGoogleTranslate()">↗ Translate</button>
            <button class="mobile-btn" onclick="clearInput()">✕ Clear</button>
        </div>
    </div>

    <div id="results_word"></div>
    <div id="results">
        <div class="empty-state">
            <span class="empty-glyph">ก</span>
            <p>Type or paste Thai text above</p>
            <small>Each character will be transcribed instantly</small>
        </div>
    </div>
</main>

<div class="overlay-backdrop" id="overlay">
    <div class="overlay-card">
        <h2>About NoNu</h2>
        <p>NoNu transcribes Thai script character by character, showing romanization, pronunciation, and example words for each letter.</p>
        <p>Sounds at <a href="https://thai-alphabet.com/" target="_blank">thai-alphabet.com</a></p>
        <p>Made by <strong style="color:var(--text)">Rene Smit</strong> (@rcsmit)</p>
        <button class="overlay-close" id="closeOverlay">Close</button>
    </div>
</div>

<script>
    // ── THEME ──
    const html   = document.documentElement;
    const toggle = document.getElementById('themeToggle');
    const label  = toggle.querySelector('.toggle-label');

    const saved = localStorage.getItem('NoNu-theme') || 'light';
    applyTheme(saved, false);

    toggle.addEventListener('click', () => {
        applyTheme(html.getAttribute('data-theme') === 'light' ? 'dark' : 'light', true);
    });

    function applyTheme(theme, save) {
        html.setAttribute('data-theme', theme);
        label.textContent = theme === 'light' ? 'Dark' : 'Light';
        if (save) localStorage.setItem('NoNu-theme', theme);
    }

    // ── DATA ──
    let thaiCharacters = [];

    fetch('thai_characters.json')
        .then(r => r.json())
        .then(data => { thaiCharacters = data; searchCharacters(); })
        .catch(() => { thaiCharacters = EMBEDDED_DATA; searchCharacters(); });

    // ── ACTIONS ──
    function sendToGoogleTranslate() {
        window.open(`https://translate.google.com/?sl=th&tl=en&text=${encodeURIComponent(document.getElementById('thaiInput').value)}&op=translate`, '_blank');
    }

    function clearInput() {
        document.getElementById('thaiInput').value = '';
        document.getElementById('results_word').innerHTML = '';
        document.getElementById('results').innerHTML = `<div class="empty-state"><span class="empty-glyph">ก</span><p>Type or paste Thai text above</p><small>Each character will be transcribed instantly</small></div>`;
    }

    function searchCharacters() {
        const input      = document.getElementById('thaiInput').value;
        const resultsDiv = document.getElementById('results');
        const wordDiv    = document.getElementById('results_word');
        wordDiv.innerHTML    = '';
        resultsDiv.innerHTML = '';

        if (!input.trim()) {
            resultsDiv.innerHTML = `<div class="empty-state"><span class="empty-glyph">ก</span><p>Type or paste Thai text above</p><small>Each character will be transcribed instantly</small></div>`;
            return;
        }

        const found = [];
        let delay = 0;

        [...input].forEach(char => {
            if (char === ' ') { wordDiv.insertAdjacentHTML('beforeend', '<span class="phoneme-space"></span>'); return; }
            const info = thaiCharacters.find(c => c.Letter === char);
            if (info) {
                const sound = (info.sound || '').trim();
                if (sound && sound !== '-') {
                    wordDiv.insertAdjacentHTML('beforeend', `<span class="phoneme-chip" style="animation-delay:${delay * 0.04}s">${sound}</span>`);
                    delay++;
                }
                found.push({ char, info });
            }
        });

        if (found.length === 0) {
            resultsDiv.innerHTML = `<div class="empty-state"><span class="empty-glyph" style="font-size:2rem">?</span><p>No Thai characters recognized</p><small>Try entering Thai script text</small></div>`;
            return;
        }

        let rows = '';
        found.forEach(({ char, info }, i) => {
            const cls    = info.class && info.class !== '-' ? info.class : null;
            const badge  = cls ? `<span class="class-badge class-${cls}">${cls}</span>` : '';
            const sample = (info['Sample word'] || '') !== '-' ? (info['Sample word'] || '') : '';
            const trans  = (info['Sample Word Translation'] || '') !== '-' ? (info['Sample Word Translation'] || '') : '';
            const sounds = (info['Sounds like'] || '') !== '-' ? (info['Sounds like'] || '') : '';
            rows += `<tr style="animation-delay:${i * 0.03}s">
                <td class="cell-letter">${char}</td>
                <td class="cell-rtgs">${info.RTGS || ''} ${badge}</td>
                <td class="cell-sample">${sample}</td>
                <td class="cell-translation">${trans}</td>
                <td class="cell-sounds">${sounds}</td>
            </tr>`;
        });

        resultsDiv.innerHTML = `
            <div class="table-wrapper">
                <table>
                    <thead><tr><th>Letter</th><th>RTGS &amp; Class</th><th>Sample Word</th><th>Translation</th><th>Sounds Like</th></tr></thead>
                    <tbody>${rows}</tbody>
                </table>
            </div>`;
    }

    document.getElementById('thaiInput').addEventListener('input', searchCharacters);
    if (thaiCharacters.length > 0) searchCharacters();
</script>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/x-icon" href="favicon.ico">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">

<title>HS Drills</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --navy: #1E3A5F;
  --blue: #2E6DA4;
    --bg: #e6f3ff;
  
  --surface: #1a2635;
  --surface2: #243447;
  --text: #f0f4f8;
  --muted: #7a9bbf;
  --radius: 20px;
}

html, body {
  height: 100%; width: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  overflow: hidden;
  touch-action: none;
}

/* ── SETTINGS OVERLAY ───────────────────────── */
#settings-overlay {
  position: fixed; inset: 0; z-index: 200;
  background: rgba(10,16,24,0.92);
  backdrop-filter: blur(12px);
  display: flex; align-items: flex-end;
  opacity: 0; pointer-events: none;
  transition: opacity .3s;
}
#settings-overlay.open { opacity: 1; pointer-events: all; }
#settings-panel {
  width: 100%; max-height: 80vh;
  background: var(--surface);
  border-radius: 28px 28px 0 0;
  padding: 24px 24px 40px;
  overflow-y: auto;
  transform: translateY(100%);
  transition: transform .35s cubic-bezier(.4,0,.2,1);
}
#settings-overlay.open #settings-panel { transform: translateY(0); }

.settings-handle {
  width: 40px; height: 4px;
  background: var(--muted); border-radius: 2px;
  margin: 0 auto 20px;
}
.settings-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 28px; letter-spacing: 2px;
  color: var(--text); margin-bottom: 6px;
}
.settings-sub { font-size: 13px; color: var(--muted); margin-bottom: 20px; }

.level-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 24px; }
.level-btn {
  padding: 12px 10px; border-radius: 12px; border: 2px solid transparent;
  font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 600;
  cursor: pointer; transition: all .2s; text-align: center; opacity: 0.5;
}
.level-btn.active { opacity: 1; border-color: currentColor; }

.level-btn.lb { background: #D4EDDA; color: #1A6B3A; }
.level-btn.li { background: #FFF3CD; color: #856404; }
.level-btn.la { background: #FDECEA; color: #8B1A1A; }
.level-btn.le { background: #EDE0F7; color: #5B2A8C; }
.level-btn.ll { background: #E8F4FD; color: #2E6DA4; }

.settings-section { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }

.user-input-row { display: flex; gap: 8px; margin-bottom: 20px; }
.user-input {
  flex: 1; background: var(--surface2); border: 1px solid #2a3d55;
  color: var(--text); border-radius: 10px; padding: 10px 14px;
  font-family: 'DM Sans', sans-serif; font-size: 14px; outline: none;
}
.user-input:focus { border-color: var(--blue); }
.btn-primary {
  background: var(--blue); color: white; border: none;
  border-radius: 10px; padding: 10px 16px; font-size: 14px;
  font-family: 'DM Sans', sans-serif; font-weight: 600; cursor: pointer;
}

.close-settings {
  width: 100%; padding: 14px; background: var(--surface2);
  border: none; border-radius: 14px; color: var(--muted);
  font-family: 'DM Sans', sans-serif; font-size: 15px; cursor: pointer; margin-top: 4px;
}

/* ── MAIN APP ───────────────────────────────── */
#app {
  position: fixed; inset: 0;
  display: flex; flex-direction: column;
}

/* Top bar */
.topbar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 52px 20px 12px;
  position: relative; z-index: 10;
}
@media (orientation: landscape) {
  .topbar { padding: 12px 20px; }
}
.topbar-logo {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 22px; letter-spacing: 3px; color: var(--muted);
}
.topbar-user {
  font-size: 13px; color: var(--muted); font-weight: 500;
}
.settings-btn {
  background: var(--surface); border: none; border-radius: 50%;
  width: 40px; height: 40px; display: flex; align-items: center; justify-content: center;
  cursor: pointer; color: var(--muted); font-size: 20px;
  transition: background .2s;
}
.settings-btn:active { background: var(--surface2); }

/* Card area */
#card-area {
  flex: 1; position: relative; overflow: hidden;
  padding: 0 16px 16px;
}

.card-wrapper {
  position: absolute; inset: 0; padding: 0 16px 16px;
  display: flex; align-items: center; justify-content: center;
  will-change: transform; transition: none;
}
.card-wrapper.animating {
  transition: transform .35s cubic-bezier(.4,0,.2,1), opacity .35s;
}

.card {
  width: 100%; max-width: 420px;
  background: var(--surface);
  border-radius: var(--radius);
  padding: 28px 24px 24px;
  position: relative; overflow: hidden;
  box-shadow: 0 24px 60px rgba(0,0,0,0.5);
  user-select: none;
}

.card-accent {
  position: absolute; top: 0; left: 0; right: 0; height: 4px;
  border-radius: var(--radius) var(--radius) 0 0;
}
.card-cat-label {
  font-size: 11px; font-weight: 600; letter-spacing: 1.5px;
  text-transform: uppercase; color: var(--muted);
  margin-bottom: 16px; display: flex; align-items: center; gap: 6px;
}
.card-cat-dot {
  width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
}
.card-drill-name {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(32px, 8vw, 48px);
  line-height: 1.05; letter-spacing: 1px;
  color: var(--text); margin-bottom: 16px;
}
.card-sets {
  display: inline-flex; align-items: center; gap: 6px;
  background: var(--surface2); border-radius: 8px;
  padding: 6px 12px; font-size: 13px; font-weight: 600;
  color: var(--text); margin-bottom: 16px;
}
.card-cue {
  font-size: 14px; line-height: 1.6; color: #9ab4cc;
  border-left: 2px solid var(--surface2); padding-left: 12px;
  margin-bottom: 20px;
}
.card-level {
  display: inline-block; padding: 4px 12px;
  border-radius: 20px; font-size: 12px; font-weight: 700;
}
.card-bottom {
  display: flex; align-items: center; justify-content: space-between;
  margin-top: 20px; padding-top: 16px;
  border-top: 1px solid var(--surface2);
}
.card-count-info { font-size: 12px; color: var(--muted); }
.card-count-info strong { color: var(--text); }

.done-btn {
  display: flex; align-items: center; gap: 6px;
  background: var(--surface2); border: none; border-radius: 12px;
  padding: 10px 16px; color: var(--text); font-family: 'DM Sans', sans-serif;
  font-size: 13px; font-weight: 600; cursor: pointer; transition: all .2s;
}
.done-btn:active { transform: scale(0.96); }
.done-btn.marked { background: #1A6B3A22; color: #4caf50; }

/* Hint arrows */
.hints {
  position: absolute; inset: 0; pointer-events: none;
  display: flex; flex-direction: column;
  align-items: center; justify-content: space-between;
  padding: 20px;
}
.hint { font-size: 11px; color: #2a3d55; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; }

/* Swipe indicator flash */
.swipe-flash {
  position: fixed; inset: 0; z-index: 50; pointer-events: none;
  opacity: 0; transition: opacity .15s;
  display: flex; align-items: center; justify-content: center;
}
.swipe-flash .flash-icon {
  font-size: 80px; filter: drop-shadow(0 0 20px currentColor);
}
.swipe-flash.show { opacity: 0.6; }

/* No drills state */
.no-drills {
  text-align: center; padding: 40px 20px;
}
.no-drills h2 { font-family: 'Bebas Neue', sans-serif; font-size: 32px; letter-spacing: 2px; color: var(--muted); margin-bottom: 8px; }
.no-drills p { font-size: 14px; color: #4a6070; }

/* Stat badge */
.stat-badge {
  position: absolute; top: 14px; right: 14px;
  background: rgba(0,0,0,0.35); border-radius: 20px;
  padding: 4px 10px; font-size: 11px; color: var(--muted); font-weight: 600;
}

footer { text-align: center; padding: 24px; color: #aaa; font-size: 11px; }
footer a { text-align: center; padding: 24px; color: #fff; font-size: 11px; }

</style>
</head>
<body>

<!-- Swipe flash indicators 
 <div class="swipe-flash" id="flash-right" style="color:#4caf50"><span class="flash-icon">→</span></div>
<div class="swipe-flash" id="flash-left"  style="color:#ef5350"><span class="flash-icon">←</span></div>
<div class="swipe-flash" id="flash-down"  style="color:#2E6DA4"><span class="flash-icon">↓</span></div>
<div class="swipe-flash" id="flash-up"    style="color:#FFA726"><span class="flash-icon">↑</span></div>
-->

<!-- Category Menu -->
<div id="cat-overlay" style="position:fixed;inset:0;z-index:200;background:rgba(10,16,24,0.92);backdrop-filter:blur(12px);display:flex;align-items:flex-end;opacity:0;pointer-events:none;transition:opacity .3s;">
  <div id="cat-panel" style="width:100%;max-height:75vh;background:var(--surface);border-radius:28px 28px 0 0;display:flex;flex-direction:column;transform:translateY(100%);transition:transform .35s cubic-bezier(.4,0,.2,1);">
  <!-- fixed header -->
  <div style="padding:24px 24px 0;flex-shrink:0;">
    <div class="settings-handle"></div>
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">
      <div class="settings-title">Categories</div>
      <button onclick="closeCatMenu()" style="background:var(--surface2);border:none;border-radius:50%;width:36px;height:36px;color:var(--muted);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;">✕</button>
    </div>
  </div>
  <!-- scrollable list -->
  <div id="cat-menu-list" style="display:flex;flex-direction:column;gap:8px;padding:0 24px 40px;overflow-y:auto;"></div>
</div>
</div>

<!-- Settings -->
<div id="settings-overlay">
  <div id="settings-panel">
    <div class="settings-handle"></div>
    <div class="settings-title">Settings</div>
    <div class="settings-sub">Choose your level to filter drills</div>

    <div class="settings-section">Difficulty Levels</div>
    <div class="level-grid">
      <button class="level-btn lb active" data-level="Beginner">🟢 Beginner</button>
      <button class="level-btn li active" data-level="Intermediate">🟡 Intermediate</button>
      <button class="level-btn la" data-level="Advanced">🔴 Advanced</button>
      <button class="level-btn le" data-level="Elite">🟣 Elite</button>
      <button class="level-btn ll active" data-level="All levels" style="grid-column:span 2">🔵 All Levels</button>
    </div>

    <div class="settings-section">Your Name</div>
    <div class="user-input-row">
      <input class="user-input" id="username-input" placeholder="Enter your name..." maxlength="30">
      <button class="btn-primary" onclick="saveUsername()">Save</button>
    </div>

    <button class="close-settings" onclick="closeSettings()">Close</button>
  </div>
</div>

<!-- App -->
<div id="app">
  <div class="topbar">
    <button class="settings-btn" onclick="openCatMenu()">☰</button>
    <div class="topbar-logo">HS DRILLS v1</div>
    <div class="topbar-user" id="topbar-user"></div>
    <button class="settings-btn" onclick="openSettings()">⚙</button>
  </div>

  <div id="card-area">
    <div class="hints">
      <span class="hint">↑ go back</span>
      <span class="hint" style="opacity:0.4">← → category · ↓ new drill</span>
    </div>
    <div class="card-wrapper" id="card-wrapper">
      <div class="card" id="main-card"></div>
    </div>
  </div>
</div>
<script src="data.js"></script>
<script>
// ── DATA ────────────────────────────────────────────────────────────────────

// ── STATE ───────────────────────────────────────────────────────────────────
let DB = JSON.parse(localStorage.getItem('hs_db') || '{"users":{}}');
let currentUser = localStorage.getItem('hs_user') || 'Guest';
let selectedLevels = JSON.parse(localStorage.getItem('hs_levels') || '["Beginner","Intermediate","All levels"]');
let catIndex = 0;
let currentDrill = null;
let filteredCats = [];
let drillHistory = [];
let historyIndex = -1;

function saveDB() {
  try { localStorage.setItem('hs_db', JSON.stringify(DB)); } catch(e) {}
}
function getUser() {
  if (!DB.users[currentUser]) DB.users[currentUser] = { drillCounts: {}, lastSeen: Date.now() };
  return DB.users[currentUser];
}
function getDrillCount(drillName) {
  return getUser().drillCounts[drillName] || 0;
}
function incrementDrill(drillName) {
  const u = getUser();
  u.drillCounts[drillName] = (u.drillCounts[drillName] || 0) + 1;
  u.lastSeen = Date.now();
  saveDB();
}

// ── FILTERED CATEGORIES ──────────────────────────────────────────────────────
function getFilteredCats() {
  return DRILLS.map(c => ({
    ...c,
    drills: c.drills.filter(d => selectedLevels.includes(d[3]))
  })).filter(c => c.drills.length > 0);
}

// ── RANDOM DRILL ─────────────────────────────────────────────────────────────
function randomDrill(catDrills, exclude) {
  const options = catDrills.filter(d => d[1] !== (exclude && exclude[1]));
  const pool = options.length > 0 ? options : catDrills;
  return pool[Math.floor(Math.random() * pool.length)];
}

// ── RENDER ───────────────────────────────────────────────────────────────────
function renderCatStrip() {} // no-op, strip removed

function renderCard(drill, catColor, catName, animate, dir) {
  const count = getDrillCount(drill[1]);
  const wrapper = document.getElementById('card-wrapper');
  const card = document.getElementById('main-card');
  console.log(drillHistory)
  card.innerHTML = `
    <div class="card-accent" style="background:${catColor}"></div>
    <div class="stat-badge">×${count} done</div>
    <div class="card-cat-label">
      <span class="card-cat-dot" style="background:${catColor}"></span>
      ${catName}
    </div>
    <div class="card-drill-name">${drill[1]}</div>
    <div class="card-sets">⏱ ${drill[2]}</div>
    <div class="card-cue">${drill[4]}</div>
    <div class="card-bottom">
      <div>
        <span class="card-level" style="${LEVEL_BADGE_STYLE[drill[3]]}">${drill[3]}</span>
        ${count > 0 ? `<div class="card-count-info" style="margin-top:6px">Done <strong>${count}×</strong> by ${currentUser}</div>` : ''}
      </div>
      <button class="done-btn" id="done-btn" onclick="markDone()">
        ✓ Done
      </button>
    </div>
  `;

  if (animate) {
    const fromX = dir === 'right' ? '100%' : dir === 'left' ? '-100%' : '0';
    const fromY = dir === 'down' ? '-60px' : dir === 'up' ? '60px' : '0';
    const fromO = (dir === 'down' || dir === 'up') ? '0' : '1';
    wrapper.style.transform = `translateX(${fromX}) translateY(${fromY})`;
    wrapper.style.opacity = fromO;
    wrapper.offsetHeight;
    wrapper.classList.add('animating');
    wrapper.style.transform = 'translateX(0) translateY(0)';
    wrapper.style.opacity = '1';
    setTimeout(() => wrapper.classList.remove('animating'), 380);
  }
}

function showCurrentDrill(animate, dir) {
  if (!filteredCats.length) {
    document.getElementById('main-card').innerHTML = `
      <div class="no-drills"><h2>NO DRILLS</h2><p>Enable more levels in Settings ⚙</p></div>`;
    return;
  }
  const cat = filteredCats[catIndex];
  currentDrill = randomDrill(cat.drills, currentDrill);
  // truncate any forward history when a new random drill is picked
  drillHistory = drillHistory.slice(0, historyIndex + 1);
  drillHistory.push({ drill: currentDrill, catIndex, catColor: cat.color, catName: cat.cat });
  if (drillHistory.length > 50) drillHistory.shift();
  historyIndex = drillHistory.length - 1;
  renderCard(currentDrill, cat.color, cat.cat, animate, dir);
}

function goBack() {
  if (historyIndex < 1) return;
  historyIndex--;
  const prev = drillHistory[historyIndex];
  catIndex = prev.catIndex;
  currentDrill = prev.drill;
  renderCard(currentDrill, prev.catColor, prev.catName, true, 'up');
}

function newDrill() {
  // if we're behind the tip of history, go forward instead of generating new
  if (historyIndex < drillHistory.length - 1) {
    historyIndex++;
    const next = drillHistory[historyIndex];
    catIndex = next.catIndex;
    currentDrill = next.drill;
    renderCard(currentDrill, next.catColor, next.catName, true, 'down');
  } else {
    showCurrentDrill(true, 'down');
  }
}

function markDone() {
  if (!currentDrill) return;
  incrementDrill(currentDrill[1]);
  const cat = filteredCats[catIndex];
  renderCard(currentDrill, cat.color, cat.cat, false, null);
  const b = document.getElementById('done-btn');
  b.textContent = '✓ Logged!';
  b.classList.add('marked');
}

// ── NAVIGATION ────────────────────────────────────────────────────────────────


function goBack() {
  if (historyIndex < 1) return;
  historyIndex--;
  const prev = drillHistory[historyIndex];
  catIndex = prev.catIndex;
  currentDrill = prev.drill;
  renderCard(currentDrill, prev.catColor, prev.catName, true, 'up');
}

function jumpToCat(i) {
  const dir = i > catIndex ? 'right' : 'left';
  catIndex = i;
  currentDrill = null;
  showCurrentDrill(true, dir);
}
function nextCat() {
  catIndex = (catIndex + 1) % filteredCats.length;
  currentDrill = null;
  showCurrentDrill(true, 'right');
}
function prevCat() {
  catIndex = (catIndex - 1 + filteredCats.length) % filteredCats.length;
  currentDrill = null;
  showCurrentDrill(true, 'left');
}
function newDrill() {
  // if we're behind the tip of history, go forward instead of generating new
  if (historyIndex < drillHistory.length - 1) {
    historyIndex++;
    const next = drillHistory[historyIndex];
    catIndex = next.catIndex;
    currentDrill = next.drill;
    renderCard(currentDrill, next.catColor, next.catName, true, 'down');
  } else {
    showCurrentDrill(true, 'down');
  }
}

// ── CATEGORY MENU ────────────────────────────────────────────────────────────
function openCatMenu() {
  const list = document.getElementById('cat-menu-list');
  list.innerHTML = filteredCats.map((c, i) => `
    <button onclick="jumpToCat(${i});closeCatMenu()" style="
      display:flex;align-items:center;gap:12px;
      background:${i === catIndex ? c.color : 'var(--surface2)'};
      border:none;border-radius:12px;padding:12px 16px;
      color:${i === catIndex ? 'white' : 'var(--text)'};
      font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;
      cursor:pointer;text-align:left;transition:all .2s;width:100%;
    ">
      <span style="width:10px;height:10px;border-radius:50%;background:${c.color};flex-shrink:0"></span>
      ${c.cat}
      <span style="margin-left:auto;font-size:11px;opacity:0.6">${c.drills.length} drills</span>
    </button>
  `).join('');
  list.innerHTML += '<footer><a href="../hs_drills/handstand_drills.pdf">PDF version</a> - <a href="../hs_drills/index.html">Interactive table</a></footer>';
  const overlay = document.getElementById('cat-overlay');
  overlay.style.opacity = '1';
  overlay.style.pointerEvents = 'all';
  document.getElementById('cat-panel').style.transform = 'translateY(0)';
}
function closeCatMenu() {
  const overlay = document.getElementById('cat-overlay');
  overlay.style.opacity = '0';
  overlay.style.pointerEvents = 'none';
  document.getElementById('cat-panel').style.transform = 'translateY(100%)';
}

// ── SWIPE ─────────────────────────────────────────────────────────────────────
let touchStartX = 0, touchStartY = 0, touchStartT = 0;
document.addEventListener('touchstart', e => {
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
  touchStartT = Date.now();
}, { passive: true });

document.addEventListener('touchend', e => {
  if (document.getElementById('settings-overlay').classList.contains('open')) return;
  if (document.getElementById('cat-overlay').style.pointerEvents === 'all') return;
  const dx = e.changedTouches[0].clientX - touchStartX;
  const dy = e.changedTouches[0].clientY - touchStartY;
  const dt = Date.now() - touchStartT;
  if (dt > 600) return;
  const absDx = Math.abs(dx), absDy = Math.abs(dy);
  if (absDx < 30 && absDy < 30) return;

  if (absDx > absDy) {
    if (absDx < 40) return;
    if (dx > 0) {  prevCat(); }
    else {  nextCat(); }
  } else {
    if (absDy < 40) return;
    if (dy > 0) {  newDrill(); }
    else {  goBack(); }
  }
}, { passive: true });

// Keyboard
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight') nextCat();
  else if (e.key === 'ArrowLeft') prevCat();
  else if (e.key === 'ArrowDown' || e.key === ' ') { e.preventDefault(); newDrill(); }
  else if (e.key === 'ArrowUp') { e.preventDefault(); goBack(); }
});

function flash(id) {
  const el = document.getElementById(id);
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 300);
}

// ── SETTINGS ──────────────────────────────────────────────────────────────────
function openSettings() {
  document.getElementById('username-input').value = currentUser === 'Guest' ? '' : currentUser;
  document.getElementById('settings-overlay').classList.add('open');
  renderLevelButtons();
}
function closeSettings() {
  document.getElementById('settings-overlay').classList.remove('open');
  filteredCats = getFilteredCats();
  catIndex = Math.min(catIndex, filteredCats.length - 1);
  currentDrill = null;
  showCurrentDrill(false, null);
}
function renderLevelButtons() {
  document.querySelectorAll('.level-btn').forEach(btn => {
    const lv = btn.dataset.level;
    btn.classList.toggle('active', selectedLevels.includes(lv));
  });
}
document.querySelectorAll('.level-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const lv = btn.dataset.level;
    if (selectedLevels.includes(lv)) {
      if (selectedLevels.length === 1) return;
      selectedLevels = selectedLevels.filter(l => l !== lv);
    } else {
      selectedLevels.push(lv);
    }
    localStorage.setItem('hs_levels', JSON.stringify(selectedLevels));
    renderLevelButtons();
  });
});

function saveUsername() {
  const val = document.getElementById('username-input').value.trim();
  if (!val) return;
  currentUser = val;
  localStorage.setItem('hs_user', currentUser);
  document.getElementById('topbar-user').textContent = currentUser;
  closeSettings();
}

// ── INIT ──────────────────────────────────────────────────────────────────────
filteredCats = getFilteredCats();

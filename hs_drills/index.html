  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: Arial, sans-serif; background: #f0f4f8; color: #1a1a1a; font-size: 14px; }

  header { background: #1E3A5F; color: white; padding: 16px; text-align: center; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 8px rgba(0,0,0,0.3); }
  header h1 { font-size: 18px; font-weight: bold; }
  header p { font-size: 12px; color: #a8c4e0; margin-top: 4px; }
  .header-text {color:white}
  .header-text a {color: #fff; text-decoration: none;} 
  .header-text a:hover {text-decoration: underline;}
  .controls { background: white; padding: 12px; border-bottom: 1px solid #ddd; position: sticky; top: 64px; z-index: 99; display: flex; flex-wrap: wrap; gap: 8px; }
  .controls input { flex: 1; min-width: 160px; padding: 8px 12px; border: 1px solid #ccc; border-radius: 20px; font-size: 14px; outline: none; }
  .controls input:focus { border-color: #2E6DA4; }
  select { padding: 8px 10px; border: 1px solid #ccc; border-radius: 20px; font-size: 13px; background: white; outline: none; }

  .stats { display: flex; gap: 8px; padding: 10px 12px; background: #1E3A5F; flex-wrap: wrap; }
  .stat { background: rgba(255,255,255,0.12); color: white; border-radius: 8px; padding: 6px 12px; font-size: 12px; text-align: center; }
  .stat strong { display: block; font-size: 18px; }

  .category-block { margin: 12px; border-radius: 10px; overflow: hidden; box-shadow: 0 2px 6px rgba(0,0,0,0.1); }
  .cat-header { padding: 10px 14px; color: white; font-weight: bold; font-size: 14px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; user-select: none; }
  .cat-header .count { font-size: 11px; opacity: 0.8; background: rgba(255,255,255,0.2); padding: 2px 8px; border-radius: 10px; }
  .cat-header .arrow { transition: transform 0.2s; }
  .cat-header.collapsed .arrow { transform: rotate(-90deg); }

  .drill-list { background: white; }
  .drill { padding: 12px 14px; border-bottom: 1px solid #f0f0f0; transition: background 0.15s; }
  .drill:last-child { border-bottom: none; }
  .drill:active { background: #f5f9ff; }
  .drill-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; margin-bottom: 4px; }
  .drill-name { font-weight: bold; font-size: 14px; color: #1a1a1a; flex: 1; }
  .level-badge { font-size: 10px; font-weight: bold; padding: 3px 8px; border-radius: 10px; white-space: nowrap; flex-shrink: 0; }
  .drill-sets { font-size: 12px; color: #555; margin-bottom: 4px; }
  .drill-cue { font-size: 12px; color: #666; line-height: 1.4; }
  .drill-check { display: flex; align-items: center; gap: 6px; margin-top: 6px; }
  .drill-check input[type=checkbox] { width: 16px; height: 16px; accent-color: #2E6DA4; cursor: pointer; }
  .drill-check label { font-size: 11px; color: #888; cursor: pointer; }
  .drill.checked { background: #f0f7f0; }
  .drill.checked .drill-name { text-decoration: line-through; color: #888; }
  .drill.hidden { display: none; }

  .level-beginner     { background: #D4EDDA; color: #1A6B3A; }
  .level-intermediate { background: #FFF3CD; color: #856404; }
  .level-advanced     { background: #FDECEA; color: #8B1A1A; }
  .level-elite        { background: #EDE0F7; color: #5B2A8C; }
  .level-all          { background: #E8F4FD; color: #2E6DA4; }

  .no-results { text-align: center; padding: 40px 20px; color: #888; font-size: 15px; }

  .progress-bar-wrap { background: #e0e0e0; border-radius: 4px; height: 6px; margin: 4px 0 8px; overflow: hidden; }
  .progress-bar { background: #2E6DA4; height: 100%; border-radius: 4px; transition: width 0.3s; }

  .tab-bar { display: flex; background: white; border-bottom: 2px solid #e0e0e0; position: sticky; top: 120px; z-index: 98; overflow-x: auto; }
  .tab { padding: 10px 16px; font-size: 13px; color: #666; cursor: pointer; white-space: nowrap; border-bottom: 3px solid transparent; transition: all 0.2s; }
  .tab.active { color: #1E3A5F; border-bottom-color: #1E3A5F; font-weight: bold; }

  .reset-btn { background: #1E3A5F; color: white; border: none; border-radius: 20px; padding: 8px 14px; font-size: 12px; cursor: pointer; }
  .reset-btn:active { background: #2E6DA4; }

  footer { text-align: center; padding: 24px; color: #aaa; font-size: 11px; }
</style>
</head>

const LEVEL_BADGE = {
  "Beginner":     "level-beginner",
  "Intermediate": "level-intermediate",
  "Advanced":     "level-advanced",
  "Elite":        "level-elite",
  "All levels":   "level-all",
};

let checked = JSON.parse(localStorage.getItem('hs_checked') || '{}');

function saveChecked() {
  try { localStorage.setItem('hs_checked', JSON.stringify(checked)); } catch(e) {}
}

function resetChecked() {
  if (!confirm('Reset all checkmarks?')) return;
  checked = {};
  saveChecked();
  render();
}

function levelClass(level) {
  return LEVEL_BADGE[level] || "level-all";
}

function render() {
  const search = document.getElementById('search').value.toLowerCase();
  const levelFilter = document.getElementById('level-filter').value;
  const app = document.getElementById('app');
  let html = '';
  let totalVisible = 0;
  let totalChecked = 0;
  
  DRILLS.forEach((cat, ci) => {
    // const visibleDrills = cat.drills.filter(([name, sets, level, cue]) => {
    //   if (levelFilter && level !== levelFilter) return false;
    //   if (search && !name.toLowerCase().includes(search) && !cue.toLowerCase().includes(search) && !cat.cat.toLowerCase().includes(search)) return false;
    //   return true;
    // });
    // const visibleDrills = cat.drills.filter(([name, sets, level, cue]) => {
    //   if (levelFilter && level !== levelFilter) return false;
    //   if (search && !name.toLowerCase().includes(search) && !cue.toLowerCase().includes(search) && !cat.cat.toLowerCase().includes(search)) return false;
    //   return true;
    // }).sort((a, b) => {
    //   const order = ['All levels', 'Beginner', 'Intermediate', 'Advanced', 'Elite'];
    //   return order.indexOf(a[2]) - order.indexOf(b[2]);
    // });
    const order = {'All levels': 0, 'Beginner': 1, 'Intermediate': 2, 'Advanced': 3, 'Elite': 4};
    const visibleDrills = cat.drills
      .filter(([name, sets, level, cue]) => {
        if (levelFilter && level !== levelFilter) return false;
        if (search && !name.toLowerCase().includes(search) && !cue.toLowerCase().includes(search) && !cat.cat.toLowerCase().includes(search)) return false;
        return true;
      })
      .slice() // force new array
      .sort((a, b) => (order[a[2]] ?? 99) - (order[b[2]] ?? 99));
    // console.log(cat);
    // console.log(visibleDrills.map(d => d[2])); // Check order in browser console
    if (visibleDrills.length === 0) return;

    totalVisible += visibleDrills.length;
    const checkedCount = visibleDrills.filter(([name]) => checked[`${ci}-${name}`]).length;
    totalChecked += checkedCount;
    const pct = visibleDrills.length > 0 ? Math.round(checkedCount / visibleDrills.length * 100) : 0;

    html += `<div class="category-block">
      <div class="cat-header" style="background:${cat.color}" onclick="toggleCat(this)">
        <span>${cat.cat}</span>
        <span style="display:flex;gap:6px;align-items:center">
          <!--<span class="count">${checkedCount}/${visibleDrills.length}</span>-->
          <span class="count">${visibleDrills.length} drills</span>
          <span class="arrow">▼</span>
        </span>
      </div>
      <div class="drill-list">
        <div style="padding:4px 14px 0;background:#f9fafb;">
          <div class="progress-bar-wrap"><div class="progress-bar" style="width:${pct}%"></div></div>
        </div>`;

    visibleDrills.forEach(([name, sets, level, cue]) => {
      const key = `${ci}-${name}`;
      const isChecked = !!checked[key];
      html += `<div class="drill${isChecked ? ' checked' : ''}" id="drill-${key.replace(/[^a-z0-9]/gi,'_')}">
        <div class="drill-top">
          <span class="drill-name">${name}</span>
          <span class="level-badge ${levelClass(level)}">${level}</span>
        </div>
        <div class="drill-sets">⏱ ${sets}</div>
        <div class="drill-cue">${cue}</div>
        <!--<div class="drill-check">
          <input type="checkbox" id="cb-${key.replace(/[^a-z0-9]/gi,'_')}" ${isChecked ? 'checked' : ''} onchange="toggleCheck('${key}', this)">
          <label for="cb-${key.replace(/[^a-z0-9]/gi,'_')}">${isChecked ? 'Done ✓' : 'Mark as done'}</label>
        </div>-->
      </div>`;
    });

    html += `</div></div>`;
  });

  if (totalVisible === 0) {
    html = `<div class="no-results">No drills found for "${search}"</div>`;
  }

  app.innerHTML = html;

  document.getElementById('total-counter').textContent =
    `${totalVisible} drills across ${DRILLS.filter(c => c.drills.some(([name,,level,cue]) => {
      const lf = levelFilter; const s = search;
      return (!lf || level === lf) && (!s || name.toLowerCase().includes(s) || cue.toLowerCase().includes(s));
    })).length} categories`;

  // Stats bar
  const levels = ['All levels','Beginner','Intermediate','Advanced','Elite'];
  const counts = {};
  levels.forEach(l => counts[l] = 0);
  DRILLS.forEach(c => c.drills.forEach(([,,l]) => { if(counts[l] !== undefined) counts[l]++; }));
  document.getElementById('stats-bar').innerHTML =
    // `<div class="stat"><strong>${totalChecked}</strong>done</div>` +
    // `<div class="stat"><strong>${totalVisible - totalChecked}</strong>remaining</div>` +
    levels.map(l => `<div class="stat"><strong>${counts[l]}</strong>${l}</div>`).join('');

document.querySelectorAll('.cat-header').forEach(h => {
  h.classList.add('collapsed');
  h.nextElementSibling.style.display = 'none';
});
}

function toggleCheck(key, cb) {
  checked[key] = cb.checked;
  saveChecked();
  const drillEl = document.getElementById('drill-' + key.replace(/[^a-z0-9]/gi,'_'));
  if (drillEl) {
    drillEl.classList.toggle('checked', cb.checked);
    const label = drillEl.querySelector('.drill-check label');
    if (label) label.textContent = cb.checked ? 'Done ✓' : 'Mark as done';
  }
  render();
}

function toggleCat(header) {
  header.classList.toggle('collapsed');
  const list = header.nextElementSibling;
  list.style.display = list.style.display === 'none' ? '' : 'none';
}


function filterDrills() { render(); }

render();
</script>
